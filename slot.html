<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gachax — Slot Machine</title>
  <style>
    :root{
      --bg1:#05060d;
      --bg2:#090b18;
      --gold:#ffd26e;
      --goldDim:rgba(255,210,110,.18);
      --blue:rgba(120,170,255,.90);
      --violet:rgba(190,120,255,.95);
      --panelBg:rgba(255,255,255,.055);
      --panelBd:rgba(255,255,255,.11);
      --tW:rgba(255,255,255,.92);
    }

    *{ box-sizing:border-box; margin:0; padding:0; }

    html,body{
      width:100%; min-height:100vh; overflow-x:hidden;
      font-family:system-ui,-apple-system,Segoe UI,sans-serif;
      color:#fff;
      background:
        radial-gradient(900px 520px at 20% 10%, rgba(80,130,255,.22), transparent 60%),
        radial-gradient(900px 600px at 85% 30%, rgba(255,80,220,.18), transparent 62%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }

    /* ── HUD ── */
    .hud{
      position:sticky; top:0; z-index:100;
      display:flex; justify-content:center; align-items:center; gap:24px; padding:14px 24px;
      backdrop-filter:blur(14px);
      background:linear-gradient(180deg,rgba(7,9,18,.88),rgba(7,9,18,.62));
      border-bottom:1px solid rgba(255,255,255,.07);
    }
    .hudBack{
      position:absolute; left:18px;
      display:flex; align-items:center; gap:6px;
      padding:7px 14px; border-radius:999px;
      background:var(--panelBg); border:1px solid var(--panelBd);
      color:rgba(255,255,255,.7); font-size:13px; font-weight:700;
      text-decoration:none; letter-spacing:.03em;
      transition:background .15s, color .15s, transform .12s;
    }
    .hudBack:hover{ background:rgba(255,255,255,.1); color:#fff; transform:translateX(-2px); }
    .hudBack svg{ width:14px; height:14px; flex-shrink:0; }
    .hudPill{
      display:flex; align-items:center; gap:8px;
      background:var(--panelBg); border:1px solid var(--panelBd);
      border-radius:999px; padding:7px 18px;
      font-size:14px; font-weight:600; letter-spacing:.02em;
    }
    .hudPill span{ font-size:18px; }
    .hudVal{ font-size:15px; color:var(--gold); }

    /* ── MAIN ── */
    .wrap{
      display:flex; flex-direction:column; align-items:center;
      padding:48px 20px 80px;
      gap:32px;
    }

    h1{
      font-size:clamp(22px,4vw,36px);
      font-weight:800; letter-spacing:.06em; text-transform:uppercase;
      background:linear-gradient(135deg,#fff 30%,var(--gold) 80%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      text-shadow:none;
    }

    /* ── MACHINE ── */
    .machine{
      position:relative;
      background:linear-gradient(160deg,rgba(30,35,70,.85),rgba(10,12,28,.95));
      border:1px solid rgba(255,255,255,.13);
      border-radius:28px;
      padding:36px 32px 40px;
      width:min(500px,96vw);
      box-shadow:0 40px 120px rgba(0,0,0,.7), inset 0 0 0 1px rgba(255,255,255,.06);
    }

    /* glow ring around machine when spinning */
    .machine.spinning{
      box-shadow:0 40px 120px rgba(0,0,0,.7),
                 0 0 0 2px rgba(120,170,255,.4),
                 0 0 60px rgba(120,170,255,.15),
                 inset 0 0 0 1px rgba(255,255,255,.06);
    }
    .machine.win{
      box-shadow:0 40px 120px rgba(0,0,0,.7),
                 0 0 0 2px rgba(255,210,110,.55),
                 0 0 80px rgba(255,210,110,.2),
                 inset 0 0 0 1px rgba(255,255,255,.06);
    }

    /* ── REELS CONTAINER ── */
    .reelsRow{
      display:flex; gap:12px; justify-content:center;
      margin-bottom:28px;
    }

    .reelWrap{
      flex:1;
      background:rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.09);
      border-radius:16px;
      height:110px;
      overflow:hidden;
      position:relative;
    }

    /* glow top/bottom fade */
    .reelWrap::before, .reelWrap::after{
      content:''; position:absolute; left:0; right:0; z-index:2; pointer-events:none;
      height:28px;
    }
    .reelWrap::before{ top:0; background:linear-gradient(to bottom,rgba(10,12,28,.9),transparent); }
    .reelWrap::after{ bottom:0; background:linear-gradient(to top,rgba(10,12,28,.9),transparent); }

    .reel{
      display:flex; flex-direction:column;
      transition:transform .0s;
    }

    .reelItem{
      height:110px;
      display:flex; align-items:center; justify-content:center;
      user-select:none;
      flex-shrink:0;
    }
    .reelItem img{
      width:72px; height:72px;
      object-fit:contain;
      pointer-events:none;
      filter:drop-shadow(0 2px 8px rgba(0,0,0,.5));
    }

    /* ── WIN LINE ── */
    .winLine{
      position:absolute; left:12px; right:12px;
      top:50%; transform:translateY(-50%);
      height:2px;
      background:linear-gradient(90deg,transparent,rgba(255,210,110,.6),transparent);
      pointer-events:none; z-index:3;
      opacity:0; transition:opacity .3s;
    }
    .machine.win .winLine{ opacity:1; }

    /* ── MISE ── */
    .betRow{
      display:flex; align-items:center; gap:12px; justify-content:center;
      margin-bottom:22px;
    }
    .betLabel{ font-size:13px; color:rgba(255,255,255,.5); font-weight:600; letter-spacing:.05em; text-transform:uppercase; }
    .betControls{ display:flex; align-items:center; gap:8px; }
    .betBtn{
      width:32px; height:32px; border-radius:50%;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.07);
      color:#fff; font-size:18px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background .15s, transform .1s;
    }
    .betBtn:hover{ background:rgba(255,255,255,.14); }
    .betBtn:active{ transform:scale(.92); }
    .betVal{
      min-width:52px; text-align:center;
      font-size:18px; font-weight:800; color:var(--gold);
    }
    .betPresets{
      display:flex; gap:6px; flex-wrap:wrap; justify-content:center;
      margin-bottom:20px;
    }
    .preset{
      padding:5px 14px; border-radius:999px; font-size:12px; font-weight:700;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.7); cursor:pointer;
      transition:background .15s, color .15s;
    }
    .preset:hover{ background:rgba(255,255,255,.12); color:#fff; }
    .preset.active{ background:var(--goldDim); border-color:rgba(255,210,110,.4); color:var(--gold); }

    /* ── SPIN BTN ── */
    .spinBtn{
      width:100%; padding:16px;
      border-radius:14px; border:none; cursor:pointer;
      font-size:17px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
      background:linear-gradient(135deg,#4a7fff,#a855f7);
      color:#fff;
      box-shadow:0 8px 32px rgba(80,130,255,.35);
      transition:transform .12s, box-shadow .12s, opacity .15s;
      position:relative; overflow:hidden;
    }
    .spinBtn::after{
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
      pointer-events:none;
    }
    .spinBtn:hover:not(:disabled){ transform:translateY(-2px); box-shadow:0 12px 40px rgba(80,130,255,.45); }
    .spinBtn:active:not(:disabled){ transform:translateY(0) scale(.98); }
    .spinBtn:disabled{ opacity:.45; cursor:not-allowed; transform:none; }

    /* ── RÉSULTAT ── */
    .resultMsg{
      min-height:44px; display:flex; align-items:center; justify-content:center;
      font-size:15px; font-weight:700; letter-spacing:.04em;
      margin-top:18px; border-radius:12px; padding:10px 20px;
      transition:opacity .3s, transform .3s;
      opacity:0; transform:translateY(4px);
    }
    .resultMsg.show{ opacity:1; transform:translateY(0); }
    .resultMsg.win{ background:rgba(255,210,110,.12); color:var(--gold); border:1px solid rgba(255,210,110,.25); }
    .resultMsg.lose{ background:rgba(255,80,80,.08); color:rgba(255,120,120,.9); border:1px solid rgba(255,80,80,.18); }

    /* ── LAST GAIN ── */
    .lastGain{
      display:flex; align-items:center; justify-content:center; gap:10px;
      margin-top:14px;
      font-size:13px; color:rgba(255,255,255,.35);
      letter-spacing:.04em;
      min-height:22px;
      transition:opacity .3s;
    }
    .lastGain.has-value{ color:rgba(255,255,255,.45); }
    .lastGainVal{
      font-weight:800; font-size:14px;
      padding:2px 10px; border-radius:999px;
      background:rgba(255,210,110,.1); border:1px solid rgba(255,210,110,.2);
      color:var(--gold);
      transition:all .3s;
    }
    .lastGainVal.neg{
      background:rgba(255,80,80,.08); border-color:rgba(255,80,80,.2);
      color:rgba(255,120,120,.85);
    }
    .lastGainVal.pop{
      animation:lastPop .35s cubic-bezier(.2,.9,.3,1);
    }
    @keyframes lastPop{
      0%  { transform:scale(.7); opacity:0; }
      60% { transform:scale(1.12); }
      100%{ transform:scale(1); opacity:1; }
    }

    /* ── BIG GAIN DISPLAY ── */
    #gainDisplay{
      position:fixed; inset:0; z-index:500;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      pointer-events:none;
    }
    .gainNumber{
      font-weight:900; letter-spacing:.02em;
      opacity:0; transform:scale(.4) translateY(30px);
      text-align:center; line-height:1;
    }
    .gainLabel{
      font-size:18px; font-weight:700; letter-spacing:.15em; text-transform:uppercase;
      opacity:0; margin-top:12px;
      color:rgba(255,255,255,.7);
    }
    .gainLabel.show{
      animation: labelFade 2.4s ease forwards;
    }
    @keyframes labelFade{
      0%  { opacity:0; transform:translateY(8px); }
      20% { opacity:.9; transform:translateY(0); }
      75% { opacity:.9; }
      100%{ opacity:0; }
    }

    /* Tier 1 — paire */
    .gainNumber.tier1{
      font-size:clamp(64px,14vw,110px);
      color:#a0c4ff;
      animation: gainPop1 1.8s cubic-bezier(.2,.9,.3,1) forwards;
    }
    @keyframes gainPop1{
      0%  { opacity:0; transform:scale(.5) translateY(20px); }
      20% { opacity:1; transform:scale(1.08) translateY(-6px); }
      45% { transform:scale(.97) translateY(0); }
      65% { opacity:1; }
      100%{ opacity:0; transform:scale(1.05) translateY(-20px); }
    }

    /* Tier 2 — triple petit */
    .gainNumber.tier2{
      font-size:clamp(80px,18vw,150px);
      color:var(--gold);
      text-shadow:0 0 60px rgba(255,210,110,.6);
      animation: gainPop2 2.2s cubic-bezier(.15,.9,.25,1) forwards;
    }
    @keyframes gainPop2{
      0%  { opacity:0; transform:scale(.3) translateY(40px) rotate(-6deg); }
      18% { opacity:1; transform:scale(1.15) translateY(-10px) rotate(2deg); }
      35% { transform:scale(.95) translateY(0) rotate(-1deg); }
      55% { opacity:1; transform:scale(1.02) translateY(-4px) rotate(0deg); }
      80% { opacity:1; }
      100%{ opacity:0; transform:scale(1.08) translateY(-30px); }
    }

    /* Tier 3 — gros triple */
    .gainNumber.tier3{
      font-size:clamp(100px,22vw,190px);
      background:linear-gradient(135deg,#fff 0%,var(--gold) 40%,#ff9a3c 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation: gainPop3 2.6s cubic-bezier(.1,.95,.2,1) forwards;
    }
    @keyframes gainPop3{
      0%  { opacity:0; transform:scale(.2) translateY(60px) rotate(-12deg); filter:blur(8px); }
      15% { opacity:1; transform:scale(1.28) translateY(-18px) rotate(3deg); filter:blur(0); }
      28% { transform:scale(.92) translateY(4px) rotate(-1.5deg); }
      42% { transform:scale(1.1) translateY(-8px) rotate(1deg); }
      58% { opacity:1; transform:scale(1) translateY(0) rotate(0deg); }
      80% { opacity:1; }
      100%{ opacity:0; transform:scale(1.1) translateY(-40px); }
    }

    /* Tier 4 — JACKPOT */
    .gainNumber.tier4{
      font-size:clamp(110px,26vw,220px);
      background:linear-gradient(135deg,#fffde7,#ffd26e,#ff9a3c,#ff5050,#c840ff,#6090ff,#ffd26e);
      background-size:300% 300%;
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation: gainPop4 3.4s cubic-bezier(.1,.95,.2,1) forwards, rainbowShift .7s linear infinite;
    }
    @keyframes rainbowShift{
      0%  { background-position:0% 50%; }
      50% { background-position:100% 50%; }
      100%{ background-position:0% 50%; }
    }
    @keyframes gainPop4{
      0%  { opacity:0; transform:scale(.1) translateY(80px) rotate(-20deg); filter:blur(16px); }
      12% { opacity:1; transform:scale(1.45) translateY(-26px) rotate(5deg); filter:blur(0); }
      22% { transform:scale(.88) translateY(8px) rotate(-3deg); }
      33% { transform:scale(1.2) translateY(-14px) rotate(2deg); }
      44% { transform:scale(.95) translateY(4px) rotate(-1deg); }
      56% { opacity:1; transform:scale(1.06) translateY(-6px) rotate(0deg); }
      78% { opacity:1; }
      100%{ opacity:0; transform:scale(1.18) translateY(-60px); }
    }

    /* ── TABLE DES GAINS ── */
    .payTable{
      width:min(500px,96vw);
      background:var(--panelBg); border:1px solid var(--panelBd);
      border-radius:20px; padding:22px 24px;
    }
    .payTitle{
      font-size:12px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
      color:rgba(255,255,255,.4); margin-bottom:14px; text-align:center;
    }
    .payRow{
      display:flex; align-items:center; justify-content:space-between;
      padding:8px 0; border-bottom:1px solid rgba(255,255,255,.05);
      font-size:14px;
    }
    .payRow:last-child{ border-bottom:none; }
    .payEmojis{ font-size:20px; letter-spacing:4px; }
    .payIcons{ display:flex; gap:2px; align-items:center; }
    .payIcons img{ width:28px; height:28px; object-fit:contain; }
    .payMult{ color:var(--gold); font-weight:700; }

    /* ── CONFETTIS ── */
    .confetti-container{
      position:fixed; inset:0; pointer-events:none; z-index:999; overflow:hidden;
    }
    .confetto{
      position:absolute; top:-20px;
      width:8px; height:8px; border-radius:2px;
      animation:fall linear forwards;
    }
    @keyframes fall{
      0%{ transform:translateY(0) rotate(0deg); opacity:1; }
      100%{ transform:translateY(110vh) rotate(720deg); opacity:0; }
    }

    /* ── GLOW PULSE (jackpot) ── */
    @keyframes jackpotPulse{
      0%,100%{ box-shadow:0 0 0 2px rgba(255,210,110,.5), 0 0 80px rgba(255,210,110,.2); }
      50%{ box-shadow:0 0 0 4px rgba(255,210,110,.8), 0 0 120px rgba(255,210,110,.4); }
    }
    .machine.jackpot{ animation:jackpotPulse .7s ease-in-out infinite; }

    /* ── SCREEN SHAKE ── */
    @keyframes screenShake{
      0%,100%{ transform:translate(0,0) rotate(0deg); }
      10%{ transform:translate(-4px,-2px) rotate(-.4deg); }
      20%{ transform:translate(4px, 2px) rotate( .4deg); }
      30%{ transform:translate(-3px, 3px) rotate(-.3deg); }
      40%{ transform:translate( 3px,-3px) rotate( .3deg); }
      50%{ transform:translate(-2px, 1px) rotate(-.2deg); }
      60%{ transform:translate( 2px,-1px) rotate( .2deg); }
      70%{ transform:translate(-1px, 2px) rotate(-.1deg); }
      80%{ transform:translate( 1px,-2px) rotate( .1deg); }
    }
    .machine.shake{ animation:screenShake .45s ease both; }
    @keyframes jackpotShake{
      0%,100%{ transform:translate(0,0) rotate(0deg); }
      8% { transform:translate(-8px,-4px) rotate(-.8deg); }
      16%{ transform:translate( 8px, 4px) rotate( .8deg); }
      24%{ transform:translate(-6px, 6px) rotate(-.6deg); }
      32%{ transform:translate( 6px,-6px) rotate( .6deg); }
      40%{ transform:translate(-4px, 2px) rotate(-.4deg); }
      48%{ transform:translate( 4px,-2px) rotate( .4deg); }
      56%{ transform:translate(-2px, 4px) rotate(-.2deg); }
      64%{ transform:translate( 2px,-4px) rotate( .2deg); }
    }
    .machine.jackpot-shake{ animation:jackpotShake .6s ease both, jackpotPulse .7s ease-in-out infinite; }

    /* ── REEL FLASH ── */
    .reelWrap.flash-reel::before{
      background:linear-gradient(to bottom,rgba(255,255,255,.55),transparent) !important;
      animation:reelFlash .35s ease forwards;
    }
    @keyframes reelFlash{
      0%  { opacity:1; }
      40% { opacity:.9; }
      100%{ opacity:0; }
    }
    .reelWrap.flash-reel-gold::before{
      background:linear-gradient(to bottom,rgba(255,210,110,.7),transparent) !important;
      animation:reelFlash .5s ease forwards;
    }
    .reelWrap.flash-reel-jackpot{
      animation:jackpotReelPulse .4s ease 2;
    }
    @keyframes jackpotReelPulse{
      0%,100%{ box-shadow:none; }
      50%{ box-shadow:0 0 0 2px rgba(255,210,110,.9), 0 0 30px rgba(255,210,110,.5); }
    }

    /* ── HUD COIN PULSE ── */
    @keyframes hudPop{
      0%  { transform:scale(1); }
      35% { transform:scale(1.22); }
      65% { transform:scale(.95); }
      100%{ transform:scale(1); }
    }
    .hudVal.pop-green{ animation:hudPop .4s cubic-bezier(.2,.9,.3,1); color:#50ffb0 !important; transition:color .6s; }
    .hudVal.pop-gold { animation:hudPop .4s cubic-bezier(.2,.9,.3,1); color:#fff07a !important; transition:color .6s; }

    /* ── LIGHTNING OVERLAY (jackpot) ── */
    #lightningCanvas{
      position:fixed; inset:0; pointer-events:none; z-index:490;
      opacity:0; transition:opacity .15s;
    }
    #lightningCanvas.show{ opacity:1; }

    /* ── CHROMATIC ABERRATION (jackpot) ── */
    @keyframes chromaShift{
      0%,100%{ filter:none; }
      20%{ filter:hue-rotate(20deg) saturate(1.4); }
      40%{ filter:hue-rotate(-15deg) saturate(1.6); }
      60%{ filter:hue-rotate(10deg) saturate(1.3); }
    }

    /* ── BURST RAYS (jackpot) ── */
    #burstCanvas{
      position:fixed; inset:0; pointer-events:none; z-index:488;
    }

    /* ── SPIN BTN READY PULSE ── */
    @keyframes btnReady{
      0%,100%{ box-shadow:0 8px 32px rgba(80,130,255,.35); }
      50%{ box-shadow:0 8px 48px rgba(80,130,255,.65), 0 0 0 4px rgba(80,130,255,.18); }
    }
    .spinBtn.ready-pulse{ animation:btnReady 1.4s ease-in-out infinite; }

    /* ── REEL STOP BOUNCE ── */
    @keyframes reelBounce{
      0%  { transform:translateY(0); }
      30% { transform:translateY(8px); }
      60% { transform:translateY(-4px); }
      80% { transform:translateY(2px); }
      100%{ transform:translateY(0); }
    }
    .reelWrap.bounce{ animation:reelBounce .3s ease; }
  </style>
</head>
<body>

<!-- HUD -->
<div class="hud">
  <a class="hudBack" href="/index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Retour
  </a>
  <div class="hudPill">
    <span>🎟️</span> Tickets <span class="hudVal" id="hudTickets">0</span>
    <span id="nextTicketTimer" style="font-size:10px;opacity:.5;margin-left:4px;"></span>
  </div>
  <div class="hudPill"><img src="slot/dollax.png" style="width:22px;height:22px;object-fit:contain;vertical-align:middle;"> Dollax <span class="hudVal" id="hudDollax">0</span></div>
</div>

<div class="wrap">
  <img src="slot/slot.png" alt="Slot GachaX" style="height:90px;object-fit:contain;margin-bottom:-8px;">

  <!-- Machine -->
  <div class="machine" id="machine">
    <div class="winLine"></div>

    <div class="reelsRow">
      <div class="reelWrap"><div class="reel" id="r0"></div></div>
      <div class="reelWrap"><div class="reel" id="r1"></div></div>
      <div class="reelWrap"><div class="reel" id="r2"></div></div>
    </div>

    <!-- Mise -->
    <div class="betLabel" style="text-align:center;margin-bottom:10px">Mise en tickets</div>
    <div class="betPresets" id="presets">
      <button class="preset active" data-v="1">1</button>
      <button class="preset" data-v="5">5</button>
      <button class="preset" data-v="10">10</button>
      <button class="preset" data-v="25">25</button>
      <button class="preset" data-v="50">50</button>
    </div>
    <div class="betRow">
      <div class="betLabel">Tickets</div>
      <div class="betControls">
        <button class="betBtn" id="betMinus">−</button>
        <div class="betVal" id="betDisplay">1</div>
        <button class="betBtn" id="betPlus">+</button>
      </div>
    </div>

    <button class="spinBtn" id="spinBtn">🎰 SPIN</button>

    <div class="resultMsg" id="resultMsg"></div>
    <div class="lastGain" id="lastGain">
      <span id="lastGainTxt"></span>
      <span class="lastGainVal" id="lastGainVal" style="display:none"></span>
    </div>
  </div>

  <!-- Table des gains -->
  <div class="payTable">
    <div class="payTitle">Table des gains</div>
    <div class="payRow"><span class="payIcons"><img src="slot/diamant.png"><img src="slot/diamant.png"><img src="slot/diamant.png"></span><span class="payMult">× 5 000 dollax / ticket</span></div>

  <div class="gainNumber" id="gainNumber"></div>
  <div class="gainLabel" id="gainLabel">DOLLAX</div>
</div>
<canvas id="burstCanvas" style="position:fixed;inset:0;pointer-events:none;z-index:488;"></canvas>
<canvas id="lightningCanvas" style="position:fixed;inset:0;pointer-events:none;z-index:490;opacity:0;transition:opacity .15s;"></canvas>
<div class="confetti-container" id="confettiBox"></div>

<script>
  // ── État
  // Symboles avec images PNG
  const SYMBOLS = [
    { id:'diamant',  src:'slot/diamant.png',  weight:1  }, // ×5000 — ultra rare
    { id:'star',     src:'slot/star.png',     weight:3  }, // ×1000 — très rare
    { id:'cards',    src:'slot/cards.png',    weight:8  }, // ×400  — rare
    { id:'heart',    src:'slot/heart.png',    weight:15 }, // ×250  — peu commun
    { id:'dollax',   src:'slot/dollax.png',   weight:28 }, // ×150  — commun
    { id:'thunder',  src:'slot/thunder.png',  weight:28 }, // ×80   — commun
  ];

  // Pool pondéré pour le strip visuel
  const SYMBOL_POOL = SYMBOLS.flatMap(s => Array(s.weight).fill(s));
  function randSymbol(){ return SYMBOL_POOL[Math.floor(Math.random() * SYMBOL_POOL.length)]; }
  const MULTIPLIERS = {
    'diamant':5000, 'star':1000, 'cards':400,
    'heart':250,    'dollax':150, 'thunder':80,
  };

  let tickets = 0;
  let dollax  = 0;
  let bet     = 1;
  let spinning = false;

  // ── DOM
  const hudT   = document.getElementById('hudTickets');
  const hudD   = document.getElementById('hudDollax');
  const betDisp= document.getElementById('betDisplay');
  const spinBtn= document.getElementById('spinBtn');
  const machine= document.getElementById('machine');
  const msgEl  = document.getElementById('resultMsg');

  // ── Init rouleaux (remplir avec des items)
  const reels = [0,1,2].map(i => document.getElementById('r'+i));
  const STRIP_LEN = 30;

  function buildStrip(reelEl){
    reelEl.innerHTML = '';
    const items = [];
    for(let i=0;i<STRIP_LEN;i++){
      const s = randSymbol();
      items.push(s);
      const div = document.createElement('div');
      div.className = 'reelItem';
      const img = document.createElement('img');
      img.src = s.src;
      img.alt = s.id;
      div.appendChild(img);
      reelEl.appendChild(div);
    }
    return items;
  }

  const strips = reels.map(r => buildStrip(r));

  // ── HUD update
  function updateHud(){
    hudT.textContent = tickets;
    hudD.textContent = dollax;
  }

  // ── Bet
  function setBet(v){
    bet = Math.max(1, Math.min(v, tickets || 1));
    betDisp.textContent = bet;
    document.querySelectorAll('.preset').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.v) === bet);
    });
  }

  document.getElementById('betMinus').onclick = () => setBet(bet - 1);
  document.getElementById('betPlus').onclick  = () => setBet(bet + 1);
  document.getElementById('presets').onclick  = e => {
    if(e.target.dataset.v) setBet(parseInt(e.target.dataset.v));
  };

  // ── Spin
  spinBtn.onclick = async () => {
    if(spinning) return;
    sfxClick();
    if(tickets < bet){ showMsg('Pas assez de tickets !', 'lose'); return; }

    spinning = true;
    spinBtn.disabled = true;
    machine.classList.remove('win','jackpot');
    machine.classList.add('spinning');
    hideMsg();

    // Appel API serveur
    let serverData = null;
    try {
      const token = localStorage.getItem('gacha_token_v1');
      const res = await fetch('/api/slots/spin', {
        method: 'POST',
        headers: { 'Content-Type':'application/json', 'Authorization':'Bearer ' + token },
        body: JSON.stringify({ bet })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        showMsg(err.error || 'Erreur serveur', 'lose');
        spinning = false; spinBtn.disabled = false;
        machine.classList.remove('spinning');
        return;
      }
      serverData = await res.json();
    } catch(e) {
      showMsg('Erreur réseau', 'lose');
      spinning = false; spinBtn.disabled = false;
      machine.classList.remove('spinning');
      return;
    }

    // Mapper les ids du serveur vers les objets SYMBOLS
    const results = serverData.result.map(id => SYMBOLS.find(s => s.id === id) || SYMBOLS[0]);

    // Mettre à jour les soldes depuis le serveur
    tickets = serverData.tickets ?? tickets;
    dollax  = serverData.dollax  ?? dollax;

    sfxRollStart();
    const promises = reels.map((reelEl, i) => spinReel(reelEl, strips[i], results[i], i * 180, i, false));
    Promise.all(promises).then(() => {
      finalize(results, serverData.gain, serverData.winType);
    });
  };

  function spinReel(reelEl, strip, targetSymbol, delay, reelIdx, isJackpot){
    return new Promise(resolve => {
      setTimeout(() => {
        const itemH = 110;
        const totalItems = strip.length;
        // Reset position
        reelEl.style.transform = 'translateY(0)';
        const spinTurns = 3 + Math.floor(Math.random()*3); // nb tours
        const target = spinTurns * totalItems;

        // Trouver un slot avec le bon symbole
        let landIdx = strip.findIndex(s => s.id === targetSymbol.id);
        if(landIdx === -1){
          strip[0] = targetSymbol;
          reelEl.children[0].querySelector('img').src = targetSymbol.src;
          landIdx = 0;
        }

        const finalPos = (target + landIdx) * itemH;

        // Animation JS manuelle
        let start = null;
        let from = 0;
        const duration = 900 + delay * 0.5;

        function easeOut(t){ return 1 - Math.pow(1-t, 3); }
        function easeInOut(t){ return t < .5 ? 2*t*t : -1+(4-2*t)*t; }

        function tick(ts){
          if(!start) start = ts;
          const elapsed = ts - start;
          const progress = Math.min(elapsed / duration, 1);

          // Accélère puis décélère
          let eased;
          if(progress < 0.3) eased = progress / 0.3 * 0.3;
          else eased = 0.3 + easeOut((progress - 0.3) / 0.7) * 0.7;

          const pos = eased * finalPos;
          // Loop circulaire
          const looped = pos % (totalItems * itemH);
          reelEl.style.transform = `translateY(-${looped}px)`;

          if(progress < 1) requestAnimationFrame(tick);
          else {
            // Snap sur la cible
            reelEl.style.transform = `translateY(-${landIdx * itemH}px)`;
            flashReel(reelIdx, isJackpot);
            resolve();
          }
        }
        requestAnimationFrame(tick);
      }, delay);
    });
  }

  function finalize(results, gain = 0, winType = 'none'){
    spinning = false;
    sfxRollStop();
    machine.classList.remove('spinning');
    spinBtn.disabled = false;
    setBet(bet);

    const isWin     = gain > 0;
    const isJackpot = winType === 'jackpot';
    let msg = '';

    if     (winType === 'jackpot') msg = `💎 JACKPOT ! +${gain} dollax`;
    else if(winType === 'triple')  msg = `✨ Triple ! +${gain} dollax`;
    else if(winType === 'pair')    msg = `👌 Paire ! +${gain} dollax`;
    else                           msg = `❌ Raté ! −${bet} ticket${bet>1?'s':''}`;

    updateHud();

    // Last gain
    const lgTxt = document.getElementById('lastGainTxt');
    const lgVal = document.getElementById('lastGainVal');
    const lgBox = document.getElementById('lastGain');
    lgBox.classList.add('has-value');
    if(gain > 0){
      lgTxt.textContent = 'Dernier gain';
      lgVal.textContent = '+' + gain + ' dollax';
      lgVal.className = 'lastGainVal';
      lgVal.style.display = '';
    } else {
      lgTxt.textContent = 'Dernier spin';
      lgVal.textContent = '−' + bet + ' ticket' + (bet>1?'s':'');
      lgVal.className = 'lastGainVal neg';
      lgVal.style.display = '';
    }
    // Relaunch pop animation
    void lgVal.offsetWidth;
    lgVal.classList.add('pop');

    machine.classList.toggle('win', isWin);
    machine.classList.toggle('jackpot', isJackpot);

    // ── Epic visual feedback
    if(isJackpot){
      shakeM(true);
      launchBurst();
      launchLightning(2800);
    } else if(isWin){
      shakeM(false);
    }
    if(gain > 0){
      popHud(hudD, isJackpot ? 'pop-gold' : 'pop-green');
      popHud(hudT, 'pop-green');
    }

    showMsg(msg, isWin ? 'win' : 'lose');
    if(gain > 0){ showGainAnim(gain); setTimeout(() => sfxWin(gain), 150); }
    if(isJackpot) launchConfetti(120);
    else if(isWin) launchConfetti(40);

    // Remet le pulse idle sur le bouton
    setTimeout(() => spinBtn.classList.add('ready-pulse'), 600);
  }

  function showMsg(txt, type){
    msgEl.textContent = txt;
    msgEl.className = 'resultMsg ' + type;
    requestAnimationFrame(() => msgEl.classList.add('show'));
  }
  function hideMsg(){
    msgEl.classList.remove('show');
  }

  function showGainAnim(amount){
    const el = document.getElementById('gainNumber');
    const lbl = document.getElementById('gainLabel');

    // Choisir le tier selon le montant
    let tier;
    if(amount >= 1000)      tier = 4; // JACKPOT vibes
    else if(amount >= 200)  tier = 3;
    else if(amount >= 50)   tier = 2;
    else                    tier = 1;

    // Reset
    el.className = 'gainNumber';
    lbl.className = 'gainLabel';
    el.textContent = '+' + amount;

    // Forcer reflow puis lancer
    void el.offsetWidth;
    el.classList.add('tier' + tier);
    lbl.classList.add('show');

    // Chroma glitch sur le jackpot via JS (compatible avec -webkit-text-fill-color:transparent)
    if(tier === 4){
      let glitchI = 0;
      const glitchFrames = [
        'translate(-3px,0) skewX(-2deg)',
        'translate(3px,0) skewX(2deg)',
        'translate(-2px,1px)',
        'translate(2px,-1px) skewX(-1deg)',
        'translate(0,0)',
      ];
      const gi = setInterval(() => {
        el.style.transform = glitchFrames[glitchI % glitchFrames.length];
        glitchI++;
      }, 80);
      setTimeout(() => { clearInterval(gi); el.style.transform = ''; }, 2400);
    }
  }

  // ── Confettis
  const COLORS = ['#ffd26e','#a855f7','#4a7fff','#ff5050','#50ffb0','#fff'];
  function launchConfetti(count){
    const box = document.getElementById('confettiBox');
    box.innerHTML = '';
    for(let i=0;i<count;i++){
      const el = document.createElement('div');
      el.className = 'confetto';
      el.style.left = Math.random()*100 + 'vw';
      el.style.background = COLORS[Math.floor(Math.random()*COLORS.length)];
      el.style.width = (6 + Math.random()*8) + 'px';
      el.style.height = (6 + Math.random()*8) + 'px';
      el.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
      const dur = 1.5 + Math.random()*1.5;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = Math.random()*0.6 + 's';
      box.appendChild(el);
      setTimeout(() => el.remove(), (dur + 0.6)*1000);
    }
  }

  // ── EPIC ANIMATIONS ──

  function shakeM(isJackpot){
    machine.classList.remove('shake','jackpot-shake');
    void machine.offsetWidth;
    machine.classList.add(isJackpot ? 'jackpot-shake' : 'shake');
    setTimeout(() => machine.classList.remove('shake','jackpot-shake'), isJackpot ? 700 : 500);
  }

  function flashReel(idx, isJackpot){
    const wrap = reels[idx].closest('.reelWrap');
    if(!wrap) return;
    const cls = isJackpot ? 'flash-reel-jackpot' : 'flash-reel';
    wrap.classList.remove(cls,'bounce','flash-reel-gold');
    void wrap.offsetWidth;
    wrap.classList.add(cls,'bounce');
    setTimeout(() => wrap.classList.remove(cls,'bounce','flash-reel-gold'), 600);
  }

  function popHud(el, type){
    el.classList.remove('pop-green','pop-gold');
    void el.offsetWidth;
    el.classList.add(type);
    setTimeout(() => el.classList.remove(type), 500);
  }

  const burstC   = document.getElementById('burstCanvas');
  const burstCtx = burstC.getContext('2d');
  let burstAnim  = null;

  function launchBurst(){
    burstC.width  = window.innerWidth;
    burstC.height = window.innerHeight;
    const cx = burstC.width  / 2;
    const cy = burstC.height / 2;
    const RAY_COUNT = 18;
    const CB = ['#ffd26e','#a855f7','#4a7fff','#ff5050','#50ffb0','#fff','#ff9a3c'];
    let t = 0;
    const rays = Array.from({length:RAY_COUNT}, (_,i) => ({
      angle: (i/RAY_COUNT)*Math.PI*2 + Math.random()*0.2,
      len:   80 + Math.random()*200,
      width: 1.5 + Math.random()*3,
      color: CB[Math.floor(Math.random()*CB.length)],
      speed: 0.6 + Math.random()*0.8,
      delay: Math.random()*0.3,
    }));
    if(burstAnim) cancelAnimationFrame(burstAnim);
    function drawB(){
      burstCtx.clearRect(0,0,burstC.width,burstC.height);
      t += 0.022;
      let alive = false;
      rays.forEach(r => {
        if(t < r.delay) return;
        const p = Math.min((t-r.delay)/1.8, 1);
        const a = p < 0.15 ? p/0.15 : 1-((p-0.15)/0.85);
        if(a <= 0) return;
        alive = true;
        const curLen = Math.min(r.len*(1+t*r.speed*2.5), r.len*4.5);
        burstCtx.save();
        burstCtx.globalAlpha = a*0.75;
        burstCtx.strokeStyle = r.color;
        burstCtx.lineWidth   = r.width*(1-p*0.5);
        burstCtx.lineCap     = 'round';
        burstCtx.beginPath();
        burstCtx.moveTo(cx,cy);
        burstCtx.lineTo(cx+Math.cos(r.angle+t*0.04)*curLen, cy+Math.sin(r.angle+t*0.04)*curLen);
        burstCtx.stroke();
        burstCtx.restore();
      });
      if(alive && t<3.5) burstAnim = requestAnimationFrame(drawB);
      else { burstCtx.clearRect(0,0,burstC.width,burstC.height); burstAnim=null; }
    }
    drawB();
  }

  const lightC   = document.getElementById('lightningCanvas');
  const lightCtx = lightC.getContext('2d');
  let lightTimer = null;

  function drawBolt(x1,y1,x2,y2,branches){
    const mx = (x1+x2)/2 + (Math.random()-0.5)*(Math.abs(y2-y1)*0.6);
    const my = (y1+y2)/2;
    lightCtx.beginPath();
    lightCtx.moveTo(x1,y1); lightCtx.lineTo(mx,my); lightCtx.lineTo(x2,y2);
    lightCtx.strokeStyle = `rgba(180,210,255,${0.5+Math.random()*0.5})`;
    lightCtx.lineWidth   = 1+Math.random()*1.5;
    lightCtx.shadowColor = '#a0c0ff';
    lightCtx.shadowBlur  = 8;
    lightCtx.stroke();
    if(branches>0 && Math.random()>0.4) drawBolt(mx,my,mx+(Math.random()-0.5)*120,my+60+Math.random()*80,branches-3);
  }

  function drawLightningFrame(){
    lightC.width=window.innerWidth; lightC.height=window.innerHeight;
    lightCtx.clearRect(0,0,lightC.width,lightC.height);
    const n = 4+Math.floor(Math.random()*4);
    for(let i=0;i<n;i++) drawBolt(Math.random()*lightC.width,0,Math.random()*lightC.width-lightC.width/2+Math.random()*300,lightC.height*(0.4+Math.random()*0.5),8);
    lightC.style.opacity='1';
    setTimeout(()=>{ lightC.style.opacity='0'; lightCtx.clearRect(0,0,lightC.width,lightC.height); },80);
  }

  function launchLightning(duration){
    const end = Date.now()+duration;
    function loop(){ if(Date.now()>end) return; drawLightningFrame(); lightTimer=setTimeout(loop,80+Math.random()*120); }
    loop();
  }

  // ── SFX (Web Audio API) ──
  const SFX_KEY = 'gacha_sfx_v1';
  let sfxOn = (localStorage.getItem(SFX_KEY) ?? '1') === '1';
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function resumeCtx(){ if(audioCtx.state === 'suspended') audioCtx.resume(); }

  // Générateur de son de base
  function playTone({ type='sine', freq=440, freq2=null, duration=0.15, volume=0.18, attack=0.01, decay=0.05, release=0.09, delay=0 }){
    if(!sfxOn) return;
    resumeCtx();
    setTimeout(() => {
      const osc   = audioCtx.createOscillator();
      const gain  = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = type;
      const t = audioCtx.currentTime;
      osc.frequency.setValueAtTime(freq, t);
      if(freq2) osc.frequency.linearRampToValueAtTime(freq2, t + duration * 0.6);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(volume, t + attack);
      gain.gain.setValueAtTime(volume, t + attack + decay);
      gain.gain.linearRampToValueAtTime(0, t + duration);
      osc.start(t);
      osc.stop(t + duration + release);
    }, delay);
  }

  // Bruit blanc filtré (pour le roulement)
  function playNoise({ duration=0.08, volume=0.06, freq=800, delay=0 }){
    if(!sfxOn) return;
    resumeCtx();
    setTimeout(() => {
      const bufSize = audioCtx.sampleRate * duration;
      const buf  = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0;i<bufSize;i++) data[i] = Math.random()*2-1;
      const src    = audioCtx.createBufferSource();
      const filter = audioCtx.createBiquadFilter();
      const gain   = audioCtx.createGain();
      src.buffer = buf;
      filter.type = 'bandpass';
      filter.frequency.value = freq;
      filter.Q.value = 0.8;
      src.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      gain.gain.setValueAtTime(volume, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
      src.start();
    }, delay);
  }

  // ── Sons spécifiques ──

  function sfxClick(){
    playTone({ type:'sine', freq:520, freq2:480, duration:0.06, volume:0.12, attack:0.005, decay:0.01 });
  }

  let rollInterval = null;
  function sfxRollStart(){
    if(!sfxOn) return;
    let tick = 0;
    rollInterval = setInterval(() => {
      const freqs = [180, 200, 220, 240, 260];
      playNoise({ duration:0.045, volume:0.07, freq: freqs[tick % freqs.length] });
      tick++;
    }, 60);
  }
  function sfxRollStop(){
    if(rollInterval){ clearInterval(rollInterval); rollInterval = null; }
    // Clunk d'arrêt
    playTone({ type:'square', freq:120, freq2:80, duration:0.12, volume:0.14, attack:0.005, decay:0.02 });
  }

  function sfxWin(gain){
    if(gain >= 1000){
      // Jackpot — fanfare montante
      [0,120,240,360,480].forEach((d,i) => {
        const notes = [523,659,784,1047,1319];
        playTone({ type:'triangle', freq:notes[i], duration:0.22, volume:0.18, attack:0.01, delay:d });
      });
      // Shimmer
      [0,80,160,240,320,400].forEach(d => {
        playTone({ type:'sine', freq:2000+Math.random()*1000, duration:0.08, volume:0.06, attack:0.005, delay:d });
      });
    } else if(gain >= 200){
      // Gros gain — accord majeur
      playTone({ type:'triangle', freq:523, duration:0.3, volume:0.15, attack:0.01 });
      playTone({ type:'triangle', freq:659, duration:0.3, volume:0.13, attack:0.01, delay:80 });
      playTone({ type:'triangle', freq:784, duration:0.3, volume:0.12, attack:0.01, delay:160 });
    } else {
      // Petit gain — ding simple
      playTone({ type:'sine', freq:880, freq2:1100, duration:0.18, volume:0.14, attack:0.01 });
      playTone({ type:'sine', freq:1100, duration:0.14, volume:0.10, attack:0.01, delay:120 });
    }
  }

  // Bouton toggle SFX (on réutilise la même logique que l'index)
  // (pas d'UI dédiée ici, contrôlé par la même clé localStorage)

  // ── Init : charger les vraies données depuis le serveur
  async function initFromServer() {
    try {
      const token = localStorage.getItem('gacha_token_v1');
      if (!token) {
        spinBtn.disabled = true;
        spinBtn.textContent = '🔒 Connecte-toi pour jouer';
        return;
      }
      const res = await fetch('/api/tickets', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!res.ok) throw new Error('API error');
      const data = await res.json();
      tickets = data.tickets ?? 0;
      dollax  = data.dollax  ?? 0;
      updateHud();
      // Réactiver le bouton spin maintenant qu'on est connecté
      spinBtn.disabled = false;
      spinBtn.textContent = '🎰 SPIN';
      if (data.nextTicketInMs > 0 && tickets < data.ticketCap) {
        startTicketCountdown(data.nextTicketInMs);
      }
    } catch(e) {
      console.warn('Impossible de charger depuis le serveur:', e);
    }
  }

  function startTicketCountdown(ms) {
    let remaining = ms;
    const timerEl = document.getElementById('nextTicketTimer');
    const iv = setInterval(() => {
      remaining -= 1000;
      if (remaining <= 0) {
        clearInterval(iv);
        if(timerEl) timerEl.textContent = '';
        initFromServer();
        return;
      }
      const h = Math.floor(remaining / 3600000);
      const m = Math.floor((remaining % 3600000) / 60000);
      const s = Math.floor((remaining % 60000) / 1000);
      if(timerEl) timerEl.textContent = '· ' + (h ? h+'h ' : '') + m+'m ' + String(s).padStart(2,'0')+'s';
    }, 1000);
  }

  // Pulse idle sur le bouton spin
  function addReadyPulse(){
    setTimeout(() => spinBtn.classList.add('ready-pulse'), 400);
  }
  spinBtn.addEventListener('mousedown', () => spinBtn.classList.remove('ready-pulse'));

  // Resize canvases
  window.addEventListener('resize', () => {
    burstC.width  = window.innerWidth;
    burstC.height = window.innerHeight;
    lightC.width  = window.innerWidth;
    lightC.height = window.innerHeight;
  });

  // Re-add pulse après chaque spin terminé
  const _origFinalize = finalize;
  window._finalizeHooked = true;

  updateHud();
  initFromServer();
  addReadyPulse();
</script>
</body>
</html>

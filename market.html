<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Market — Gachax</title>

<style>
:root{
  --bg1:#05060d; --bg2:#090b18;

  /* glass */
  --glassA: rgba(255,255,255,.055);
  --glassB: rgba(255,255,255,.035);

  /* ultra soft lines (ANTI GRILLE) */
  --line:  rgba(255,255,255,.055);
  --line2: rgba(255,255,255,.085);

  --text: rgba(255,255,255,.92);
  --muted: rgba(255,255,255,.70);
  --muted2: rgba(255,255,255,.56);

  --blue: rgba(80,130,255,.95);
  --pink: rgba(255,80,220,.85);

  --shadow: 0 18px 70px rgba(0,0,0,.40);
  --shadow2: 0 14px 34px rgba(0,0,0,.36);
  --inset: inset 0 1px 0 rgba(255,255,255,.05);

  --r20: 20px;
  --r18: 18px;
  --r16: 16px;
  --r14: 14px;
  --r12: 12px;
}

*{ box-sizing:border-box }
html,body{ height:100% }

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial;
  color:var(--text);
  background:
    radial-gradient(900px 520px at 20% 10%, rgba(80,130,255,.22), transparent 60%),
    radial-gradient(900px 600px at 85% 30%, rgba(255,80,220,.18), transparent 62%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
  background-attachment: fixed;
  overflow-x:hidden;
}

/* Scrollbars (dark, cohérent DA) */
*{ scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.14) rgba(0,0,0,.18); }
*::-webkit-scrollbar{ width:10px; height:10px; }
*::-webkit-scrollbar-track{ background: rgba(0,0,0,.18); border-radius:999px; }
*::-webkit-scrollbar-thumb{
  background: rgba(255,255,255,.14);
  border:2px solid rgba(0,0,0,0);
  background-clip: padding-box;
  border-radius:999px;
}
*::-webkit-scrollbar-thumb:hover{ background: rgba(255,255,255,.20); }

/* Layout */
.wrap{
  width:min(1240px, 95vw);
  margin:18px auto 44px;
  display:grid;
  gap:14px;
}

/* Topbar sticky */
.topbar{
  position:sticky;
  top:10px;
  z-index:20;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 12px;
  border-radius:22px;
  background: linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.035));
  border: 1px solid var(--line);
  backdrop-filter: blur(12px);
  box-shadow: var(--shadow), var(--inset);
  gap:12px;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  min-width: 260px;
}
.brandLeft{
  display:flex;
  align-items:center;
  gap:12px;
  min-width: 0;
}
.logo{
  width:40px;height:40px;border-radius:14px;
  background:
    radial-gradient(18px 18px at 30% 30%, rgba(255,255,255,.25), transparent 60%),
    linear-gradient(135deg, rgba(80,130,255,.30), rgba(255,80,220,.22));
  box-shadow: 0 10px 30px rgba(0,0,0,.35);
}

.profileMini{
  display:flex;
  align-items:center;
  gap:10px;
  padding:6px 10px;
  border-radius:999px;
  background: rgba(0,0,0,.18);
  border: 1px solid rgba(255,255,255,.06);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
}
.avatarWrap{
  width:30px; height:30px;
  border-radius:12px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.10);
  background: rgba(0,0,0,.22);
  box-shadow: 0 0 0 1px rgba(255,255,255,.04);
  flex: 0 0 auto;
}
.avatarImg{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.avatarFallback{
  width:100%;
  height:100%;
  display:grid;
  place-items:center;
  font-weight:1000;
  font-size:12px;
  color: rgba(255,255,255,.90);
  background:
    radial-gradient(16px 16px at 30% 30%, rgba(255,255,255,.18), transparent 60%),
    linear-gradient(135deg, rgba(80,130,255,.22), rgba(255,80,220,.16));
}
.subTop{
  font-size:12px;
  color:var(--muted);
  margin-top:2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width: 420px;
}
.brand b{ letter-spacing:.4px }

/* Controls */
.controls{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  justify-content:flex-end;
}

input, select{
  padding:9px 10px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.06); /* ultra soft */
  background: linear-gradient(180deg, rgba(15,17,26,.88), rgba(15,17,26,.72));
  color:#fff;
  font-weight:800;
  outline:none;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
}
input::placeholder{ color: rgba(255,255,255,.45); font-weight:800 }
input:focus, select:focus{
  border-color: rgba(130,170,255,.28);
  box-shadow:
    0 0 0 3px rgba(80,130,255,.12),
    inset 0 1px 0 rgba(255,255,255,.05);
}

button{
  padding:9px 12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.06); /* ultra soft */
  background: linear-gradient(180deg, rgba(255,255,255,.085), rgba(255,255,255,.045));
  color:#fff;
  font-weight:1000;
  cursor:pointer;
  transition: transform .08s ease, box-shadow .12s ease, border-color .12s ease, background .12s ease;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
}
button:hover{
  border-color: rgba(255,255,255,.10);
  box-shadow: 0 10px 22px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.06);
}
button:active{ transform: translateY(1px) scale(.99); }
button:disabled{ opacity:.55; cursor:not-allowed; }

.btnGhost{ background: rgba(0,0,0,.16); }
.btnPrimary{
  background: linear-gradient(135deg, rgba(80,130,255,.22), rgba(255,80,220,.14));
  border-color: rgba(255,255,255,.10);
}

/* Pills */
.pill{
  display:inline-flex;
  gap:8px;
  align-items:center;
  padding:7px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.06); /* ultra soft */
  background: linear-gradient(180deg, rgba(0,0,0,.22), rgba(0,0,0,.12));
  font-size:12px;
  font-weight:1000;
  white-space:nowrap;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
}
.pill.soft{ background: rgba(255,255,255,.045); }
.pill.blue{ border-color: rgba(80,130,255,.20); }
.pill.pink{ border-color: rgba(255,80,220,.18); }

.dollaxIcon{ width:18px; height:18px; object-fit:contain; display:inline-block; }

/* Panels */
.panel{
  border-radius:22px;
  background: linear-gradient(180deg, var(--glassA), var(--glassB));
  border:1px solid var(--line);
  padding:14px;
  backdrop-filter:blur(10px);
  box-shadow: var(--shadow), var(--inset);
}

/* Grid layout */
.grid2{
  display:grid;
  grid-template-columns: 1.2fr .8fr;
  gap:14px;
}
@media (max-width: 980px){ .grid2{ grid-template-columns:1fr; } }

.hrow{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  justify-content:space-between;
}
.hrow b{ letter-spacing:.5px }
.msg{ opacity:.82; font-size:13px; white-space:pre-line; margin-top:8px; color: var(--muted); }

/* KPI cluster */
.kpi{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

/* Filters (checkbox no-white) */
.filtersBar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  justify-content:flex-start;
  margin-top:10px;
}
.fChip{
  display:inline-flex;
  gap:10px;
  align-items:center;
  padding:8px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.06); /* ultra soft */
  background: rgba(0,0,0,.14);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
  font-size:12px;
  font-weight:1000;
}
.fChip span{ color: rgba(255,255,255,.86); }
.cb{
  -webkit-appearance:none;
  appearance:none;
  width:16px; height:16px;
  border-radius:6px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.20);
  display:grid;
  place-items:center;
  cursor:pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
}
.cb:checked{
  border-color: rgba(80,130,255,.40);
  background: rgba(80,130,255,.22);
}
.cb:checked::after{
  content:"";
  width:8px; height:8px;
  border-radius:3px;
  background: rgba(255,255,255,.92);
  box-shadow: 0 0 18px rgba(80,130,255,.20);
}
.fMiniSelect, .fMiniInput{
  padding:7px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.06);
  background: rgba(15,17,26,.78);
  color:#fff;
  font-weight:900;
  outline:none;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
}
.fMiniInput{ width:92px; }
.fLabel{ color: rgba(255,255,255,.72); font-weight:1000; }

/* Market grid */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}
@media (max-width: 1100px){ .grid{ grid-template-columns:repeat(3,1fr); } }
@media (max-width: 720px){ .grid{ grid-template-columns:repeat(2,1fr); } }

/* Card (ANTI GRILLE: border ultra soft + shadow) */
.card{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.055);
  background: linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.035));
  box-shadow: 0 10px 26px rgba(0,0,0,.26), inset 0 1px 0 rgba(255,255,255,.045);
  transition: transform .14s ease, box-shadow .14s ease, border-color .14s ease;
}
.card:hover{
  transform: translateY(-2px);
  border-color: rgba(255,255,255,.09);
  box-shadow: var(--shadow2), inset 0 1px 0 rgba(255,255,255,.05);
}

.cardHead{ position:relative; padding:10px; padding-bottom:0; }
.cardImg{
  height:200px;
  border-radius:16px;
  background:center/contain no-repeat;
  background-color: rgba(0,0,0,.22);
  border:1px solid rgba(255,255,255,.055); /* ultra soft */
  cursor:pointer;
}

/* Overlays more readable */
.cardOverlay{
  position:absolute;
  inset:10px 10px auto 10px;
  display:flex;
  justify-content:space-between;
  gap:8px;
  pointer-events:none;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:7px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:1000;
  background: rgba(0,0,0,.52);           /* + foncé => lisible */
  border:1px solid rgba(255,255,255,.06); /* ultra soft */
  color: rgba(255,255,255,.92);
  text-shadow: 0 1px 10px rgba(0,0,0,.55);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
}
.badgePrice{
  background: linear-gradient(135deg, rgba(80,130,255,.26), rgba(255,80,220,.18));
  border-color: rgba(255,255,255,.09);
}
.badgePrice b{ font-weight:1100; }

/* Card body */
.cardBody{
  padding:10px 12px 12px;
  display:grid;
  gap:8px;
}
.titleRow{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
}
.cardTitle{
  font-weight:1100;
  line-height:1.1;
  font-size:14px;
  cursor:pointer;
}
.cardSet{
  font-size:12px;
  color: var(--muted);
}
.metaRow{
  display:flex; gap:8px; flex-wrap:wrap; align-items:center;
}
.small{ font-size:12px; color: var(--muted2); }
.sep{ border:none; border-top:1px solid rgba(255,255,255,.06); margin:12px 0; }

/* Stepper with ONE border (no grid effect) */
.stepper{
  display:inline-flex;
  align-items:center;
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.06);  /* ONE outline only */
  background: rgba(0,0,0,.18);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
}
.stepper > *{
  border:0 !important;
  border-radius:0 !important;
  background: transparent !important;
  box-shadow:none !important;
}
.stepper > * + *{
  border-left:1px solid rgba(255,255,255,.045); /* ultra light separator */
}
.stepper button{
  padding:8px 10px;
  font-weight:1100;
  min-width:34px;
}
.stepper input{
  width:44px;
  text-align:center;
  padding:8px 10px;
  font-weight:1000;
  color:#fff;
  outline:none;
}

/* Buy row */
.buyRow{
  display:flex;
  gap:10px;
  align-items:center;
  margin-top:2px;
}
.buyBtn{
  margin-left:auto;
  padding:10px 12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.07);
  background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
  font-weight:1100;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
}
.buyBtn:hover{
  border-color: rgba(255,255,255,.10);
  box-shadow: 0 10px 22px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.06);
}

/* Right sections */
.sectionTitle{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:10px;
}
.sectionTitle .hint{ font-size:12px; color: var(--muted); }

/* Collection selectable */
.selGrid{
  margin-top:12px;
  max-height:420px;
  overflow:auto;
  padding-right:6px;
}
.selCard{ cursor:pointer; }
.selCard.selected{
  border-color: rgba(130,170,255,.20);
  box-shadow:
    0 16px 44px rgba(0,0,0,.40),
    0 0 0 4px rgba(80,130,255,.10),
    inset 0 1px 0 rgba(255,255,255,.05);
}

/* My listings list */
.list{ display:grid; gap:10px; margin-top:12px; }
.itemRow{
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
  padding:12px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.055); /* ultra soft */
  background: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.030));
  box-shadow: 0 10px 26px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.04);
}
.itemRow:hover{
  border-color: rgba(255,255,255,.09);
  box-shadow: var(--shadow2), inset 0 1px 0 rgba(255,255,255,.05);
}
.thumb{
  width:42px;height:58px;border-radius:14px;
  background:center/cover no-repeat;
  border:1px solid rgba(255,255,255,.055);
  cursor:pointer;
}
.spacer{ flex:1 1 auto; }

/* Modal */
.modalBack{
  position:fixed; inset:0;
  display:none;
  place-items:center;
  padding:16px;
  background: rgba(0,0,0,.58);
  backdrop-filter: blur(10px);
  z-index:50;
}
.modal{
  width:min(900px, 96vw);
  border-radius:24px;
  border:1px solid rgba(255,255,255,.10);
  background: linear-gradient(180deg, rgba(20,22,34,.92), rgba(12,13,22,.92));
  box-shadow: 0 30px 120px rgba(0,0,0,.60);
  overflow:hidden;
}
.modalInner{ display:grid; grid-template-columns: 1.05fr .95fr; }
@media (max-width: 880px){ .modalInner{ grid-template-columns:1fr; } }
.modalImg{
  min-height:360px;
  background:center/contain no-repeat;
  background-color: rgba(0,0,0,.25);
  border-right:1px solid rgba(255,255,255,.06);
}
@media (max-width: 880px){
  .modalImg{ border-right:none; border-bottom:1px solid rgba(255,255,255,.06); }
}
.modalBody{ padding:14px; display:grid; gap:10px; }
.modalTop{ display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
.modalTitle{ font-size:18px; font-weight:1100; line-height:1.1; }
.modalClose{ padding:8px 10px; border-radius:14px; background: rgba(255,255,255,.08); }
.note{ font-size:12px; color: var(--muted); }
</style>
</head>

<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="brandLeft">
        <div class="logo" aria-hidden="true"></div>
        <div style="min-width:0">
          <div><b>Gachax</b> <span style="opacity:.7">— Market</span></div>
          <div class="subTop" id="subTop"></div>
        </div>
      </div>

      <!-- ✅ avatar + fallback -->
      <div class="profileMini" title="Profil" onclick="location.href='/profile.html'" style="cursor:pointer;">
        <div class="avatarWrap" id="avatarWrap">
          <div class="avatarFallback" id="avatarFallback">?</div>
          <img id="avatarImg" class="avatarImg" alt="avatar" style="display:none;">
        </div>
        <span class="small" id="miniName" style="color:rgba(255,255,255,.78);">...</span>
      </div>
    </div>

    <div class="controls">
      <select id="gameSel" title="Jeu">
        <option value="pokemon">Pokémon</option>
        <option value="onepiece">One Piece</option>
        <option value="lorcana">Lorcana</option>
      </select>

      <div class="pill blue">
        <img src="dollax.png" alt="Dollax" class="dollaxIcon">
        <span id="money">0</span>
      </div>

      <input id="search" placeholder="Rechercher... (nom ou set)">
      <select id="sort">
        <option value="recent">Plus récents</option>
        <option value="price">Prix (bas → haut)</option>
        <option value="grade">Grade (haut → bas)</option>
        <option value="name">Nom A-Z</option>
      </select>

      <button class="btnGhost" onclick="location.href='/collection.html'">COLLECTION</button>
      <button class="btnGhost" onclick="location.href='/'">← Retour</button>
    </div>
  </div>

  <div class="grid2">

    <!-- MARKET -->
    <div class="panel">
      <div class="hrow">
        <b>Ventes en cours</b>
        <div class="kpi">
          <span class="pill soft" id="kpiCount">0 offres</span>
          <span class="pill soft" id="kpiRange">—</span>
          <button id="refresh">Rafraîchir</button>
        </div>
      </div>

      <!-- Filters -->
      <div class="filtersBar">
        <div class="fChip" title="Afficher seulement les cartes MINT">
          <input class="cb" type="checkbox" id="fMint">
          <span>MINT only</span>
        </div>

        <div class="fChip" title="Masquer tes propres ventes">
          <input class="cb" type="checkbox" id="fHideMine">
          <span>Masquer mes ventes</span>
        </div>

        <div class="fChip" title="Filtrer par grade minimum">
          <span class="fLabel">Grade min</span>
          <select class="fMiniSelect" id="fGradeMin">
            <option value="0">0</option>
            <option value="5">5</option>
            <option value="7">7</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
        </div>

        <div class="fChip" title="Prix maximum">
          <span class="fLabel">Prix max</span>
          <input class="fMiniInput" id="fPriceMax" type="number" min="0" placeholder="∞">
        </div>
      </div>

      <div class="msg" id="msgMarket"></div>
      <div class="grid" id="marketGrid" style="margin-top:12px;"></div>
    </div>

    <!-- SELL + MINE -->
    <div class="panel">
      <div class="sectionTitle">
        <b>Mettre en vente</b>
        <span class="hint">Sélectionne une carte</span>
      </div>

      <div class="msg" id="msgSell"></div>

      <div class="buyRow" style="margin-top:10px;">
        <div class="fChip" title="Prix unitaire">
          <span class="fLabel">Prix</span>
          <input class="fMiniInput" id="price" type="number" min="1" value="5" style="width:110px">
        </div>

        <div class="stepper" title="Quantité">
          <button id="qMinus" type="button">−</button>
          <input id="qty" type="number" min="1" value="1">
          <button id="qPlus" type="button">+</button>
        </div>

        <button id="btnList" class="btnPrimary" disabled>VENDRE</button>
      </div>

      <div class="note" id="selected" style="margin-top:10px;">Aucune carte sélectionnée.</div>

      <hr class="sep">

      <div class="sectionTitle">
        <b>Ta collection (sélection)</b>
        <span class="hint">scroll • clique pour choisir</span>
      </div>

      <div class="filtersBar" style="margin-top:10px;">
        <div class="fChip" title="Recherche rapide dans ta collection">
          <span>🔎</span>
          <input class="fMiniInput" id="mySearch" placeholder="Filtrer..." style="width:170px">
        </div>
        <div class="fChip" title="Trier ta sélection">
          <span class="fLabel">Trier</span>
          <select class="fMiniSelect" id="mySort">
            <option value="recent">Récents</option>
            <option value="grade">Grade</option>
            <option value="name">Nom</option>
            <option value="count">Qté</option>
          </select>
        </div>
      </div>

      <div class="grid selGrid" id="myCollectionGrid"></div>

      <hr class="sep">

      <div class="sectionTitle">
        <b>Mes ventes</b>
        <button id="reloadMine">Recharger</button>
      </div>
      <div class="msg" id="msgMine"></div>
      <div class="list" id="mineList"></div>
    </div>

  </div>
</div>

<!-- Modal -->
<div class="modalBack" id="modalBack" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modalInner">
      <div class="modalImg" id="modalImg"></div>
      <div class="modalBody">
        <div class="modalTop">
          <div>
            <div class="modalTitle" id="modalTitle"></div>
            <div class="note" id="modalSub"></div>
          </div>
          <button class="modalClose" id="modalClose" type="button">✕</button>
        </div>

        <div class="metaRow" id="modalBadges"></div>

        <div class="sep"></div>

        <div class="buyRow">
          <div class="stepper">
            <button id="mMinus" type="button">−</button>
            <input id="mQty" type="number" min="1" value="1">
            <button id="mPlus" type="button">+</button>
          </div>
          <button class="btnPrimary" id="mBuy" style="margin-left:auto;" type="button">Acheter</button>
        </div>

        <div class="note" id="modalNote"></div>
      </div>
    </div>
  </div>
</div>

<script>
const TOKEN_KEY = "gacha_token_v1";
const GAME_KEY  = "gacha_game_v1";

const TOKEN = localStorage.getItem(TOKEN_KEY);
if(!TOKEN) location.href="/login.html";

function currentGame(){
  const g = String(localStorage.getItem(GAME_KEY) || "pokemon").toLowerCase();
  if (g === "onepiece") return "onepiece";
  if (g === "lorcana")  return "lorcana";
  return "pokemon";
}

async function api(path, opts={}){
  const g = encodeURIComponent(currentGame());
  const sep = path.includes("?") ? "&" : "?";
  const url = path + sep + "game=" + g;

  const r = await fetch(url, {
    ...opts,
    headers:{
      ...(opts.headers || {}),
      "Authorization":"Bearer " + localStorage.getItem(TOKEN_KEY),
      "Content-Type":"application/json"
    }
  });

  const data = await r.json().catch(()=> ({}));
  if(!r.ok) throw new Error(data.error || ("HTTP " + r.status));
  return data;
}

function escapeHtml(s){
  return String(s||"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function clamp(n, a, b){ return Math.max(a, Math.min(b, n)); }
function gameTag(g){
  if (g === "onepiece") return "🟥 One Piece";
  if (g === "lorcana")  return "🟦 Lorcana";
  return "🟨 Pokémon";
}
function fmtCardLine(x){
  const setName = x.setName || x.set || "";
  return `${x.name} • ${setName} • Grade ${x.grade}${x.mint ? " (MINT)" : ""}`;
}
function show(el, t){ el.textContent = t || ""; }

/* DOM */
const gameSel = document.getElementById("gameSel");
const subTop = document.getElementById("subTop");
const moneyEl = document.getElementById("money");
const miniName = document.getElementById("miniName");

const avatarImg = document.getElementById("avatarImg");
const avatarFallback = document.getElementById("avatarFallback");

const searchEl = document.getElementById("search");
const sortEl = document.getElementById("sort");
const refreshBtn = document.getElementById("refresh");

const msgMarket = document.getElementById("msgMarket");
const marketGrid = document.getElementById("marketGrid");

const fMint = document.getElementById("fMint");
const fHideMine = document.getElementById("fHideMine");
const fGradeMin = document.getElementById("fGradeMin");
const fPriceMax = document.getElementById("fPriceMax");

const kpiCount = document.getElementById("kpiCount");
const kpiRange = document.getElementById("kpiRange");

const msgSell = document.getElementById("msgSell");
const myCollectionGrid = document.getElementById("myCollectionGrid");
const selectedEl = document.getElementById("selected");
const priceEl = document.getElementById("price");
const qtyEl = document.getElementById("qty");
const btnList = document.getElementById("btnList");
const qMinus = document.getElementById("qMinus");
const qPlus = document.getElementById("qPlus");

const mySearch = document.getElementById("mySearch");
const mySort = document.getElementById("mySort");

const reloadMine = document.getElementById("reloadMine");
const msgMine = document.getElementById("msgMine");
const mineList = document.getElementById("mineList");

/* Modal */
const modalBack = document.getElementById("modalBack");
const modalClose = document.getElementById("modalClose");
const modalImg = document.getElementById("modalImg");
const modalTitle = document.getElementById("modalTitle");
const modalSub = document.getElementById("modalSub");
const modalBadges = document.getElementById("modalBadges");
const modalNote = document.getElementById("modalNote");
const mMinus = document.getElementById("mMinus");
const mPlus  = document.getElementById("mPlus");
const mQty   = document.getElementById("mQty");
const mBuy   = document.getElementById("mBuy");

/* State */
let me = null;
let myItems = [];
let selectedItem = null;
let lastMarketListings = [];
let modalListing = null;

gameSel.value = currentGame();
gameSel.addEventListener("change", async () => {
  localStorage.setItem(GAME_KEY, gameSel.value);
  await boot();
});

/* ✅ Avatar: charge depuis /api/profile/me si dispo, sinon fallback initiale */
async function loadAvatar(){
  // fallback par défaut
  const initial = (me?.name || "?").trim().slice(0,1).toUpperCase() || "?";
  avatarFallback.textContent = initial;
  avatarImg.style.display = "none";
  avatarFallback.style.display = "grid";

  try{
    const prof = await fetch("/api/profile/me", {
      headers:{
        "Authorization":"Bearer " + localStorage.getItem(TOKEN_KEY),
        "Content-Type":"application/json"
      }
    }).then(r => r.ok ? r.json() : Promise.reject(new Error("no profile")));
    const url = String(prof?.avatar || "").trim();
    if(!url) return;

    avatarImg.onload = () => {
      avatarFallback.style.display = "none";
      avatarImg.style.display = "block";
    };
    avatarImg.onerror = () => {
      avatarImg.style.display = "none";
      avatarFallback.style.display = "grid";
    };
    avatarImg.src = url;
  }catch{
    // ok: on garde fallback
  }
}

/* Quantity steppers */
function syncSellQty(delta){
  const max = selectedItem ? Number(selectedItem.count||1) : 9999;
  const cur = Number(qtyEl.value||1)|0;
  qtyEl.value = String(clamp(cur + delta, 1, max));
}
qMinus.onclick = ()=> syncSellQty(-1);
qPlus.onclick  = ()=> syncSellQty(+1);
qtyEl.addEventListener("input", ()=> syncSellQty(0));

function syncModalQty(delta){
  if (!modalListing) return;
  const max = Number(modalListing.qty||1);
  const cur = Number(mQty.value||1)|0;
  mQty.value = String(clamp(cur + delta, 1, max));
}
mMinus.onclick = ()=> syncModalQty(-1);
mPlus.onclick  = ()=> syncModalQty(+1);
mQty.addEventListener("input", ()=> syncModalQty(0));

/* Modal */
function openModal(listing){
  modalListing = listing;
  modalImg.style.backgroundImage = `url('${listing.image}')`;
  modalTitle.textContent = listing.name || "Carte";
  modalSub.textContent = `${listing.setName || ""} • ${gameTag(listing.game || currentGame())}`;

  const mintTxt = listing.mint ? "MINT" : "Normal";
  modalBadges.innerHTML = `
    <span class="pill soft">Grade ${escapeHtml(listing.grade)}</span>
    <span class="pill soft">${mintTxt}</span>
    <span class="pill soft">Stock ${escapeHtml(listing.qty)}</span>
    <span class="pill blue"><img src="dollax.png" class="dollaxIcon" alt=""> <b>${escapeHtml(listing.price)}</b></span>
  `;

  mQty.value = String(clamp(1, 1, Number(listing.qty||1)));
  modalNote.textContent = `Vendeur: ${listing.sellerName || ("#" + listing.sellerUserId)}`;
  modalBack.style.display = "grid";
}
function closeModal(){
  modalBack.style.display = "none";
  modalListing = null;
}
modalClose.onclick = closeModal;
modalBack.addEventListener("click", (e)=>{ if(e.target === modalBack) closeModal(); });
window.addEventListener("keydown", (e)=>{ if(e.key === "Escape") closeModal(); });

mBuy.onclick = async () => {
  if(!modalListing) return;
  try{
    const want = clamp(Number(mQty.value||1)|0, 1, Number(modalListing.qty||1));
    await api("/api/market/buy", { method:"POST", body: JSON.stringify({ listingId: modalListing.id, qty: want }) });
    closeModal();
    await boot(true);
  }catch(e){
    alert("❌ " + e.message);
  }
};

async function loadMe(){
  me = await api("/api/me", { method:"GET", headers:{} });
  moneyEl.textContent = me.money ?? 0;
  miniName.textContent = me.name || "...";
  subTop.textContent = `Connecté • ${me.name} • Code ami: ${me.friendCode} • ${gameTag(currentGame())}`;
  await loadAvatar();
}

function applyMarketFilters(listings){
  const mintOnly = !!fMint.checked;
  const hideMine = !!fHideMine.checked;
  const gradeMin = Number(fGradeMin.value||0);
  const priceMax = Number(fPriceMax.value||0);

  return (listings || []).filter(l => {
    if (mintOnly && !l.mint) return false;
    if (hideMine && me && (String(l.sellerName||"") === String(me.name||""))) return false;
    if (gradeMin && Number(l.grade||0) < gradeMin) return false;
    if (priceMax && Number(l.price||0) > priceMax) return false;
    return true;
  });
}

function updateKpis(listings){
  const n = listings.length;
  kpiCount.textContent = `${n} offre${n>1?"s":""}`;
  if(!n){ kpiRange.textContent = "—"; return; }
  let min = Infinity, max = 0;
  for(const l of listings){
    const p = Number(l.price||0);
    if(p < min) min = p;
    if(p > max) max = p;
  }
  kpiRange.textContent = (isFinite(min) ? `Prix ${min} → ${max}` : "—");
}

function renderMarket(listings){
  marketGrid.innerHTML = "";
  if(!listings.length){
    show(msgMarket, "Aucune vente pour l’instant.");
    return;
  }
  show(msgMarket, "");

  listings.forEach(l => {
    const el = document.createElement("div");
    el.className = "card";
    const g = l.game || currentGame();
    const mintTxt = l.mint ? "MINT" : "Normal";

    el.innerHTML = `
      <div class="cardHead">
        <div class="cardImg" style="background-image:url('${l.image}')"></div>
        <div class="cardOverlay">
          <span class="badge">${gameTag(g)}</span>
          <span class="badge badgePrice"><img src="dollax.png" class="dollaxIcon" alt=""> <b>${escapeHtml(l.price)}</b></span>
        </div>
      </div>

      <div class="cardBody">
        <div class="titleRow">
          <div style="min-width:0">
            <div class="cardTitle">${escapeHtml(l.name)}</div>
            <div class="cardSet">${escapeHtml(l.setName || "")}</div>
          </div>
        </div>

        <div class="metaRow">
          <span class="pill soft">Grade ${escapeHtml(l.grade)}${l.mint ? " • MINT" : ""}</span>
          <span class="pill soft">Stock ${escapeHtml(l.qty)}</span>
        </div>

        <div class="buyRow">
          <div class="stepper" title="Quantité à acheter">
            <button class="bMinus" type="button">−</button>
            <input class="bQty" type="number" min="1" value="1">
            <button class="bPlus" type="button">+</button>
          </div>
          <button class="buyBtn" type="button">Acheter</button>
        </div>

        <div class="small">Vendeur: ${escapeHtml(l.sellerName || ("#" + l.sellerUserId))} • ${mintTxt}</div>
      </div>
    `;

    const qtyInput = el.querySelector(".bQty");
    const bMinus = el.querySelector(".bMinus");
    const bPlus = el.querySelector(".bPlus");
    const buyBtn = el.querySelector(".buyBtn");
    const max = Number(l.qty||1);

    function clampLocal(){
      const cur = Number(qtyInput.value||1)|0;
      qtyInput.value = String(clamp(cur, 1, max));
    }
    clampLocal();

    bMinus.onclick = () => { qtyInput.value = String(clamp((Number(qtyInput.value||1)|0)-1,1,max)); };
    bPlus.onclick  = () => { qtyInput.value = String(clamp((Number(qtyInput.value||1)|0)+1,1,max)); };
    qtyInput.addEventListener("input", clampLocal);

    el.querySelector(".cardImg").onclick = () => openModal(l);
    el.querySelector(".cardTitle").onclick = () => openModal(l);

    buyBtn.onclick = async () => {
      try{
        const want = clamp(Number(qtyInput.value||1)|0, 1, max);
        await api("/api/market/buy", {
          method:"POST",
          body: JSON.stringify({ listingId: l.id, qty: want })
        });
        await boot(true);
      }catch(e){
        alert("❌ " + e.message);
      }
    };

    marketGrid.appendChild(el);
  });
}

async function loadMarket(){
  show(msgMarket, "Chargement...");
  marketGrid.innerHTML = "";

  const q = encodeURIComponent((searchEl.value||"").trim());
  const sort = encodeURIComponent(sortEl.value || "recent");
  const data = await api(`/api/market?search=${q}&sort=${sort}`, { method:"GET", headers:{} });

  lastMarketListings = data.listings || [];
  let listings = applyMarketFilters(lastMarketListings);

  updateKpis(listings);
  renderMarket(listings);
}

function sortMyItems(items){
  const mode = String(mySort.value||"recent");
  const arr = [...(items||[])];

  if(mode === "grade") arr.sort((a,b)=> (Number(b.grade||0)-Number(a.grade||0)) || (Number(b.lastAt||0)-Number(a.lastAt||0)));
  else if(mode === "name") arr.sort((a,b)=> String(a.name||"").localeCompare(String(b.name||"")));
  else if(mode === "count") arr.sort((a,b)=> (Number(b.count||0)-Number(a.count||0)) || (Number(b.lastAt||0)-Number(a.lastAt||0)));
  else arr.sort((a,b)=> (Number(b.lastAt||0)-Number(a.lastAt||0)));

  return arr;
}

async function loadMyCollection(){
  const data = await api("/api/collection", { method:"GET", headers:{} });
  myItems = data.items || [];

  const q = String(mySearch.value||"").toLowerCase().trim();
  let items = myItems;

  if(q){
    items = items.filter(x => {
      const n = String(x.name||"").toLowerCase();
      const s = String(x.setName||x.set||"").toLowerCase();
      return n.includes(q) || s.includes(q);
    });
  }

  items = sortMyItems(items);

  myCollectionGrid.innerHTML = "";
  if(!items.length){
    myCollectionGrid.innerHTML = `<div class="small" style="opacity:.8;">Aucune carte.</div>`;
    return;
  }

  items.forEach(x => {
    const el = document.createElement("div");
    el.className = "card selCard" + ((selectedItem && selectedItem.idKey === x.idKey) ? " selected" : "");
    const g = x.game || currentGame();

    el.innerHTML = `
      <div class="cardHead">
        <div class="cardImg" style="height:170px;background-image:url('${x.image}')"></div>
        <div class="cardOverlay">
          <span class="badge">${gameTag(g)}</span>
          <span class="badge">×${escapeHtml(x.count || 1)}</span>
        </div>
      </div>
      <div class="cardBody">
        <div class="cardTitle">${escapeHtml(x.name)}</div>
        <div class="cardSet">${escapeHtml(x.set || x.setName || "")}</div>
        <div class="metaRow">
          <span class="pill soft">Grade ${escapeHtml(x.grade)}${x.mint ? " • MINT" : ""}</span>
        </div>
      </div>
    `;

    el.onclick = () => {
      selectedItem = x;
      btnList.disabled = false;
      selectedEl.textContent =
        "Sélection : " + fmtCardLine({
          name: x.name,
          setName: x.set || x.setName || "",
          grade: x.grade,
          mint: x.mint
        }) + ` • Dispo: ×${x.count}`;
      syncSellQty(0);
      show(msgSell, "");
      loadMyCollection(); // refresh highlight
    };

    myCollectionGrid.appendChild(el);
  });
}

async function loadMine(){
  show(msgMine, "Chargement...");
  mineList.innerHTML = "";
  const data = await api("/api/market/mine", { method:"GET", headers:{} });
  const listings = data.listings || [];
  if(!listings.length){
    show(msgMine, "Aucune vente en cours.");
    return;
  }
  show(msgMine, "");

  listings.forEach(l => {
    const row = document.createElement("div");
    row.className = "itemRow";
    const g = l.game || currentGame();

    row.innerHTML = `
      <div class="thumb" style="background-image:url('${l.image}')"></div>
      <div style="min-width:220px">
        <div><b>${escapeHtml(l.name)}</b> <span class="small">• ${escapeHtml(l.setName || "")}</span></div>
        <div class="small">${gameTag(g)} • Grade ${escapeHtml(l.grade)}${l.mint ? " (MINT)" : ""} • Prix <b>${escapeHtml(l.price)}</b> • Stock ${escapeHtml(l.qty)}</div>
      </div>
      <div class="spacer"></div>
      <button class="cancelBtn" type="button">Annuler…</button>
    `;

    row.querySelector(".thumb").onclick = () => openModal(l);

    row.querySelector(".cancelBtn").onclick = async () => {
      try{
        const want = clamp(Number(prompt(`Quantité à annuler ? (max ${l.qty})`, String(l.qty)) || "0")|0, 1, Number(l.qty||1));
        if(!want) return;
        await api("/api/market/cancel", {
          method:"POST",
          body: JSON.stringify({ listingId: l.id, qty: want })
        });
        await loadMine();
        await loadMyCollection();
      }catch(e){
        alert("❌ " + e.message);
      }
    };

    mineList.appendChild(row);
  });
}

btnList.onclick = async () => {
  try{
    if(!selectedItem) { show(msgSell, "Sélectionne une carte."); return; }

    const price = Math.max(1, Number(priceEl.value||1)|0);
    const qty = clamp(Number(qtyEl.value||1)|0, 1, Number(selectedItem.count||1));

    if(qty > selectedItem.count){
      show(msgSell, `Quantité trop grande (tu as ×${selectedItem.count}).`);
      return;
    }

    btnList.disabled = true;
    await api("/api/market/list", {
      method:"POST",
      body: JSON.stringify({ idKey: selectedItem.idKey, qty, price })
    });

    show(msgSell, "✅ Mise en vente !");
    selectedItem = null;
    btnList.disabled = true;
    selectedEl.textContent = "Aucune carte sélectionnée.";

    await loadMarket();
    await loadMyCollection();
    await loadMine();
  }catch(e){
    show(msgSell, "❌ " + e.message);
  }finally{
    btnList.disabled = (selectedItem === null);
  }
};

/* listeners */
searchEl.addEventListener("input", () => loadMarket());
sortEl.addEventListener("change", () => loadMarket());
refreshBtn.onclick = () => loadMarket();

function refilter(){
  const list = applyMarketFilters(lastMarketListings);
  updateKpis(list);
  renderMarket(list);
}
fMint.addEventListener("change", refilter);
fHideMine.addEventListener("change", refilter);
fGradeMin.addEventListener("change", refilter);
fPriceMax.addEventListener("input", refilter);

reloadMine.onclick = () => loadMine();
mySearch.addEventListener("input", ()=> loadMyCollection());
mySort.addEventListener("change", ()=> loadMyCollection());

async function boot(){
  try{
    await loadMe();
    await loadMarket();
    await loadMyCollection();
    await loadMine();
  }catch(e){
    localStorage.removeItem(TOKEN_KEY);
    location.href="/login.html";
  }
}

(async () => { await boot(); })();
</script>
</body>
</html>

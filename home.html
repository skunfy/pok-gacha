<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>TCG Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />

  <style>
    :root{
      --bg1:#0b0f16;
      --bg2:#121826;
      --text:#ffffff;
      --muted: rgba(255,255,255,.72);
      --soft2: rgba(255,255,255,.16);
      --shadow: 0 18px 60px rgba(0,0,0,.55);
      --radius: 22px;
      --focus: #7dd3fc;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(900px 500px at 10% -10%, rgba(255,204,0,.14), transparent 60%),
        radial-gradient(900px 500px at 90% 0%, rgba(43,211,255,.12), transparent 60%),
        radial-gradient(900px 700px at 50% 120%, rgba(214,0,0,.12), transparent 60%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      display: grid;
      place-items: center;
      min-height: 100dvh;
      padding: 24px;
    }

    .container {
      text-align: center;
      width: min(980px, 100%);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 3.6vw, 2.7rem);
      letter-spacing: .2px;
    }

    .sub {
      margin: 0 auto 26px;
      max-width: 720px;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.45;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      justify-content: center;
    }

    @media (max-width: 880px){
      .games{ grid-template-columns: 1fr; }
    }

    .card {
      position: relative;
      width: 100%;
      padding: 22px;
      border-radius: var(--radius);
      cursor: pointer;
      box-shadow: 0 0 22px rgba(255,255,255,0.08);
      text-align: center;
      border: 1px solid rgba(255,255,255,.10);
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
      user-select: none;
      outline: none;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height: 230px;
      background: transparent;
    }

    @media (hover:hover){
      .card:hover {
        transform: translateY(-4px) scale(1.01);
        box-shadow: 0 0 34px rgba(255,255,255,0.22);
        filter: saturate(1.05);
      }
      .card:hover .gameLogo { transform: scale(1.06); }
    }

    .card:focus-visible{
      box-shadow: 0 0 0 3px rgba(0,0,0,.35), 0 0 0 6px rgba(125,211,252,.55);
    }

    .pokemon { background: linear-gradient(135deg, #ffcc00, #ff9900); color: #111; }
    .onepiece { background: linear-gradient(135deg, #d60000, #800000); }
    .lorcana{ background: linear-gradient(135deg, #2bd3ff, #6a5cff); }

    .gameLogo {
      width: 160px;
      max-width: 100%;
      height: auto;
      margin-bottom: 14px;
      transition: transform 0.18s ease;
      filter: drop-shadow(0 10px 22px rgba(0,0,0,.35));
    }

    .card p {
      font-size: 0.95rem;
      opacity: 0.92;
      margin: 0;
      line-height: 1.35;
    }

    .badge{
      position:absolute;
      top: 14px;
      right: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .2px;
      background: rgba(0,0,0,.25);
      border: 1px solid rgba(255,255,255,.18);
      color: #fff;
      backdrop-filter: blur(6px);
      display:none;
    }

    .card.selected .badge{ display:inline-flex; }
    .card.selected{
      box-shadow: var(--shadow);
      border-color: rgba(125,211,252,.45);
    }

    footer {
      margin-top: 22px;
      font-size: 0.85rem;
      opacity: 0.65;
    }

    @media (prefers-reduced-motion: reduce){
      .card, .gameLogo{ transition: none !important; }
    }
  </style>
</head>

<body>
  <main class="container" aria-label="Sélection du jeu">
    <h1>Choisis ton TCG</h1>
    <p class="sub">
      Clique sur un jeu pour ouvrir des cartes, collectionner, vendre et acheter au marché.
    </p>

    <section class="games" aria-label="Jeux disponibles">
      <button class="card pokemon" data-game="pokemon" type="button" aria-label="Choisir Pokémon">
        <span class="badge">Sélectionné</span>
        <img src="International_Pokémon_logo.png" alt="Logo Pokémon" class="gameLogo" loading="lazy" />
        <p>Ouvre des cartes Pokémon, collectionne et trade.</p>
      </button>

      <button class="card onepiece" data-game="onepiece" type="button" aria-label="Choisir One Piece">
        <span class="badge">Sélectionné</span>
        <img src="One_Piece_Logo.png" alt="Logo One Piece" class="gameLogo" loading="lazy" />
        <p>Ouvre des cartes One Piece et domine le marché.</p>
      </button>

      <button class="card lorcana" data-game="lorcana" type="button" aria-label="Choisir Lorcana">
        <span class="badge">Sélectionné</span>
        <img src="Lorcana.png" alt="Logo Lorcana" class="gameLogo" loading="lazy" />
        <p>Ouvre des cartes Lorcana, collectionne et trade.</p>
      </button>
    </section>

    <footer>Gachax • Multi Game</footer>
  </main>

  <script>
    const GAME_KEY = "gacha_game_v1";

    function normalizeGame(g){
      g = String(g || "").toLowerCase();
      if (g === "onepiece") return "onepiece";
      if (g === "lorcana")  return "lorcana";
      return "pokemon";
    }

    function updateSelectedVisual(){
      const selected = normalizeGame(localStorage.getItem(GAME_KEY) || "");
      document.querySelectorAll(".card").forEach(el=>{
        el.classList.toggle("selected", el.dataset.game === selected);
      });
    }

    function goGame(game){
      const g = normalizeGame(game);
      localStorage.setItem(GAME_KEY, g);
      updateSelectedVisual();

      // ✅ redirige vers ta page gacha (comme avant)
      window.location.href = "/";

      // fallback si "/" n'existe pas
      setTimeout(() => {
        if (document.visibilityState === "visible") {
          window.location.href = "/index.html";
        }
      }, 400);
    }

    document.querySelectorAll(".card").forEach(btn=>{
      btn.addEventListener("click", () => goGame(btn.dataset.game));
    });

    updateSelectedVisual();
  </script>
</body>
</html>

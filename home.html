<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>TCG Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111, #1c1c1c);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container { text-align: center; }

    h1 {
      margin-bottom: 40px;
      font-size: 2.5rem;
    }

    .games {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      width: 240px;
      padding: 25px;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
      text-align: center;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255,255,255,0.3);
    }

    .pokemon {
      background: linear-gradient(135deg, #ffcc00, #ff9900);
      color: black;
    }

    .onepiece {
      background: linear-gradient(135deg, #d60000, #800000);
    }

    .lorcana{
      background: linear-gradient(135deg, #2bd3ff, #6a5cff);
    }

    .gameLogo {
      width: 160px;
      max-width: 100%;
      height: auto;
      margin-bottom: 15px;
      transition: 0.3s;
    }

    .card:hover .gameLogo { transform: scale(1.08); }

    .card p {
      font-size: 0.9rem;
      opacity: 0.9;
      margin: 0;
    }

    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Choisis ton TCG</h1>

    <div class="games">
      <div class="card pokemon" onclick="goGame('pokemon')">
        <img src="International_Pokémon_logo.png" alt="Pokémon" class="gameLogo">
        <p>Ouvre des cartes Pokémon, collectionne et trade.</p>
      </div>

      <div class="card onepiece" onclick="goGame('onepiece')">
        <img src="One_Piece_Logo.png" alt="One Piece" class="gameLogo">
        <p>Ouvre des cartes One Piece et domine le marché.</p>
      </div>

      <div class="card lorcana" onclick="goGame('lorcana')">
        <img src="Lorcana_Logo.png" alt="Lorcana" class="gameLogo">
        <p>Ouvre des cartes Lorcana, collectionne et trade.</p>
      </div>
    </div>

    <footer>
      Gachax • Multi Game
    </footer>
  </div>

  <script>
    const GAME_KEY = "gacha_game_v1";

    function normalizeGame(g){
      g = String(g || "").toLowerCase();
      if (g === "onepiece") return "onepiece";
      if (g === "lorcana")  return "lorcana";
      return "pokemon";
    }

    function goGame(game) {
      const g = normalizeGame(game);
      localStorage.setItem(GAME_KEY, g);

      // ✅ redirige vers ta page gacha
      // Si ton gacha est sur "/" c'est parfait.
      // Si ce n'est pas le cas, tu peux remplacer par "/index.html" (ta page gacha).
      window.location.href = "/";

      // ✅ fallback si "/" n'existe pas chez toi
      setTimeout(() => {
        if (document.visibilityState === "visible") {
          // probable échec/chemin différent
          window.location.href = "/index.html";
        }
      }, 400);
    }
  </script>

</body>
</html>

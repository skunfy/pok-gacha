<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Profil Ami — Gachax</title>

<style>
:root{ --bg1:#05060d; --bg2:#090b18; }
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:system-ui;
  color:#fff;
  background:
    radial-gradient(900px 520px at 20% 10%, rgba(80,130,255,.22), transparent 60%),
    radial-gradient(900px 600px at 85% 30%, rgba(255,80,220,.18), transparent 62%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
}

.wrap{
  width:min(1100px,95vw);
  margin:24px auto;
  display:grid;
  gap:16px;
}

.panel{
  border-radius:16px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10);
  padding:20px;
  backdrop-filter:blur(10px);
  overflow:hidden;
}

/* ✅ BANNIÈRE */
.banner{
  width:100%;
  height:260px;
  border-radius:16px;
  background:
    radial-gradient(900px 420px at 15% 20%, rgba(80,130,255,.20), transparent 60%),
    radial-gradient(900px 520px at 80% 35%, rgba(255,80,220,.16), transparent 62%),
    rgba(0,0,0,.25);
  border:1px solid rgba(255,255,255,.10);
  position:relative;
  overflow:hidden;
}
.banner.hasImg{
  background-position:center;
  background-size:cover;
  background-repeat:no-repeat;
}
.banner::after{
  content:"";
  position:absolute; inset:0;
  background: linear-gradient(180deg, rgba(0,0,0,.25), rgba(0,0,0,.55));
  pointer-events:none;
}
.bannerInner{
  position:relative;
  z-index:2;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  gap:12px;
  padding:12px;
}

.profileRow{
  display:flex;
  gap:18px;
  align-items:center;
  flex-wrap:wrap;
}

/* ✅ avatar + glow via variables */
.avatar{
  --glow: rgba(120,170,255,.18);
  --glow2: rgba(190,120,255,.25);

  width:110px;
  height:110px;
  border-radius:20px;
  background:rgba(0,0,0,.25) center/cover no-repeat;
  border:1px solid rgba(255,255,255,.12);
  position:relative;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.10),
    0 0 34px var(--glow);
}
.avatar::after{
  content:"";
  position:absolute; inset:-2px;
  border-radius:22px;
  pointer-events:none;
  background:
    radial-gradient(circle at 30% 30%, var(--glow), transparent 55%),
    radial-gradient(circle at 70% 70%, var(--glow2), transparent 55%);
  filter: blur(8px);
  opacity:.55;
}

.badge{
  display:inline-flex;
  padding:8px 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(0,0,0,.18);
  font-weight:900;
  font-size:12px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
}
@media (max-width: 900px){
  .grid{grid-template-columns:repeat(2,1fr);}
  .banner{height:200px;}
}

/* ✅ cards + hover */
.cardBox{
  background:rgba(255,255,255,.06);
  border-radius:14px;
  padding:12px;
  border:1px solid rgba(255,255,255,.12);
  display:flex;
  flex-direction:column;
  gap:8px;
  transition: transform .12s ease, background .12s ease, border-color .12s ease;
}
.cardBox:hover{
  transform: translateY(-2px);
  background:rgba(255,255,255,.08);
  border-color:rgba(255,255,255,.18);
}

.cImg{
  height:180px;
  background:center/contain no-repeat;
  border-radius:10px;
  cursor:pointer;
}

.small{font-size:12px; opacity:.75}
.msg{opacity:.85;font-size:13px}

button{
  padding:8px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.08);
  color:#fff;
  font-weight:900;
  cursor:pointer;
  transition: transform .12s ease, background .12s ease;
}
button:hover{ background:rgba(255,255,255,.12); transform: translateY(-1px); }
button:active{ transform: translateY(0px) scale(.99); }

/* ✅ STATS */
.statsGrid{
  margin-top:14px;
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}
.statCard{
  padding:10px 12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.20);
}
.statCard .k{opacity:.75; font-size:11px; font-weight:900; letter-spacing:.3px}
.statCard .v{margin-top:4px; font-size:18px; font-weight:1000}

/* ✅ LVL + XP */
.levelRow{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
  flex-wrap:wrap;
}
.lvlPill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(0,0,0,.18);
  font-weight:1000;
  font-size:12px;
}
.xpBar{
  width:min(320px, 86vw);
  height:10px;
  border-radius:999px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.12);
  overflow:hidden;
}
.xpFill{
  height:100%;
  width:0%;
  border-radius:999px;
  background: rgba(120,170,255,.85);
  transition: width .25s ease;
}
.xpText{
  font-size:12px;
  opacity:.75;
}

/* ✅ MODAL ZOOM */
.modal{
  position:fixed; inset:0;
  background:rgba(0,0,0,.72);
  display:none;
  place-items:center;
  z-index:99999;
  padding:24px;
}
.modal.open{display:grid}

.zoomCard{
  width:min(520px, 92vw);
  border-radius:18px;
  background:rgba(15,17,26,.96);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 22px 70px rgba(0,0,0,.55);
  padding:14px;
  backdrop-filter: blur(10px);
}

.zoomHead{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:10px;
}
.zoomTitle{ font-weight:1000; letter-spacing:.3px; }
.zoomSub{ opacity:.75; font-size:12px; margin-top:2px; }
.zoomBadges{display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end}

.gameTag{
  display:inline-flex;
  padding:4px 8px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(0,0,0,.18);
  font-size:11px;
  font-weight:900;
  opacity:.85;
}

.mintBadge{
  padding:5px 9px;
  border-radius:999px;
  font-size:11px;
  font-weight:1000;
  letter-spacing:.6px;
  background: rgba(255,80,80,.12);
  border: 1px solid rgba(255,80,80,.55);
  color: rgba(255,80,80,.95);
}
.gradeBadge{
  padding:5px 9px;
  border-radius:999px;
  font-size:11px;
  font-weight:1000;
  letter-spacing:.6px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.18);
}

.zoomImg{
  width:100%;
  height:min(64vh, 560px);
  border-radius:14px;
  background:center/contain no-repeat;
  background-color: rgba(0,0,0,.22);
  border:1px solid rgba(255,255,255,.10);
}

.zoomHint{
  margin-top:10px;
  opacity:.7;
  font-size:12px;
  text-align:center;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="panel">
    <button onclick="history.back()">← Retour</button>

    <div class="banner" id="banner" style="margin-top:16px">
      <div class="bannerInner">
        <div class="profileRow">
          <div class="avatar" id="avatar"></div>
          <div>
            <div style="font-size:20px;font-weight:1000" id="name">...</div>
            <div class="badge" id="code">----</div>

            <!-- ✅ LVL + XP dans la bannière -->
            <div class="levelRow" aria-label="Niveau et XP">
              <div class="lvlPill">LVL <span id="lvl">1</span></div>
              <div>
                <div class="xpBar"><div class="xpFill" id="xpFill"></div></div>
                <div class="xpText" id="xpText">0 / 100 XP</div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

    <div class="msg" id="bio" style="margin-top:14px"></div>

    <div class="statsGrid" aria-label="Statistiques" style="margin-top:12px">
      <div class="statCard">
        <div class="k">TOTAL POKÉMON</div>
        <div class="v" id="statPokemon">0</div>
      </div>
      <div class="statCard">
        <div class="k">TOTAL ONE PIECE</div>
        <div class="v" id="statOnepiece">0</div>
      </div>
      <div class="statCard" style="grid-column:1 / -1;">
        <div class="k">TOTAL CARTES</div>
        <div class="v" id="statTotal">0</div>
      </div>
    </div>
  </div>

  <div class="panel">
    <b>Cartes favorites</b>
    <div class="grid" id="favGrid" style="margin-top:12px"></div>
  </div>

</div>

<div class="modal" id="zoomModal" aria-hidden="true">
  <div class="zoomCard" role="dialog" aria-modal="true">
    <div class="zoomHead">
      <div style="min-width:0">
        <div class="zoomTitle" id="zoomTitle">...</div>
        <div class="zoomSub" id="zoomSub">...</div>
      </div>
      <div class="zoomBadges">
        <span class="gameTag" id="zoomGameTag">POKÉMON</span>
        <span class="gradeBadge" id="zoomGrade">Grade ?</span>
        <span class="mintBadge" id="zoomMint" style="display:none;">MINT</span>
      </div>
    </div>
    <div class="zoomImg" id="zoomImg"></div>
    <div class="zoomHint">Clique en dehors pour fermer • ESC</div>
  </div>
</div>

<script>
const TOKEN = localStorage.getItem("gacha_token_v1");
if(!TOKEN) location.href="/login.html";

async function api(path){
  const r = await fetch(path,{
    headers:{ Authorization:"Bearer "+TOKEN }
  });
  const data = await r.json().catch(()=> ({}));
  if(!r.ok) throw new Error(data.error||"Erreur");
  return data;
}

function escapeHtml(s){
  return String(s||"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function gameLabel(g){
  return (String(g).toLowerCase() === "onepiece") ? "ONE PIECE" : "POKÉMON";
}

/* ✅ XP math (doit matcher backend levelForXp) */
function xpForLevel(level){
  const l = Math.max(1, Number(level) || 1);
  return 100 * Math.pow(l - 1, 2);
}
function applyXpUi(xp, level){
  const l = Math.max(1, Number(level) || 1);
  const curNeed = xpForLevel(l);
  const nextNeed = xpForLevel(l + 1);

  const x = Math.max(0, Number(xp) || 0);
  const inLevel = Math.max(0, x - curNeed);
  const span = Math.max(1, nextNeed - curNeed);
  const pct = Math.max(0, Math.min(100, (inLevel / span) * 100));

  document.getElementById("lvl").textContent = String(l);
  document.getElementById("xpFill").style.width = pct.toFixed(1) + "%";
  document.getElementById("xpText").textContent = `${inLevel} / ${span} XP`;
}

/* ✅ Glow selon level */
function setAvatarGlowByLevel(level){
  const l = Math.max(1, Number(level) || 1);
  const av = document.getElementById("avatar");

  let glow = "rgba(120,170,255,.18)";
  let glow2 = "rgba(190,120,255,.25)";

  if (l >= 5)  { glow = "rgba(120,255,200,.18)"; glow2 = "rgba(120,255,200,.28)"; }
  if (l >= 10) { glow = "rgba(255,210,120,.20)"; glow2 = "rgba(255,180,90,.30)"; }
  if (l >= 20) { glow = "rgba(255,120,220,.22)"; glow2 = "rgba(190,120,255,.30)"; }
  if (l >= 35) { glow = "rgba(255,80,80,.22)";  glow2 = "rgba(255,130,90,.30)"; }

  av.style.setProperty("--glow", glow);
  av.style.setProperty("--glow2", glow2);
}

/* ✅ STATS exactes depuis la collection */
function updateStatsFromCollection(itemsP, itemsO){
  let p = 0, o = 0;
  for(const x of (itemsP || [])) p += Number(x.count || 0) || 0;
  for(const x of (itemsO || [])) o += Number(x.count || 0) || 0;

  document.getElementById("statPokemon").textContent = String(p);
  document.getElementById("statOnepiece").textContent = String(o);
  document.getElementById("statTotal").textContent = String(p + o);
}

/* ✅ ZOOM */
const zoomModal = document.getElementById("zoomModal");
const zoomTitle = document.getElementById("zoomTitle");
const zoomSub = document.getElementById("zoomSub");
const zoomGameTag = document.getElementById("zoomGameTag");
const zoomGrade = document.getElementById("zoomGrade");
const zoomMint = document.getElementById("zoomMint");
const zoomImg = document.getElementById("zoomImg");

function openZoomCard(x){
  zoomTitle.textContent = x.name || "";
  zoomSub.textContent = `${x.setName || x.set || ""}`.trim();
  zoomGameTag.textContent = gameLabel(x.game || "pokemon");
  zoomGrade.textContent = `Grade ${x.grade ?? "?"}`;
  zoomMint.style.display = x.mint ? "inline-flex" : "none";

  const img = (x.imageHigh || x.image || "").trim();
  zoomImg.style.backgroundImage = img ? `url("${img.replace(/"/g, '\\"')}")` : "none";

  zoomModal.classList.add("open");
  zoomModal.setAttribute("aria-hidden","false");
}
function closeZoom(){
  zoomModal.classList.remove("open");
  zoomModal.setAttribute("aria-hidden","true");
  zoomImg.style.backgroundImage = "none";
}
zoomModal.addEventListener("click", (e)=>{
  if(e.target === zoomModal) closeZoom();
});
window.addEventListener("keydown", (e)=>{
  if(e.key === "Escape" && zoomModal.classList.contains("open")) closeZoom();
});

const params = new URLSearchParams(location.search);
const friendCode = (params.get("code")||"").toUpperCase();

/* ✅ MODIF: si le code = mon propre friendCode, on affiche mon profil public via /api/profile/me */
async function load(){
  if(!friendCode){
    alert("Code ami manquant dans l’URL ?code=XXXX-XXXX");
    history.back();
    return;
  }

  // 1) Essaie de récupérer mon profil
  let me = null;
  try{
    me = await api("/api/profile/me");
  }catch{
    me = null;
  }

  const isSelf = !!me && String(me.friendCode || "").toUpperCase() === friendCode;

  // 2) data: moi => /me, sinon => /profile/:code (ami)
  const data = isSelf
    ? me
    : await api("/api/profile/"+encodeURIComponent(friendCode));

  document.getElementById("name").textContent = data.name || "...";
  document.getElementById("code").textContent = "Code ami: "+(data.friendCode || "----");
  document.getElementById("bio").textContent = data.bio || "";

  // avatar
  const av = document.getElementById("avatar");
  if(data.avatar){
    av.style.backgroundImage = `url('${String(data.avatar).replace(/'/g,"\\'")}')`;
  } else {
    av.style.backgroundImage = "none";
  }

  // bannière
  const bannerEl = document.getElementById("banner");
  const b = String(data.banner || "").trim();
  if(b){
    bannerEl.classList.add("hasImg");
    bannerEl.style.backgroundImage = `url('${b.replace(/'/g,"\\'")}')`;
  } else {
    bannerEl.classList.remove("hasImg");
    bannerEl.style.backgroundImage = "";
  }

  // lvl/xp + glow
  applyXpUi(data.xp || 0, data.level || 1);
  setAvatarGlowByLevel(data.level || 1);

  // 3) stats: moi => /api/collection ; ami => /api/friends/:code/collection
  const base = isSelf
    ? "/api/collection"
    : ("/api/friends/"+encodeURIComponent(friendCode)+"/collection");

  const [cP, cO] = await Promise.all([
    api(base+"?game=pokemon").catch(()=> ({ items: [] })),
    api(base+"?game=onepiece").catch(()=> ({ items: [] })),
  ]);

  updateStatsFromCollection(cP.items || [], cO.items || []);

  // favoris
  const grid = document.getElementById("favGrid");
  grid.innerHTML = "";

  const favs = (data.favorites || []);
  if(!favs.length){
    grid.innerHTML = `<div class="small">Aucune carte favorite.</div>`;
    return;
  }

  favs.forEach(x=>{
    const el = document.createElement("div");
    el.className="cardBox";
    el.innerHTML=`
      <div class="cImg" style="background-image:url('${x.image}')"></div>
      <div><b>${escapeHtml(x.name)}</b></div>
      <div class="small">${escapeHtml(x.setName || x.set || "")}</div>
      <div class="small">Grade ${escapeHtml(x.grade)}${x.mint?" • MINT":""}</div>
    `;

    el.querySelector(".cImg").addEventListener("click", ()=> openZoomCard(x));
    grid.appendChild(el);
  });
}

load().catch(()=>{
  alert("Impossible de charger le profil");
  history.back();
});
</script>

</body>
</html>

<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Collection — Gachax</title>

<style>
.slab{
  width:380px;
  height:560px;
  border-radius:22px;
  position:relative;
}

.shell{
  position:absolute;
  inset:0;
  border-radius:22px;
  background:linear-gradient(145deg, rgba(255,255,255,.14), rgba(255,255,255,.03));
  border:1px solid rgba(255,255,255,.18);
  backdrop-filter:blur(6px);
}

.label{
  position:absolute;
  left:50%;
  top:30px;
  transform:translateX(-50%);
  width:85%;
  height:60px;
  border-radius:14px;
  background:rgba(0,0,0,.3);
  border:1px solid rgba(255,255,255,.2);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 12px;
}

.grade{
  font-size:24px;
  font-weight:900;
}

.mintBadge{
  padding:5px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  border:1px solid rgba(255,80,80,.6);
  color:#ff5050;
  display:none;
}

.cardImg{
  position:absolute;
  left:50%;
  top:58%;
  transform:translate(-50%,-50%);
  width:300px;
  height:420px;
  background:center/contain no-repeat;
  border-radius:16px;
}

:root{
  --bg1:#05060d;
  --bg2:#090b18;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:system-ui;
  color:#fff;
  background:
    radial-gradient(900px 520px at 20% 10%, rgba(80,130,255,.22), transparent 60%),
    radial-gradient(900px 600px at 85% 30%, rgba(255,80,220,.18), transparent 62%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
  background-attachment: fixed;
  overflow-x:hidden;
}
.wrap{
  width:min(1200px,95vw);
  margin:24px auto;
  display:grid;
  gap:16px;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  border-radius:16px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10);
  backdrop-filter:blur(10px);
}
.controls{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}
input, select{
  padding:8px 10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.15);
  background:#0f111a;
  color:#fff;
  font-weight:600;
}
button{
  padding:8px 12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.08);
  color:#fff;
  font-weight:800;
  cursor:pointer;
}
button:disabled{opacity:.55;cursor:not-allowed}
.gridWrap{
  border-radius:16px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10);
  padding:20px;
  max-height:820px;
  overflow:auto;
}
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}
.cardBox{
  background:rgba(255,255,255,.06);
  border-radius:14px;
  padding:12px;
  border:1px solid rgba(255,255,255,.12);
  display:flex;
  flex-direction:column;
  gap:10px;
}
.cImg{
  height:220px;
  background:center/contain no-repeat;
  border-radius:10px;
  cursor:pointer;
}
.sellBtn{
  margin-top:auto;
}

.selRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.selLabel{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
  opacity:.9;
  user-select:none;
}
.priceTag{
  font-size:12px;
  font-weight:900;
  opacity:.9;
}
.qtyRow{
  display:flex;
  gap:8px;
  align-items:center;
}
.qtyInput{
  width:88px;
  padding:8px 10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.15);
  background:#0f111a;
  color:#fff;
  font-weight:800;
}

/* Modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  place-items:center;
  z-index:9999;
}
.modal.open{display:grid}

/* Scrollbar dark */
.gridWrap{
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.18) rgba(255,255,255,.06);
}
.gridWrap::-webkit-scrollbar{ width: 10px; }
.gridWrap::-webkit-scrollbar-track{
  background: rgba(255,255,255,.06);
  border-radius: 999px;
}
.gridWrap::-webkit-scrollbar-thumb{
  background: rgba(255,255,255,.18);
  border-radius: 999px;
  border: 2px solid rgba(0,0,0,.25);
}
.gridWrap::-webkit-scrollbar-thumb:hover{ background: rgba(255,255,255,.28); }
.gridWrap{ scrollbar-gutter: stable both-edges; }
</style>
</head>

<body>

<div class="wrap">

  <div class="topbar">
    <div><b>Gachax</b> — Collection</div>

    <div class="controls">
      <!-- ✅ FILTRE JEU -->
      <select id="gameSel" title="Jeu">
        <option value="pokemon">Pokémon</option>
        <option value="onepiece">One Piece</option>
      </select>

      <input id="search" placeholder="Rechercher...">

      <select id="sort">
        <option value="recent">Dernières obtenues</option>
        <option value="grade">Meilleure note</option>
        <option value="name">Nom A-Z</option>
      </select>

      <!-- ✅ NEW: bulk sell controls -->
      <button id="sellSelectedBtn" disabled>VENDRE SÉLECTION (0)</button>
      <button id="clearSelBtn" disabled>VIDER</button>

      <button onclick="location.href='/market.html'">MARKET</button>
      <button onclick="location.href='/friends.html'">FRIENDS</button>
      <button onclick="location.href='/'">← Retour</button>
    </div>
  </div>

  <div class="gridWrap">
    <div class="grid" id="grid"></div>
  </div>

</div>

<div class="modal" id="modal">
  <div class="slab" id="zoomSlab" data-tier="" data-mint="0">
    <div class="shell"></div>

    <div class="label">
      <div id="zoomTitle">POKÉMON</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="mintBadge" id="zoomMint">MINT</div>
        <div class="grade" id="zoomGrade">?</div>
      </div>
    </div>

    <div class="cardImg" id="zoomImg"></div>
    </div>
  </div>
</div>

<script>
const TOKEN_KEY = "gacha_token_v1";
const GAME_KEY  = "gacha_game_v1";

const TOKEN = localStorage.getItem(TOKEN_KEY);
if(!TOKEN) location.href="/login.html";

function currentGame(){
  const g = String(localStorage.getItem(GAME_KEY) || "pokemon").toLowerCase();
  return (g === "onepiece") ? "onepiece" : "pokemon";
}

async function api(path, opts = {}){
  const g = encodeURIComponent(currentGame());
  const sep = path.includes("?") ? "&" : "?";
  const url = path + sep + "game=" + g;

  const r = await fetch(url, {
    ...opts,
    headers: {
      ...(opts.headers || {}),
      Authorization: "Bearer " + TOKEN,
      "Content-Type": "application/json",
    }
  });

  const data = await r.json().catch(() => ({}));
  if(!r.ok) throw new Error(data.error || ("HTTP " + r.status));
  return data;
}

const grid = document.getElementById("grid");
const searchInput = document.getElementById("search");
const sortSelect = document.getElementById("sort");
const gameSel = document.getElementById("gameSel");

const sellSelectedBtn = document.getElementById("sellSelectedBtn");
const clearSelBtn = document.getElementById("clearSelBtn");

// selection: idKey -> qty
const selected = new Map();

const modal = document.getElementById("modal");
const zoomSlab = document.getElementById("zoomSlab");
const zoomImg = document.getElementById("zoomImg");
const zoomTitle = document.getElementById("zoomTitle");
const zoomGrade = document.getElementById("zoomGrade");
const zoomMint = document.getElementById("zoomMint");

let allItems = [];

gameSel.value = currentGame();
gameSel.addEventListener("change", async () => {
  localStorage.setItem(GAME_KEY, gameSel.value);
  selected.clear();
  refreshSelUI();
  await loadCollection();
});

function tierFromGrade(g){
  if(g >= 10) return "g";
  if(g >= 7) return "v";
  if(g >= 5) return "b";
  return "w";
}

// affichage prix côté UI (le serveur reste la source de vérité)
function sellPriceLabel(grade, mint){
  if (mint) return 20;
  const g = Number(grade) || 0;
  if (g >= 10) return 10;
  if (g >= 7) return 5;
  if (g >= 5) return 2;
  return 1;
}

function refreshSelUI(){
  let totalQty = 0;
  for (const q of selected.values()) totalQty += (Number(q) || 0);
  sellSelectedBtn.disabled = totalQty === 0;
  clearSelBtn.disabled = totalQty === 0;
  sellSelectedBtn.textContent = `VENDRE SÉLECTION (${totalQty})`;
}

clearSelBtn.addEventListener("click", () => {
  selected.clear();
  applyFilters();
  refreshSelUI();
});

sellSelectedBtn.addEventListener("click", async () => {
  if (!selected.size) return;

  const payload = Array.from(selected.entries()).map(([idKey, qty]) => ({ idKey, qty }));

  try{
    await api("/api/sell_bulk",{
      method:"POST",
      body: JSON.stringify({ items: payload })
    });
    selected.clear();
    await loadCollection();
    refreshSelUI();
  }catch(e){
    // silent, tu peux afficher un toast si tu veux
  }
});

async function loadCollection(){
  try{
    const data = await api("/api/collection");
    allItems = data.items || [];
    applyFilters();
  }catch(e){
    localStorage.removeItem(TOKEN_KEY);
    location.href="/login.html";
  }
}

function applyFilters(){
  const q = searchInput.value.toLowerCase().trim();
  let items = [...allItems];

  if(q){
    items = items.filter(item =>
      (item.name || "").toLowerCase().includes(q) ||
      (item.set || item.setName || "").toLowerCase().includes(q) ||
      String(item.grade || "").includes(q)
    );
  }

  const sort = sortSelect.value;
  if(sort === "grade"){
    items.sort((a,b)=> (b.grade||0) - (a.grade||0));
  } else if(sort === "name"){
    items.sort((a,b)=> (a.name||"").localeCompare(b.name||""));
  } else {
    items.sort((a,b)=> (b.lastAt||0) - (a.lastAt||0));
  }

  render(items);
  refreshSelUI();
}

function openZoom(x){
  let img = x.image;

  // ✅ seulement Pokémon: low.webp -> high.webp
  if (currentGame() === "pokemon" && img && img.includes("/low.webp")) {
    img = img.replace("/low.webp", "/high.webp");
  }

  zoomImg.style.backgroundImage = `url('${img}')`;
  zoomTitle.textContent = `${x.name} • ${x.set || x.setName || ""}`;
  zoomGrade.textContent = x.grade;

  zoomSlab.dataset.tier = tierFromGrade(x.grade);
  zoomSlab.dataset.mint = x.mint ? "1" : "0";
  zoomMint.style.display = x.mint ? "block" : "none";

  modal.classList.add("open");
}

function render(items){
  grid.innerHTML="";
  items.forEach(x=>{
    const el=document.createElement("div");
    el.className="cardBox";

    const gameTag = (x.game || currentGame()) === "onepiece" ? "🟥 One Piece" : "🟨 Pokémon";
    const unit = sellPriceLabel(x.grade || 0, !!x.mint);

    const wasSelected = selected.has(x.idKey);
    const selQty = selected.get(x.idKey) || 1;

    el.innerHTML=`
      <div class="cImg" style="background-image:url('${x.image}')"></div>

      <div class="selRow">
        <div style="opacity:.75;font-size:12px;">${gameTag}</div>

        <label class="selLabel">
          <input class="selBox" type="checkbox" ${wasSelected ? "checked" : ""}>
          Sélection
        </label>
      </div>

      <div><b>${x.name}</b></div>
      <div>${x.set || x.setName || ""}</div>

      <div class="selRow">
        <div>Grade ${x.grade} ${x.mint?"(MINT)":""} ×${x.count}</div>
        <div class="priceTag">${unit}💵 / carte</div>
      </div>

      <div class="qtyRow">
        <input class="qtyInput" type="number" min="1" max="${x.count}" value="${Math.max(1, Math.min(x.count, Number(selQty)||1))}">
        <button class="sellBtn">VENDRE 1</button>
      </div>
    `;

    el.querySelector(".cImg").onclick = () => openZoom(x);

    const box = el.querySelector(".selBox");
    const qtyInput = el.querySelector(".qtyInput");

    function clampQty(){
      const q = Math.max(1, Math.min(Number(x.count) || 1, Number(qtyInput.value) || 1));
      qtyInput.value = String(q);
      return q;
    }

    box.onchange = () => {
      if (box.checked){
        const q = clampQty();
        selected.set(x.idKey, q);
      } else {
        selected.delete(x.idKey);
      }
      refreshSelUI();
    };

    qtyInput.oninput = () => {
      const q = clampQty();
      if (box.checked){
        selected.set(x.idKey, q);
        refreshSelUI();
      }
    };

    el.querySelector(".sellBtn").onclick = async () => {
      try{
        await api("/api/sell",{
          method:"POST",
          body: JSON.stringify({ idKey: x.idKey, qty: 1 })
        });
        // si cette carte était sélectionnée, on réduit éventuellement sa sélection
        if (selected.has(x.idKey)){
          const prev = selected.get(x.idKey) || 1;
          const next = Math.max(1, prev - 1);
          // on garde la sélection, mais elle sera recadrée au prochain render si count baisse
          selected.set(x.idKey, next);
        }
        await loadCollection();
      }catch{}
    };

    grid.appendChild(el);
  });
}

searchInput.addEventListener("input", applyFilters);
sortSelect.addEventListener("change", applyFilters);

modal.onclick = e => {
  if(e.target === modal) modal.classList.remove("open");
};

loadCollection();
</script>

</body>
</html>

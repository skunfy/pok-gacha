<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Collection — Gachax</title>

<style>
:root{
  --bg1:#05060d;
  --bg2:#090b18;

  --panel: rgba(255,255,255,.045);
  --panel-strong: rgba(255,255,255,.06);
  --line: rgba(255,255,255,.07);
  --line-soft: rgba(255,255,255,.045);
  --text-soft: rgba(255,255,255,.72);

  --shadow-big: 0 22px 70px rgba(0,0,0,.34);
  --shadow-card: 0 18px 44px rgba(0,0,0,.30);
  --shadow-soft: 0 10px 24px rgba(0,0,0,.22);
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  color:#fff;
  background:
    radial-gradient(900px 520px at 20% 10%, rgba(80,130,255,.22), transparent 60%),
    radial-gradient(900px 600px at 85% 30%, rgba(255,80,220,.18), transparent 62%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
  background-attachment: fixed;
  overflow-x:hidden;
}

.wrap{
  width:min(1200px,95vw);
  margin:24px auto;
  display:grid;
  gap:16px;
  min-height:100vh;
}

/* ===== Topbar ===== */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  border-radius:18px;
  background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.035));
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(14px);
  position: sticky;
  top: 14px;
  z-index: 50;
  gap:12px;
  box-shadow: 0 20px 60px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.04);
}

.controls{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}

input, select{
  padding:8px 10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.10);
  background:#0f111a;
  color:#fff;
  font-weight:700;
  outline:none;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
}
input::placeholder{opacity:.65}

button{
  padding:8px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.10);
  background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
  color:#fff;
  font-weight:900;
  cursor:pointer;
  transition: transform .12s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
}
button:hover{
  background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
  transform: translateY(-1px);
  box-shadow: 0 10px 22px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.05);
}
button:active{ transform: translateY(0px) scale(.99); }
button:disabled{opacity:.55;cursor:not-allowed; transform:none}

.smallNote{
  opacity:.7;
  font-size:12px;
  font-weight:900;
}

/* ===== Grid container ===== */
.gridWrap{
  border-radius:20px;
  background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.025));
  border:1px solid rgba(255,255,255,.06);
  padding:20px;
  flex:1;
  box-shadow: var(--shadow-big), inset 0 1px 0 rgba(255,255,255,.03);
}

/* grid responsive auto */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap:18px;
}

/* ===== Binder 4x4 / 3x3 Senpai ===== */
.binderGrid.senpai{
  grid-template-columns: repeat(3, minmax(0, 1fr));
}
.binderWrap{
  display:none;
  flex-direction:column;
  gap:14px;
}
.binderWrap.on{ display:flex; }

.binderGrid{
  display:grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap:14px;
}
@media (max-width: 900px){
  .binderGrid{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
@media (max-width: 520px){
  .binderGrid{ grid-template-columns: repeat(1, minmax(0, 1fr)); }
}

.slot{
  position:relative;
  border-radius:18px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.025)),
    radial-gradient(circle at top left, rgba(255,255,255,.035), transparent 40%);
  border:1px solid rgba(255,255,255,.06);
  overflow:hidden;
  box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,.03);
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:12px;
  min-height: 340px;
}
.slot.empty{
  background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
  border:1px dashed rgba(255,255,255,.08);
  opacity:.88;
}
.slot:hover{
  border-color: rgba(255,255,255,.10);
  box-shadow: 0 22px 52px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.04);
}

.slotImg{
  width:100%;
  aspect-ratio: 63 / 88;
  border-radius:14px;
  background: rgba(0,0,0,.18) center/contain no-repeat;
  border:1px solid rgba(255,255,255,.05);
  cursor:pointer;
  overflow:hidden;
  transition: transform .16s ease, box-shadow .16s ease;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
}
.slot.empty .slotImg{
  background:
    radial-gradient(220px 120px at 40% 40%, rgba(255,255,255,.06), transparent 60%),
    rgba(0,0,0,.14);
  cursor:default;
}
.slot:hover .slotImg{
  transform: scale(1.01);
  box-shadow: 0 10px 20px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.03);
}
.slot.empty:hover .slotImg{ transform:none; }

.slotTitle{
  font-weight:1000;
  letter-spacing:.2px;
  margin-top:2px;
}
.slotSub{
  opacity:.75;
  font-size:12px;
  margin-top:-6px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.slotMeta{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  margin-top:auto;
}
.pill{
  font-size:11px;
  font-weight:1000;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.10);
  background: rgba(0,0,0,.16);
  opacity:.92;
}
.pill.mint{
  border-color: rgba(255,80,80,.35);
  background: rgba(255,80,80,.10);
  color: rgba(255,140,140,.98);
}

.binderPager{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:16px;
  background:rgba(0,0,0,.16);
  border:1px solid rgba(255,255,255,.08);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
}
.binderPager .mid{
  font-weight:1000;
  opacity:.9;
  text-align:center;
  flex:1;
}

/* ===== Money icon ===== */
.moneyIcon{
  width:16px;
  height:16px;
  object-fit:contain;
  display:inline-block;
  vertical-align:-3px;
  margin-left:4px;
  filter: drop-shadow(0 6px 14px rgba(0,0,0,.35));
}

/* ===== Card ===== */
.cardBox{
  position:relative;
  background:
    linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.025)),
    radial-gradient(circle at top left, rgba(255,255,255,.03), transparent 42%);
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:12px;
  overflow:hidden;
  transition: transform .14s ease, background .14s ease, border-color .14s ease, box-shadow .14s ease;
  box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,.03);
  display:flex;
  flex-direction:column;
  gap:10px;
}
.cardBox:hover{
  transform: translateY(-2px);
  background:
    linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03)),
    radial-gradient(circle at top left, rgba(255,255,255,.04), transparent 42%);
  border-color: rgba(255,255,255,.10);
  box-shadow: 0 22px 52px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.04);
}

.cImg{
  width:100%;
  aspect-ratio: 63 / 88;
  border-radius:14px;
  background: rgba(0,0,0,.18) center/contain no-repeat;
  border:1px solid rgba(255,255,255,.05);
  cursor:pointer;
  overflow:hidden;
  transition: transform .16s ease, box-shadow .16s ease;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
}
.cardBox:hover .cImg{
  transform: scale(1.01);
  box-shadow: 0 12px 24px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.03);
}

.selRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.selLabel{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
  opacity:.92;
  user-select:none;
  font-weight:900;
}

.selLabel input{
  appearance:none;
  -webkit-appearance:none;
  width:20px;
  height:20px;
  background:#0f111a;
  border:1px solid rgba(255,255,255,.22);
  border-radius:5px;
  cursor:pointer;
  position:relative;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
}
.selLabel input:hover{
  border-color: rgba(255,255,255,.32);
  background:#131827;
}
.selLabel input:checked{
  background:#8f79ff;
  border-color:#8f79ff;
  box-shadow: 0 0 14px rgba(143,121,255,.28);
}
.selLabel input:checked::after{
  content:"";
  position:absolute;
  left:5px;
  top:2px;
  width:6px;
  height:10px;
  border:2px solid #fff;
  border-top:0;
  border-left:0;
  transform:rotate(45deg);
}

.cardTitle{
  font-weight:1000;
  letter-spacing:.2px;
  margin-top:2px;
}
.cardSub{
  opacity:.75;
  font-size:12px;
  margin-top:-6px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.badgesRow{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.badge{
  font-size:11px;
  font-weight:1000;
  padding:4px 8px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.10);
  background: rgba(0,0,0,.16);
  opacity:.92;
}
.badge.mint{
  border-color: rgba(255,80,80,.35);
  background: rgba(255,80,80,.10);
  color: rgba(255,140,140,.98);
}
.badge.grade{
  font-size:11px;
  font-weight:1000;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background: linear-gradient(145deg, rgba(255,255,255,.10), rgba(255,255,255,.03));
  letter-spacing:.3px;
}
.badge.count{ opacity:.85; }

/* prix en pill */
.priceTag{
  margin-left:auto;
  font-size:12px;
  font-weight:1000;
  padding:5px 9px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.10);
  background: rgba(0,0,0,.16);
  display:flex;
  align-items:center;
  gap:6px;
  white-space:nowrap;
}
.priceTag span{ opacity:.75; font-weight:900; }

.qtyRow{
  display:flex;
  gap:8px;
  align-items:center;
}
.qtyInput{
  width:88px;
  padding:8px 10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.10);
  background:#0f111a;
  color:#fff;
  font-weight:1000;
}
.sellBtn{
  flex:1;
  padding:10px 12px;
  border-radius:14px;
  font-weight:1000;
  background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
  border:1px solid rgba(255,255,255,.10);
}
.sellBtn:hover{ background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06)); }

/* ===== Modal zoom slab ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  place-items:center;
  z-index:9999;
  padding:24px;
  perspective:600px;
  perspective-origin:50% 50%;
}
.modal.open{display:grid}

.slab{
  width:min(420px, 92vw);
  height:min(620px, 92vh);
  border-radius:22px;
  position:relative;
  transform-style:flat;
  transition:transform .10s ease, filter .20s ease;
  will-change:transform;
}

/* ── Foil irisé sur la carte ── */
.cardFoil, .cardGlare {
  position:absolute; inset:0;
  border-radius:16px;
  pointer-events:none;
  opacity:0;
  transition:opacity .15s ease;
  z-index:2;
}
.cardFoil {
  mix-blend-mode:color-dodge;
  background:linear-gradient(
    var(--foil-angle,125deg),
    rgba(0,0,0,0)  0%,
    var(--f1,rgba(120,180,255,.30)) 16%,
    var(--f2,rgba(140,255,180,.34)) 30%,
    var(--f3,rgba(255,220,100,.42)) 50%,
    var(--f4,rgba(255,140,180,.32)) 68%,
    var(--f5,rgba(180,120,255,.28)) 84%,
    rgba(0,0,0,0) 100%
  );
}
.cardFoil::after{
  content:"";position:absolute;inset:0;border-radius:16px;
  background:radial-gradient(
    ellipse at var(--shine-x,50%) var(--shine-y,50%),
    rgba(255,255,255,.22) 0%,rgba(0,0,0,0) 55%
  );
  mix-blend-mode:overlay;
}
.cardGlare{
  mix-blend-mode:soft-light;
  background:radial-gradient(
    ellipse at var(--glare-x,50%) var(--glare-y,50%),
    rgba(255,255,255,.55) 0%,rgba(0,0,0,0) 62%
  );
}
.cardSparkle{
  position:absolute;inset:0;
  border-radius:16px;
  pointer-events:none;
  opacity:0;
  transition:opacity .15s ease;
  mix-blend-mode:screen;
  z-index:3;
}

/* Couleurs foil par tier */
.slab[data-tier="w"] .cardFoil{--f1:rgba(180,210,255,.32);--f2:rgba(210,235,255,.34);--f3:rgba(240,248,255,.42);--f4:rgba(200,220,255,.30);--f5:rgba(175,205,255,.26);}
.slab[data-tier="b"] .cardFoil{--f1:rgba(60,200,255,.38);--f2:rgba(40,230,255,.40);--f3:rgba(80,200,255,.48);--f4:rgba(30,160,255,.36);--f5:rgba(50,110,255,.32);}
.slab[data-tier="v"] .cardFoil{--f1:rgba(255,180,245,.34);--f2:rgba(230,140,255,.38);--f3:rgba(200,110,255,.48);--f4:rgba(245,120,255,.36);--f5:rgba(150,70,255,.32);}
.slab[data-tier="g"] .cardFoil{--f1:rgba(255,245,130,.36);--f2:rgba(255,218,50,.40);--f3:rgba(255,190,30,.52);--f4:rgba(255,225,70,.38);--f5:rgba(235,160,20,.32);}
.slab[data-mint="1"] .cardFoil{--f1:rgba(255,150,170,.36);--f2:rgba(255,70,90,.42);--f3:rgba(255,40,60,.52);--f4:rgba(255,90,50,.38);--f5:rgba(255,50,130,.32);}
.shell{
  position:absolute;
  inset:0;
  border-radius:22px;
  background:linear-gradient(145deg, rgba(255,255,255,.14), rgba(255,255,255,.03));
  border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(6px);
  box-shadow: 0 35px 120px rgba(0,0,0,.65);
}
.label{
  position:absolute;
  left:50%;
  top:22px;
  transform:translateX(-50%);
  width:86%;
  height:60px;
  border-radius:14px;
  background:rgba(0,0,0,.30);
  border:1px solid rgba(255,255,255,.14);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 12px;
  gap:10px;
}
.grade{ font-size:24px; font-weight:1000; }
.mintBadge{
  padding:5px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:1000;
  border:1px solid rgba(255,80,80,.5);
  color:#ff7a7a;
  background: rgba(255,80,80,.12);
  display:none;
  white-space:nowrap;
}
.cardImg{
  position:absolute;
  left:50%;
  top:56%;
  transform:translate(-50%,-50%);
  width: min(340px, 78vw);
  height: min(470px, 70vh);
  background:center/102% auto no-repeat;
  border-radius:16px;
  overflow:hidden;
  box-shadow: 0 18px 40px rgba(0,0,0,.45);
}
.cardImg.is-horizontal{
  width: min(470px, 88vw);
  height: min(340px, 52vh);
}
/* Zoom agrandi pour Senpai */
.slab.senpai-zoom{
  width:min(520px, 96vw);
  height:min(760px, 96vh);
}
.slab.senpai-zoom .cardImg{
  width: min(440px, 88vw);
  height: min(610px, 82vh);
}

/* ===== Scrollbar dark ===== */
.gridWrap{
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.18) rgba(255,255,255,.06);
}
.gridWrap::-webkit-scrollbar{ width: 10px; }
.gridWrap::-webkit-scrollbar-track{
  background: rgba(255,255,255,.06);
  border-radius: 999px;
}
.gridWrap::-webkit-scrollbar-thumb{
  background: rgba(255,255,255,.18);
  border-radius: 999px;
  border: 2px solid rgba(0,0,0,.25);
}
.gridWrap::-webkit-scrollbar-thumb:hover{ background: rgba(255,255,255,.28); }
.gridWrap{ scrollbar-gutter: stable both-edges; }

/* carte non possédée = grisée */
.slot.missing{ opacity: .95; }
/* Blur puzzle PZL - mystère total */
.slot.senpai-blur .slotImg img{
  filter: blur(18px) brightness(.7);
  transform: scale(1.08);
}
.slot.senpai-blur .slotImg{
  overflow:hidden;
}
.slot.missing .slotImg{
  filter: grayscale(1) saturate(.15) brightness(.85) contrast(.95);
  transform: scale(.99);
}
.slot.missing::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.28)),
    repeating-linear-gradient(45deg,
      rgba(255,255,255,.035) 0px,
      rgba(255,255,255,.035) 6px,
      rgba(255,255,255,0) 6px,
      rgba(255,255,255,0) 12px
    );
  pointer-events:none;
}
.missTag{
  position:absolute;
  bottom:10px;
  right:10px;
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:1000;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.28);
  backdrop-filter: blur(6px);
  letter-spacing:.3px;
  z-index: 3;
}
.slot:not(.missing) .missTag{ display:none; }

/* ✅ Progress */
.progressBox{
  min-width: 240px;
  padding:10px 12px;
  border-radius:16px;
  background: linear-gradient(180deg, rgba(0,0,0,.16), rgba(0,0,0,.10));
  border:1px solid rgba(255,255,255,.06);
  backdrop-filter: blur(10px);
  box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255,255,255,.03);
}
.progressTop{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
  margin-bottom:8px;
}
.progressTitle{
  font-weight:1000;
  font-size:12px;
  opacity:.9;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width: 220px;
}
.progressNums{
  font-weight:1000;
  font-size:12px;
  opacity:.9;
  display:flex;
  gap:8px;
  align-items:baseline;
  white-space:nowrap;
}
.progressPct{ opacity:.75; font-weight:1000; }
.progressBar{
  height:10px;
  border-radius:999px;
  background: rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.08);
  overflow:hidden;
}
.progressFill{
  height:100%;
  border-radius:999px;
  background: linear-gradient(90deg, rgba(120,170,255,.95), rgba(255,120,220,.85));
  width:0%;
  transition: width .25s ease;
}

/* ===== Set Picker (dropdown custom) ===== */
.setPicker{ position:relative; display:flex; align-items:center; }
.setBtn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  min-width: 220px;
  padding:8px 10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.10);
  background:#0f111a;
  color:#fff;
  font-weight:900;
  cursor:pointer;
}
.setBtn:hover{ background: rgba(255,255,255,.10); }
.setBtnLabel{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width: 170px;
  opacity:.95;
}
.setBtnChevron{ opacity:.7; font-weight:1000; }

.setPanel{
  position:absolute;
  top: calc(100% + 10px);
  left:0;
  width: 320px;
  max-width: 70vw;
  border-radius:16px;
  background: rgba(15,17,26,.94);
  border:1px solid rgba(255,255,255,.10);
  backdrop-filter: blur(12px);
  box-shadow: 0 25px 70px rgba(0,0,0,.55);
  padding:10px;
  display:none;
  z-index:999;
}
.setPanel.open{ display:block; }

.setSearch{
  width:100%;
  padding:9px 10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.10);
  background: rgba(0,0,0,.25);
  color:#fff;
  outline:none;
  font-weight:800;
}
.setSearch::placeholder{ opacity:.65; }

.setList{
  margin-top:10px;
  max-height: 260px;
  overflow:auto;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.08);
  background: rgba(0,0,0,.14);
}
.setItem{
  padding:9px 10px;
  font-weight:900;
  font-size:13px;
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.04);
  display:flex;
  justify-content:space-between;
  gap:10px;
}
.setItem:last-child{ border-bottom:none; }
.setItem:hover{ background: rgba(255,255,255,.05); }
.setItem small{ opacity:.65; font-weight:900; }

.setItem.active{
  background: rgba(120,170,255,.14);
  border-left: 3px solid rgba(120,170,255,.85);
}

.setList{
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.18) rgba(255,255,255,.06);
}
.setList::-webkit-scrollbar{ width: 10px; }
.setList::-webkit-scrollbar-track{
  background: rgba(255,255,255,.06);
  border-radius: 999px;
}
.setList::-webkit-scrollbar-thumb{
  background: rgba(255,255,255,.18);
  border-radius: 999px;
  border: 2px solid rgba(0,0,0,.25);
}

/* ===== Empty state binder ===== */
.binderEmpty{
  border-radius:16px;
  background: rgba(0,0,0,.14);
  border:1px solid rgba(255,255,255,.08);
  padding:22px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.binderEmptyTitle{
  font-weight:1000;
  font-size:16px;
  opacity:.95;
}
.binderEmptySub{
  font-weight:900;
  opacity:.7;
  font-size:12px;
}

/* ===== Modale Puzzle ===== */
.puzzleModal{
  position:fixed; inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  place-items:center;
  z-index:99999;
  padding:20px;
  backdrop-filter:blur(6px);
}
.puzzleModal.open{ display:grid; }
.puzzleInner{
  max-width:min(900px, 96vw);
  width:100%;
  border-radius:18px;
  background:rgba(15,17,26,.96);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 22px 70px rgba(0,0,0,.65);
  padding:16px;
}
.puzzleHead{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
  gap:10px;
}
.puzzleTitle{ font-weight:1000; font-size:16px; }
.puzzleClose{
  padding:8px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.08);
  color:#fff;
  cursor:pointer;
  font-weight:900;
}
.puzzleClose:hover{ background:rgba(255,255,255,.14); }
.puzzleGrid{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:0;
  border-radius:12px;
  overflow:hidden;
}
.puzzleCell{
  aspect-ratio: 63 / 88;
  background:center/cover no-repeat rgba(0,0,0,.3);
  position:relative;
}
.puzzleCell.missing{
  filter:grayscale(1) brightness(.4);
}
.puzzleCell.missing::after{
  content:"?";
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  font-size:2.5rem;
  font-weight:1000;
  color:rgba(255,255,255,.3);
}
</style>
</head>

<div class="modal" id="modal" aria-hidden="true">

    <div class="shell"></div>

    <div class="label">
      <div id="zoomTitle" style="font-weight:1000;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%;">POKÉMON</div>
      <div style="display:flex;gap:8px;align-items:center;flex:0 0 auto;">
        <div class="mintBadge" id="zoomMint">MINT</div>
        <div class="grade" id="zoomGrade">?</div>

<!-- ===== MODALE PUZZLE ===== -->
<div class="puzzleModal" id="puzzleModal">

<script>
const TOKEN_KEY = "gacha_token_v1";
const GAME_KEY  = "gacha_game_v1";
const VIEW_KEY  = "gacha_view_v1";
const SET_KEY   = "gacha_set_v1";

const TOKEN = localStorage.getItem(TOKEN_KEY);
if(!TOKEN) location.href="/login.html";

function currentGame(){
  const g = String(localStorage.getItem(GAME_KEY) || "pokemon").toLowerCase();
  if (
    g === "pokemon" ||
    g === "onepiece" ||
    g === "lorcana" ||
    g === "dragonball" ||
    g === "unionarena" ||
    g === "senpaigodesshaven"
  ) return g;
  return "pokemon";
}

async function api(path, opts = {}){
  const g = encodeURIComponent(currentGame());
  const sep = path.includes("?") ? "&" : "?";
  const url = path + sep + "game=" + g;

  const r = await fetch(url, {
    ...opts,
    headers: {
      ...(opts.headers || {}),
      Authorization: "Bearer " + TOKEN,
      "Content-Type": "application/json",
    }
  });

  const data = await r.json().catch(() => ({}));
  if(!r.ok) throw new Error(data.error || ("HTTP " + r.status));
  return data;
}

const grid = document.getElementById("grid");
const searchInput = document.getElementById("search");
const sortSelect = document.getElementById("sort");
const gameSel = document.getElementById("gameSel");
const viewSel = document.getElementById("viewSel");

const progTitle = document.getElementById("progTitle");
const progOwned = document.getElementById("progOwned");
const progTotal = document.getElementById("progTotal");
const progPct   = document.getElementById("progPct");
const progFill  = document.getElementById("progFill");

const binderWrap = document.getElementById("binderWrap");
const binderGrid = document.getElementById("binderGrid");
const binderPager = document.getElementById("binderPager");
const pageInfo = document.getElementById("pageInfo");
const prevPageBtn = document.getElementById("prevPageBtn");
const nextPageBtn = document.getElementById("nextPageBtn");

const sellSelectedBtn = document.getElementById("sellSelectedBtn");
const clearSelBtn = document.getElementById("clearSelBtn");

const modal = document.getElementById("modal");
const zoomSlab = document.getElementById("zoomSlab");
const zoomImg = document.getElementById("zoomImg");
const zoomTitle = document.getElementById("zoomTitle");
const zoomGrade = document.getElementById("zoomGrade");
const zoomMint = document.getElementById("zoomMint");

const setPicker = document.getElementById("setPicker");
const setBtn = document.getElementById("setBtn");
const setBtnLabel = document.getElementById("setBtnLabel");
const setPanel = document.getElementById("setPanel");
const setSearch = document.getElementById("setSearch");
const setListEl = document.getElementById("setList");
const setSel = document.getElementById("setSel");

const selected = new Map();

let allItems = [];
let setsList = [];
let setsAll = [];
let binderCards = [];
let binderPage = 0;
function getBinderPageSize() {
  return currentGame() === "senpaigodesshaven" ? 9 : 16;
}

function currentView(){
  const v = String(localStorage.getItem(VIEW_KEY) || "grid").toLowerCase();
  return (v === "binder") ? "binder" : "grid";
}
function currentSetId(){
  return String(localStorage.getItem(SET_KEY) || "").trim();
}

gameSel.value = currentGame();
viewSel.value = currentView();

gameSel.addEventListener("change", async () => {
  localStorage.setItem(GAME_KEY, gameSel.value);
  selected.clear();
  refreshSelUI();
  localStorage.setItem(SET_KEY, "");
  binderPage = 0;
  await boot();
});

viewSel.addEventListener("change", async () => {
  localStorage.setItem(VIEW_KEY, viewSel.value);
  binderPage = 0;
  selected.clear();
  refreshSelUI();
  await boot();
});

function tierFromGrade(g){
  if(g >= 10) return "g";
  if(g >= 7) return "v";
  if(g >= 5) return "b";
  return "w";
}

function toHighImage(url){
  const u = String(url || "");
  if (u.includes("/low.webp")) return u.replace("/low.webp", "/high.webp");
  return u;
}

function sellPriceLabel(grade, mint){
  if (mint) return 20;
  const g = Number(grade) || 0;
  if (g >= 10) return 10;
  if (g >= 7) return 5;
  if (g >= 5) return 2;
  return 1;
}

function refreshSelUI(){
  let totalQty = 0;
  for (const q of selected.values()) totalQty += (Number(q) || 0);
  sellSelectedBtn.disabled = totalQty === 0;
  clearSelBtn.disabled = totalQty === 0;
  sellSelectedBtn.textContent = `VENDRE SÉLECTION (${totalQty})`;
}

function rarityRank(item){
  const g = Number(item?.grade || 0);

  const raw = String(item?.rarity || item?.rarityCode || "").trim().toUpperCase();
  if (raw){
    const map = new Map([
      ["C",1],["COMMON",1],
      ["U",2],["UNCOMMON",2],
      ["R",3],["RARE",3],
      ["RR",4],["DOUBLE RARE",4],
      ["SR",5],["SUPER RARE",5],
      ["UR",6],["ULTRA RARE",6],
      ["CSR",7],["CHARACTER SUPER RARE",7],
      ["SEC",8],["SECRET",8],["SECRET RARE",8],
      ["ALT",9],["AA",9],["ALT ART",9],["ALTERNATE ART",9],
      ["PR",10],["PROMO",10]
    ]);
    const v = map.get(raw);
    if (v) return v;
  }

  const hay = (String(item?.name||"") + " " + String(item?.set||item?.setName||"")).toUpperCase();

  if (hay.includes("PROMO")) return 10;
  if (hay.includes("SECRET")) return 8;
  if (hay.includes("ALT") || hay.includes("ALTERNATE")) return 9;
  if (hay.includes("ULTRA")) return 6;
  if (hay.includes("SUPER")) return 5;
  if (hay.includes("DOUBLE RARE") || hay.includes("RR")) return 4;
  if (hay.includes("RARE") || hay.includes(" R ")) return 3;
  if (hay.includes("UNCOMMON") || hay.includes(" U ")) return 2;
  if (hay.includes("COMMON") || hay.includes(" C ")) return 1;

  if (g >= 10) return 6;
  if (g >= 8) return 5;
  if (g >= 6) return 3;
  if (g >= 4) return 2;
  return 1;
}

function setGridMode(on){
  grid.style.display = on ? "" : "none";
  binderWrap.classList.toggle("on", !on);

  sellSelectedBtn.style.display = on ? "" : "none";
  clearSelBtn.style.display = on ? "" : "none";

  sortSelect.style.display = on ? "" : "none";
  searchInput.placeholder = on ? "Rechercher..." : "Rechercher (dans ta collection)...";
}

function setBinderControlsVisible(){
  const isBinder = currentView() === "binder";
  setPicker.style.display = isBinder ? "flex" : "none";
  binderPager.style.display = (isBinder && binderCards.length) ? "" : "none";
  if (!isBinder) closeSetPanel();
}

function openSetPanel(){
  setPanel.classList.add("open");
  setBtn.setAttribute("aria-expanded","true");
  setSearch.value = "";
  renderSetList(setsAll);
  setSearch.focus();
}
function closeSetPanel(){
  setPanel.classList.remove("open");
  setBtn.setAttribute("aria-expanded","false");
}
function toggleSetPanel(){
  if (setPanel.classList.contains("open")) closeSetPanel();
  else openSetPanel();
}

setBtn.addEventListener("click", (e) => {
  e.preventDefault();
  toggleSetPanel();
});

document.addEventListener("click", (e) => {
  if (!setPicker.contains(e.target)) closeSetPanel();
});

setSearch.addEventListener("input", () => {
  const q = setSearch.value.toLowerCase().trim();
  const filtered = !q ? setsAll : setsAll.filter(s => {
    const name = String(s.name || s.id || "").toLowerCase().trim();
    const id   = String(s.id || "").toLowerCase().trim();
    return name.startsWith(q) || id.startsWith(q);
  });
  renderSetList(filtered);
});

function renderSetList(list){
  const cur = currentSetId();
  setListEl.innerHTML = "";

  if (!list.length){
    setListEl.innerHTML = `<div class="setItem" style="opacity:.7;cursor:default;">Aucun set</div>`;
    return;
  }

  for (const s of list){
    const row = document.createElement("div");
    row.className = "setItem" + (s.id === cur ? " active" : "");
    row.innerHTML = `<span>${s.name || s.id}</span><small>${s.id}</small>`;
    row.onclick = async () => {
      setSel.value = s.id;
      localStorage.setItem(SET_KEY, s.id);
      setBtnLabel.textContent = s.name || s.id;

      binderPage = 0;
      await loadBinderSetCards();
      renderBinder();
      closeSetPanel();
    };
    setListEl.appendChild(row);
  }
}

clearSelBtn.addEventListener("click", () => {
  selected.clear();
  applyFilters();
  refreshSelUI();
});

sellSelectedBtn.addEventListener("click", async () => {
  if (!selected.size) return;

  const payload = Array.from(selected.entries()).map(([idKey, qty]) => ({ idKey, qty }));

  try{
    await api("/api/sell_bulk",{
      method:"POST",
      body: JSON.stringify({ items: payload })
    });

    selected.clear();

    await loadCollection();

    if (currentView() === "grid"){
      applyFilters();
    } else {
      await loadSetsForGame();
      if (setSel.value){
        await loadBinderSetCards();
      } else {
        binderCards = [];
      }
      renderBinder();
    }

    refreshSelUI();
  }catch(e){}
});

async function loadCollection(){
  try{
    const data = await api("/api/collection");

    allItems = (data.items || []).map(x => ({
      ...x,
      imageHigh: x.imageHigh ?? x.imagehigh ?? null,
      image: x.image ?? null,
    }));

  }catch(e){
    localStorage.removeItem(TOKEN_KEY);
    location.href="/login.html";
  }
}

function applyFilters(){
  const q = searchInput.value.toLowerCase().trim();
  let items = [...allItems];

  if(q){
    items = items.filter(item =>
      (item.name || "").toLowerCase().includes(q) ||
      (item.set || item.setName || "").toLowerCase().includes(q) ||
      String(item.grade || "").includes(q)
    );
  }

  const sort = sortSelect.value;

  if(sort === "grade"){
    items.sort((a,b)=> (b.grade||0) - (a.grade||0) || (b.lastAt||0) - (a.lastAt||0));
  } else if(sort === "name"){
    items.sort((a,b)=> (a.name||"").localeCompare(b.name||"") || (b.lastAt||0) - (a.lastAt||0));
  } else if(sort === "duplicates"){
    items.sort((a,b)=> (b.count||0) - (a.count||0) || (b.lastAt||0) - (a.lastAt||0));
  } else if(sort === "rarity"){
    items.sort((a,b)=> rarityRank(b) - rarityRank(a) || (b.grade||0) - (a.grade||0) || (b.lastAt||0) - (a.lastAt||0));
  } else {
    items.sort((a,b)=> (b.lastAt||0) - (a.lastAt||0));
  }

  render(items);
  refreshSelUI();
}

function openZoom(x){
  zoomSlab.classList.toggle("senpai-zoom", currentGame() === "senpaigodesshaven");
  const img = x.image || x.imageHigh || x.imagehigh || null;

  zoomImg.style.backgroundImage = `url('${img}')`;
  // Extraction couleurs adaptatives
  zoomAdaptiveColors=null; zoomAdaptivePal=null;
  if(img) extractDominantColors(img,(colors)=>{
    if(colors){zoomAdaptiveColors=colors;zoomAdaptivePal=colorsToSparkPal(colors);}
  });  zoomTitle.textContent = `${x.name} • ${x.set || x.setName || ""}`;
  zoomGrade.textContent = (x.grade ?? "?");

  zoomSlab.dataset.tier = tierFromGrade(Number(x.grade)||0);
  zoomSlab.dataset.mint = x.mint ? "1" : "0";
  zoomMint.style.display = x.mint ? "inline-flex" : "none";

  // Détection carte horizontale
  if(img){
    const tmpImg = new Image();
    tmpImg.onload = () => {
      zoomImg.classList.toggle("is-horizontal", tmpImg.naturalWidth > tmpImg.naturalHeight);
    };
    tmpImg.src = img;
  } else {
    zoomImg.classList.remove("is-horizontal");
  }

  modal.classList.add("open");
  modal.setAttribute("aria-hidden","false");
}

function render(items){
  grid.innerHTML="";
  items.forEach(x=>{
    const el=document.createElement("div");
    el.className="cardBox";

    const g = (x.game || currentGame());

    const gameTag =
      g === "onepiece" ? "🟥 One Piece" :
      g === "lorcana" ? "🟦 Lorcana" :
      g === "dragonball" ? "🟧 Dragon Ball" :
      g === "unionarena" ? "🟪 Union Arena" :
      g === "senpaigodesshaven" ? "🩷 Senpai Goddess Haven" :
      "🟨 Pokémon";
    const unit = sellPriceLabel(x.grade || 0, !!x.mint);

    const wasSelected = selected.has(x.idKey);
    const selQty = selected.get(x.idKey) || 1;

    const imgForCard =
    (currentGame() === "pokemon" || currentGame() === "lorcana")
      ? (x.image || x.imageHigh || x.imagehigh || null)
      : x.image;

    el.innerHTML=`
      <div class="cImg" style="background-image:url('${imgForCard}')"></div>

      <div class="selRow" style="margin-top:10px;">
        <div style="opacity:.75;font-size:12px;">${gameTag}</div>

        <label class="selLabel">
          <input class="selBox" type="checkbox" ${wasSelected ? "checked" : ""}>
          Sélection
        </label>
      </div>

      <div class="cardTitle">${x.name}</div>
      <div class="cardSub">${x.set || x.setName || ""}</div>

      <div class="badgesRow" style="margin-top:6px;">
        <span class="badge grade">G${x.grade}</span>
        ${x.mint ? `<span class="badge mint">MINT</span>` : ``}
        <span class="badge count">×${x.count}</span>

        <div class="priceTag">
          ${unit}<img class="moneyIcon" src="dollax.png" alt="Dollax">
          <span>/ carte</span>
        </div>
      </div>

      <div class="qtyRow" style="margin-top:10px;">
        <input class="qtyInput" type="number" min="1" max="${x.count}"
          value="${Math.max(1, Math.min(x.count, Number(selQty)||1))}">
        <button class="sellBtn" type="button">VENDRE 1</button>
      </div>
    `;

    el.querySelector(".cImg").onclick = () => openZoom(x);

    const box = el.querySelector(".selBox");
    const qtyInput = el.querySelector(".qtyInput");

    function clampQty(){
      const q = Math.max(1, Math.min(Number(x.count) || 1, Number(qtyInput.value) || 1));
      qtyInput.value = String(q);
      return q;
    }

    box.onchange = () => {
      if (box.checked){
        const q = clampQty();
        selected.set(x.idKey, q);
      } else {
        selected.delete(x.idKey);
      }
      refreshSelUI();
    };

    qtyInput.oninput = () => {
      const q = clampQty();
      if (box.checked){
        selected.set(x.idKey, q);
        refreshSelUI();
      }
    };

    el.querySelector(".sellBtn").onclick = async () => {
      try{
        await api("/api/sell",{
          method:"POST",
          body: JSON.stringify({ idKey: x.idKey, qty: 1 })
        });

        if (selected.has(x.idKey)){
          const prev = selected.get(x.idKey) || 1;
          const next = Math.max(1, prev - 1);
          selected.set(x.idKey, next);
        }

        await loadCollection();

        if (currentView() === "grid"){
          applyFilters();
        } else {
          await loadSetsForGame();
          if (setSel.value) await loadBinderSetCards();
          renderBinder();
        }
      }catch{}
    };

    grid.appendChild(el);
  });
}

function parseIdKey(idKey){
  const p = String(idKey || "").split("__");
  return {
    game:   p[0] || "",
    setId:  p[1] || "",
    localId:p[2] || "",
    cardId: p[3] || ""
  };
}

async function loadSetsForGame(){
  setsList = [];
  try{
    const data = await api("/api/sets");
    setsList = data.sets || [];
  }catch{
    setsList = [];
  }

  setsAll = [...setsList];

  setSel.innerHTML = "";
  for (const s of setsAll){
    const o = document.createElement("option");
    o.value = s.id;
    o.textContent = s.name || s.id;
    setSel.appendChild(o);
  }

  const saved = currentSetId();
  const found = setsAll.find(s => s.id === saved);

  if (found){
    setSel.value = found.id;
    setBtnLabel.textContent = found.name || found.id;
  } else {
    setSel.value = "";
    setBtnLabel.textContent = "Choisir un set…";
    localStorage.setItem(SET_KEY, "");
  }

  if (setPanel.classList.contains("open")) renderSetList(setsAll);
}

async function loadBinderSetCards(){
  binderCards = [];
  const setId = setSel.value;
  if (!setId) return;

  try{
    const data = await api("/api/set_cards?setId=" + encodeURIComponent(setId));

    binderCards = (data.cards || []).map(c => ({
      ...c,
      imageHigh: c.imageHigh ?? c.imagehigh ?? null,
      image: c.image ?? null,
    }));
  }catch(e){
    binderCards = [];
  }

  // Tri Senpai par rareté, sinon par numéro
  const SENPAI_RARITY_SET1_2 = ["SSR","UR","ZR","MR","SP","ECG","SSP","LSP","XR","TCX","TCR","SLR","SER","ETR","SEXR"];
  const SENPAI_RARITY_SET3   = ["PZL1","PZL2","SR","SSR","UR","CR","CP","ZR","MR","NX","SP","OL","SXR","MAX","SEX","ESR","SSS","SES","SSP","LSP"];

  function senpaiRarityOrder(card, setId) {
    const localId = String(card.localId || "");
    const rarity = localId.replace(/-\d+$/, ""); // ex: "SSR-001" → "SSR"
    const list = (setId === "set3") ? SENPAI_RARITY_SET3 : SENPAI_RARITY_SET1_2;
    const idx = list.indexOf(rarity);
    return idx === -1 ? 9999 : idx;
  }

  const isSenpai = currentGame() === "senpaigodesshaven";
  const currentSetId2 = setSel.value;

  if (isSenpai) {
    binderCards.sort((a, b) => {
      const ra = senpaiRarityOrder(a, currentSetId2);
      const rb = senpaiRarityOrder(b, currentSetId2);
      if (ra !== rb) return ra - rb;
      // même rareté → tri par numéro
      const na = Number(String(a.localId || "").match(/\d+/)?.[0] || 0);
      const nb = Number(String(b.localId || "").match(/\d+/)?.[0] || 0);
      return na - nb;
    });
  } else {
    binderCards.sort((a,b)=>{
      const ax = String(a.localId || "").match(/\d+/)?.[0] || "0";
      const bx = String(b.localId || "").match(/\d+/)?.[0] || "0";
      return Number(ax) - Number(bx);
    });
  }
}

function buildOwnedMapForSet(setId){
  const g = currentGame();
  const m = new Map();

  for (const it of allItems){
    if ((it.game || g) !== g) continue;

    const ids = parseIdKey(it.idKey);
    const itSetId = String(it.setId || ids.setId || "").trim();
    if (itSetId !== String(setId)) continue;

    const key = String(it.cardId || ids.cardId || "").trim();
    if (key) m.set(key, it);
  }
  return m;
}

function renderBinder(){
  const isBinder = currentView() === "binder";

  setBinderControlsVisible();
  binderGrid.innerHTML = "";
  binderGrid.classList.toggle("senpai", currentGame() === "senpaigodesshaven");

  if (!isBinder) return;

  const setId = setSel.value;
  if (!setId){
    binderPager.style.display = "none";
    binderGrid.innerHTML = `
      <div class="binderEmpty">
        <div class="binderEmptyTitle">Choisis un set pour afficher le classeur.</div>
        <div class="binderEmptySub">Clique “Choisir un set…” puis filtre avec la recherche (ex: “fl”).</div>
      </div>
    `;
    updateProgress([], "Set");
    return;
  }

  const total = binderCards.length;
  const pages = Math.max(1, Math.ceil(total / getBinderPageSize()));
  binderPage = Math.max(0, Math.min(binderPage, pages - 1));

  const start = binderPage * getBinderPageSize();
  const slice = binderCards.slice(start, start + getBinderPageSize());

  const owned = buildOwnedMapForSet(setId);

  binderPager.style.display = total ? "" : "none";
  pageInfo.textContent = `Page ${binderPage + 1} / ${pages}`;
  prevPageBtn.disabled = binderPage === 0;
  nextPageBtn.disabled = binderPage >= pages - 1;

  // Bouton puzzle pour Senpai set3 page 1 (PZL1) et page 2 (PZL2)
  const existingPuzzleBtn = document.getElementById("puzzleBtn");
  if(existingPuzzleBtn) existingPuzzleBtn.remove();
  if(currentGame() === "senpaigodesshaven" && setId === "set3"){
    const isPzl1 = binderPage === 0;
    const isPzl2 = binderPage === 1;
    if(isPzl1 || isPzl2){
      const pzlPrefix = isPzl1 ? "PZL1" : "PZL2";
      const pzlLabel  = isPzl1 ? "Puzzle 1" : "Puzzle 2";

      // Vérifier si toutes les 9 cartes du puzzle sont possédées
      let pzlComplete = true;
      for(let i = 1; i <= 9; i++){
        const num = String(i).padStart(3,"0");
        const card = binderCards.find(c => String(c.localId||"") === pzlPrefix+"-"+num);
        if(!card){ pzlComplete = false; break; }
        const key = String(card.cardId || card.id || "").trim();
        if(!owned.has(key)){ pzlComplete = false; break; }
      }

      const btn = document.createElement("button");
      btn.id = "puzzleBtn";
      if(pzlComplete){
        btn.textContent = "🧩 Voir " + pzlLabel;
        btn.style.cssText = "padding:8px 16px;border-radius:12px;border:1px solid rgba(255,100,200,.4);background:rgba(255,100,200,.12);color:#fff;font-weight:900;cursor:pointer;margin-top:10px;width:100%;font-size:14px;";
        btn.onmouseenter = () => btn.style.background = "rgba(255,100,200,.22)";
        btn.onmouseleave = () => btn.style.background = "rgba(255,100,200,.12)";
        btn.onclick = () => openPuzzleModal(pzlPrefix, pzlLabel);
      } else {
        btn.textContent = "🔒 " + pzlLabel + " — puzzle incomplet";
        btn.style.cssText = "padding:8px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.3);font-weight:900;cursor:not-allowed;margin-top:10px;width:100%;font-size:14px;";
        btn.disabled = true;
      }
      binderGrid.parentElement.insertBefore(btn, binderGrid);
    }
  }

  const fullSet = binderCards.map(c => ({
    ...c,
    have: owned.has(String(c.cardId || c.id || "").trim())
  }));
  const setLabel = (setsList.find(s => s.id === setId)?.name) || setId || "Set";
  updateProgress(fullSet, setLabel);

  const fixed = [];
  for (let i = 0; i < getBinderPageSize(); i++){
    fixed.push(slice[i] || null);
  }

  fixed.forEach((cardBrief) => {
    const slot = document.createElement("div");
    const isEmpty = !cardBrief;

    if (isEmpty){
      slot.className = "slot empty";
      slot.innerHTML = `
        <div class="slotImg"></div>
        <div class="slotTitle">—</div>
        <div class="slotSub">Hors set</div>
        <div class="slotMeta">
          <span class="pill">#—</span>
          <span class="pill">G—</span>
        </div>
      `;
      binderGrid.appendChild(slot);
      return;
    }

    const key = String(cardBrief.cardId || cardBrief.id || "").trim();
    const ownedItem = owned.get(key) || null;
    const have = !!ownedItem;

    const img = have
      ? (ownedItem.image || ownedItem.imageHigh || ownedItem.imagehigh || null)
      : (cardBrief.image || cardBrief.imageHigh || cardBrief.imagehigh || null);

    const isSenpaiMissing = !have && currentGame() === "senpaigodesshaven";
    slot.className = "slot" + (have ? "" : " missing") + (isSenpaiMissing ? " senpai-blur" : "");

    const localId = String(cardBrief.localId || "");
    const title = cardBrief.name || "Carte";
    const sub = have ? `Obtenue ×${ownedItem.count || 1}` : `Manquante`;
    const grade = have ? (ownedItem.grade ?? "?") : "—";
    const mint = have ? !!ownedItem.mint : false;

    slot.innerHTML = `
      ${!have ? `<div class="missTag">MANQUANTE</div>` : ""}

      <div class="slotImg" style="display:flex;align-items:center;justify-content:center;overflow:hidden;">
        ${
          img
            ? `<img
                src="${img}"
                alt="${title}"
                style="max-width:100%;max-height:100%;object-fit:contain;display:block;"
                onerror="console.error('IMG ERROR:', this.src)"
              >`
            : ``
        }
      </div>

      <div class="slotTitle">${title}</div>
      <div class="slotSub">${sub}</div>
      <div class="slotMeta">
        <span class="pill">#${localId || "?"}</span>
        <span class="pill">G${grade}</span>
        ${mint ? `<span class="pill mint">MINT</span>` : ``}
      </div>
    `;

    const imgEl = slot.querySelector(".slotImg");
    if (have){
      imgEl.onclick = () => openZoom({
        ...ownedItem,
        set: (ownedItem.set || ownedItem.setName || ""),
      });
    }

    binderGrid.appendChild(slot);
  });
}

prevPageBtn.addEventListener("click", () => {
  binderPage = Math.max(0, binderPage - 1);

// ══ TILT + FOIL + ÉTOILES — zoom collection ══

// ══ FOIL ADAPTATIF — collection zoom ══
const _analyseCvC = document.createElement("canvas");
const _analyseCtxC = _analyseCvC.getContext("2d");

function extractDominantColors(imgUrl, cb){
  const img=new Image();
  img.crossOrigin="anonymous";
  img.onload=()=>{
    _analyseCvC.width=60;_analyseCvC.height=60;
    _analyseCtxC.drawImage(img,0,0,60,60);
    let data;try{data=_analyseCtxC.getImageData(0,0,60,60).data;}catch(e){cb(null);return;}
    const buckets={};
    for(let i=0;i<data.length;i+=4){
      if(data[i+3]<128) continue;
      const qr=Math.round(data[i]/32)*32,qg=Math.round(data[i+1]/32)*32,qb=Math.round(data[i+2]/32)*32;
      const lum=0.299*qr+0.587*qg+0.114*qb;
      if(lum<18||lum>235) continue;
      const k=`${qr},${qg},${qb}`;buckets[k]=(buckets[k]||0)+1;
    }
    const colors=Object.entries(buckets).sort((a,b)=>b[1]-a[1]).slice(0,6)
      .map(([k])=>{const[r,g,b]=k.split(",").map(Number);return{r,g,b};});
    cb(colors.length?colors:null);
  };
  img.onerror=()=>cb(null);
  img.src=imgUrl;
}

function rgbToHslC(r,g,b){
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}else{
    const d=max-min;s=l>.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;default:h=((r-g)/d+4)/6;}
  }
  return[Math.round(h*360),Math.round(s*100),Math.round(l*100)];
}

function buildAdaptiveFoil(colors,angle){
  if(!colors||!colors.length) return null;
  const stops=colors.map((c,i)=>{
    const[h,s,l]=rgbToHslC(c.r,c.g,c.b);
    const pct=Math.round(8+(i/(colors.length-1||1))*84);
    return `hsla(${h},${Math.min(100,s+30)}%,${Math.min(85,Math.max(55,l+10))}%,${(0.32-0.05*(i/(colors.length-1||1))).toFixed(2)}) ${pct}%`;
  });
  return `linear-gradient(${angle}deg,rgba(0,0,0,0) 0%,${stops.join(",")},rgba(0,0,0,0) 100%)`;
}

function colorsToSparkPal(colors){
  if(!colors||!colors.length) return [[45,95,74],[200,90,74],[300,85,74],[55,90,76],[355,95,74]];
  return colors.map(c=>{const[h,s,l]=rgbToHslC(c.r,c.g,c.b);return[h,Math.min(100,s+30),Math.min(88,Math.max(60,l+15))];});
}

const STAR_PAL = {
  w:[[200,50,90],[215,40,88],[205,45,92],[195,35,86],[210,55,90]],
  b:[[200,90,74],[185,88,76],[210,92,72],[195,85,78],[205,88,70]],
  v:[[300,85,74],[280,88,72],[315,82,76],[290,90,70],[305,80,74]],
  g:[[45,95,74],[55,90,76],[35,92,70],[50,88,72],[40,94,68]],
  m:[[355,95,74],[10,90,76],[345,88,70],[5,92,72],[350,85,68]],
};

let zoomAdaptiveColors=null, zoomAdaptivePal=null;

function getZoomTier(){ return zoomSlab?.dataset?.mint==="1"?"m":(zoomSlab?.dataset?.tier||"w"); }

const zoomFoilEl   = document.getElementById("zoomFoil");
const zoomGlareEl  = document.getElementById("zoomGlare");
const zoomSparkCv  = document.getElementById("zoomSparkle");
const zoomSparkCtx = zoomSparkCv ? zoomSparkCv.getContext("2d") : null;

const zoomSparks = Array.from({length:100},()=>({
  x:Math.random(),y:Math.random(),
  r:0.4+Math.random()*2.0,
  phase:Math.random()*Math.PI*2,
  speed:0.28+Math.random()*0.95,
  big:Math.random()>0.70,
  ci:Math.floor(Math.random()*5),
}));

let zSparkActive=false, zSparkRAF=null, zT=0, zMx=0.5, zMy=0.5;
let zoomSlabRect=null, zDragging=false;

function drawZoomSparks(){
  zT+=0.036;
  if(!zoomSparkCtx||!zoomSparkCv) return;
  zoomSparkCtx.clearRect(0,0,zoomSparkCv.width,zoomSparkCv.height);
  const pal=zoomAdaptivePal||STAR_PAL[getZoomTier()]||STAR_PAL.g;
  const sc=2; // étoiles x2 en mode zoom
  zoomSparks.forEach(s=>{
    const pulse=0.5+0.5*Math.sin(zT*s.speed+s.phase);
    const dx=s.x-zMx,dy=s.y-zMy;
    const prox=Math.max(0,1-Math.sqrt(dx*dx+dy*dy)/0.40);
    const alpha=pulse*(0.08+prox*0.80);
    if(alpha<0.03) return;
    const px=s.x*zoomSparkCv.width,py=s.y*zoomSparkCv.height,r=s.r*sc*(1+prox*1.6);
    const[h,sat,lit]=pal[s.ci%pal.length];
    zoomSparkCtx.globalAlpha=alpha;
    zoomSparkCtx.fillStyle=`hsl(${h},${sat}%,${lit}%)`;
    if(s.big&&r>1.6){
      zoomSparkCtx.save();zoomSparkCtx.translate(px,py);zoomSparkCtx.rotate(zT*0.18+s.phase);
      for(let i=0;i<4;i++){zoomSparkCtx.beginPath();zoomSparkCtx.ellipse(0,0,r*0.17,r*2.5,(Math.PI/4)*i,0,Math.PI*2);zoomSparkCtx.fill();}
      zoomSparkCtx.beginPath();zoomSparkCtx.arc(0,0,r*0.32,0,Math.PI*2);zoomSparkCtx.fill();
      zoomSparkCtx.restore();
    } else {
      zoomSparkCtx.beginPath();zoomSparkCtx.arc(px,py,r,0,Math.PI*2);zoomSparkCtx.fill();
    }
  });
  zoomSparkCtx.globalAlpha=1;
  if(zSparkActive) zSparkRAF=requestAnimationFrame(drawZoomSparks);
  else zSparkRAF=null;
}

function applyZoomFoil(px,py){
  if(!zoomFoilEl) return;
  const angle=115+(px-0.5)*60;
  const grad=zoomAdaptiveColors?buildAdaptiveFoil(zoomAdaptiveColors,angle):null;
  if(grad) zoomFoilEl.style.background=grad;
  zoomFoilEl.style.setProperty("--foil-angle",`${angle}deg`);
  zoomFoilEl.style.setProperty("--shine-x",`${px*100}%`);
  zoomFoilEl.style.setProperty("--shine-y",`${py*100}%`);
  zoomFoilEl.style.opacity="1";
  if(zoomGlareEl){zoomGlareEl.style.setProperty("--glare-x",`${px*100}%`);zoomGlareEl.style.setProperty("--glare-y",`${py*100}%`);zoomGlareEl.style.opacity="1";}
  if(zoomSparkCv) zoomSparkCv.style.opacity="1";
}

function resetZoomFoil(){
  if(zoomFoilEl) zoomFoilEl.style.opacity="0";
  if(zoomGlareEl) zoomGlareEl.style.opacity="0";
  if(zoomSparkCv){zoomSparkCv.style.opacity="0";zoomSparkCtx?.clearRect(0,0,zoomSparkCv.width,zoomSparkCv.height);}
}

function resetZoomTilt(){
  zoomSlab.style.transform="rotateX(0deg) rotateY(0deg)";
  zoomSlab.style.filter="";
  zoomSlabRect=null;
  zSparkActive=false;
  resetZoomFoil();
}

function setZoomTilt(clientX,clientY){
  if(!modal.classList.contains("open")) return;
  const r=zoomSlabRect||zoomSlab.getBoundingClientRect();
  const px=Math.max(0,Math.min(1,(clientX-r.left)/r.width));
  const py=Math.max(0,Math.min(1,(clientY-r.top)/r.height));
  zoomSlab.style.transform=`rotateX(${(0.5-py)*20}deg) rotateY(${(px-0.5)*20}deg)`;
  const tier=getZoomTier();
  const gc=tier==="g"?"rgba(255,200,0,.28)":tier==="v"?"rgba(190,100,255,.28)":tier==="b"?"rgba(80,160,255,.28)":tier==="m"?"rgba(255,60,60,.28)":"rgba(180,200,255,.12)";
  zoomSlab.style.filter=`drop-shadow(${(px-0.5)*-28}px ${(py-0.5)*-20+32}px 60px rgba(0,0,0,.60)) drop-shadow(0 0 28px ${gc})`;
  if(zoomImg){
    const cr=zoomImg.getBoundingClientRect();
    const cpx=Math.max(0,Math.min(1,(clientX-cr.left)/cr.width));
    const cpy=Math.max(0,Math.min(1,(clientY-cr.top)/cr.height));
    zMx=cpx; zMy=cpy;
    applyZoomFoil(cpx,cpy);
  }
}

zoomSlab.addEventListener("mouseenter",()=>{
  if(!modal.classList.contains("open")) return;
  if(zoomSparkCv&&zoomImg){const r=zoomImg.getBoundingClientRect();if(r.width>0){zoomSparkCv.width=Math.round(r.width);zoomSparkCv.height=Math.round(r.height);}}
  zoomSlab.style.transform="rotateX(0deg) rotateY(0deg)";
  zoomSlabRect=zoomSlab.getBoundingClientRect();
  zSparkActive=true; if(!zSparkRAF) drawZoomSparks();
});

zoomSlab.addEventListener("mousemove",(e)=>{
  if(!zDragging) setZoomTilt(e.clientX,e.clientY);
});

zoomSlab.addEventListener("mouseleave",()=>{
  zSparkActive=false;
  resetZoomTilt();
});

zoomSlab.addEventListener("mousedown",()=>zDragging=true);
window.addEventListener("mouseup",()=>zDragging=false);
window.addEventListener("mousemove",(e)=>{ if(zDragging&&modal.classList.contains("open")) setZoomTilt(e.clientX,e.clientY); });

// Reset tilt à la fermeture
modal.addEventListener("click",e=>{ if(e.target===modal) resetZoomTilt(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape"&&modal.classList.contains("open")) resetZoomTilt(); });

boot();

/* ===== PUZZLE ===== */
const puzzleModal = document.getElementById("puzzleModal");
const puzzleGrid  = document.getElementById("puzzleGrid");
const puzzleTitle = document.getElementById("puzzleTitle");

function openPuzzleModal(pzlPrefix, label){
  // Trouver les 9 cartes du puzzle dans binderCards
  const cells = [];
  for(let i = 1; i <= 9; i++){
    const num = String(i).padStart(3,"0");
    const localId = pzlPrefix + "-" + num; // ex: PZL1-001
    const card = binderCards.find(c => String(c.localId||"") === localId);
    cells.push(card || null);
  }

  // Construire la grille owned map
  const owned = buildOwnedMapForSet(setSel.value);

  puzzleTitle.textContent = "🧩 " + label;
  puzzleGrid.innerHTML = "";

  cells.forEach((card, i) => {
    const div = document.createElement("div");
    div.className = "puzzleCell";

    if(!card){
      div.classList.add("missing");
    } else {
      const key = String(card.cardId || card.id || "").trim();
      const ownedItem = owned.get(key);
      const img = ownedItem
        ? (ownedItem.imageHigh || ownedItem.image || card.imageHigh || card.image || "")
        : (card.imageHigh || card.image || "");

      if(img){
        div.style.backgroundImage = `url("${img}")`;
      } else {
        div.classList.add("missing");
      }
    }

    puzzleGrid.appendChild(div);
  });

  puzzleModal.classList.add("open");
}

function closePuzzleModal(){
  puzzleModal.classList.remove("open");
  puzzleGrid.innerHTML = "";
}

puzzleModal.addEventListener("click", e => {
  if(e.target === puzzleModal) closePuzzleModal();
});
window.addEventListener("keydown", e => {
  if(e.key === "Escape" && puzzleModal.classList.contains("open")) closePuzzleModal();
});

<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Collection — Gachax</title>

<style>
:root{
  --bg1:#05060d;
  --bg2:#090b18;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  color:#fff;
  background:
    radial-gradient(900px 520px at 20% 10%, rgba(80,130,255,.22), transparent 60%),
    radial-gradient(900px 600px at 85% 30%, rgba(255,80,220,.18), transparent 62%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
  background-attachment: fixed;
  overflow-x:hidden;
}

.wrap{
  width:min(1200px,95vw);
  margin:24px auto;
  display:grid;
  gap:16px;
  min-height:100vh;
}

/* ===== Topbar ===== */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  border-radius:16px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10);
  backdrop-filter:blur(10px);

  position: sticky;
  top: 14px;
  z-index: 50;
  gap:12px;
  box-shadow: 0 18px 60px rgba(0,0,0,.35);
}

.controls{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}

input, select{
  padding:8px 10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.15);
  background:#0f111a;
  color:#fff;
  font-weight:700;
  outline:none;
}
input::placeholder{opacity:.65}

button{
  padding:8px 12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.08);
  color:#fff;
  font-weight:900;
  cursor:pointer;
  transition: transform .12s ease, background .12s ease, border-color .12s ease;
}
button:hover{ background:rgba(255,255,255,.12); transform: translateY(-1px); }
button:active{ transform: translateY(0px) scale(.99); }
button:disabled{opacity:.55;cursor:not-allowed; transform:none}

.smallNote{
  opacity:.7;
  font-size:12px;
  font-weight:900;
}

/* ===== Grid container ===== */
.gridWrap{
  border-radius:16px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10);
  padding:20px;
  flex:1;
}

/* grid responsive auto */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap:18px;
}

/* ===== Binder 4x4 ===== */
.binderWrap{
  display:none;
  flex-direction:column;
  gap:14px;
}
.binderWrap.on{ display:flex; }

.binderGrid{
  display:grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap:14px;
}
@media (max-width: 900px){
  .binderGrid{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
@media (max-width: 520px){
  .binderGrid{ grid-template-columns: repeat(1, minmax(0, 1fr)); }
}

.slot{
  position:relative;
  border-radius:16px;
  background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
  border:1px solid rgba(255,255,255,.12);
  overflow:hidden;
  box-shadow: 0 16px 50px rgba(0,0,0,.25);
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:12px;
  min-height: 340px;
}
.slot.empty{
  background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
  border-style:dashed;
  opacity:.85;
}
.slot:hover{
  border-color: rgba(255,255,255,.18);
}

.slotImg{
  height:240px;
  border-radius:12px;
  background: rgba(0,0,0,.25) center/contain no-repeat;
  border:1px solid rgba(255,255,255,.10);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
  cursor:pointer;
  transition: transform .16s ease;
}
.slot.empty .slotImg{
  background:
    radial-gradient(220px 120px at 40% 40%, rgba(255,255,255,.08), transparent 60%),
    rgba(0,0,0,.18);
  cursor:default;
}
.slot:hover .slotImg{ transform: scale(1.01); }
.slot.empty:hover .slotImg{ transform:none; }

.slotTitle{
  font-weight:1000;
  letter-spacing:.2px;
  margin-top:2px;
}
.slotSub{
  opacity:.75;
  font-size:12px;
  margin-top:-6px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.slotMeta{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  margin-top:auto;
}
.pill{
  font-size:11px;
  font-weight:1000;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.18);
  opacity:.92;
}
.pill.mint{
  border-color: rgba(255,80,80,.55);
  background: rgba(255,80,80,.12);
  color: rgba(255,120,120,.98);
}

.binderPager{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:14px;
  background:rgba(0,0,0,.18);
  border:1px solid rgba(255,255,255,.12);
}
.binderPager .mid{
  font-weight:1000;
  opacity:.9;
  text-align:center;
  flex:1;
}

/* ===== Money icon ===== */
.moneyIcon{
  width:16px;
  height:16px;
  object-fit:contain;
  display:inline-block;
  vertical-align:-3px;
  margin-left:4px;
  filter: drop-shadow(0 6px 14px rgba(0,0,0,.35));
}

/* ===== Card ===== */
.cardBox{
  position:relative;
  background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
  border:1px solid rgba(255,255,255,.12);
  border-radius:16px;
  padding:12px;
  overflow:hidden;
  transition: transform .14s ease, background .14s ease, border-color .14s ease;
  box-shadow: 0 16px 50px rgba(0,0,0,.25);
  display:flex;
  flex-direction:column;
  gap:10px;
}
.cardBox:hover{
  transform: translateY(-2px);
  background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
  border-color: rgba(255,255,255,.18);
}

.cImg{
  height:240px;
  border-radius:12px;
  background: rgba(0,0,0,.25) center/contain no-repeat;
  border:1px solid rgba(255,255,255,.10);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
  cursor:pointer;
  transition: transform .16s ease;
}
.cardBox:hover .cImg{ transform: scale(1.01); }

.selRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.selLabel{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
  opacity:.92;
  user-select:none;
  font-weight:900;
}
.selLabel input{ accent-color: rgba(120,170,255,.95); }

.cardTitle{
  font-weight:1000;
  letter-spacing:.2px;
  margin-top:2px;
}

.cardSub{
  opacity:.75;
  font-size:12px;
  margin-top:-6px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.badgesRow{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

.badge{
  font-size:11px;
  font-weight:1000;
  padding:4px 8px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.18);
  opacity:.92;
}

.badge.mint{
  border-color: rgba(255,80,80,.55);
  background: rgba(255,80,80,.12);
  color: rgba(255,120,120,.98);
}

.badge.grade{
  font-size:11px;
  font-weight:1000;
  padding:4px 10px;
  border-radius:999px;

  border:1px solid rgba(255,255,255,.18);
  background: linear-gradient(145deg, rgba(255,255,255,.12), rgba(255,255,255,.04));

  letter-spacing:.3px;
}

.badge.count{
  opacity:.85;
}

/* prix en pill */
.priceTag{
  margin-left:auto;
  font-size:12px;
  font-weight:1000;
  padding:5px 9px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(0,0,0,.18);
  display:flex;
  align-items:center;
  gap:6px;
  white-space:nowrap;
}
.priceTag span{ opacity:.75; font-weight:900; }

.qtyRow{
  display:flex;
  gap:8px;
  align-items:center;
}

.qtyInput{
  width:88px;
  padding:8px 10px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.15);
  background:#0f111a;
  color:#fff;
  font-weight:1000;
}

.sellBtn{
  flex:1;
  padding:10px 12px;
  border-radius:12px;
  font-weight:1000;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
}
.sellBtn:hover{ background: rgba(255,255,255,.12); }

/* ===== Modal zoom slab ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  place-items:center;
  z-index:9999;
  padding:24px;
}
.modal.open{display:grid}

.slab{
  width:min(420px, 92vw);
  height:min(620px, 92vh);
  border-radius:22px;
  position:relative;
}

.shell{
  position:absolute;
  inset:0;
  border-radius:22px;
  background:linear-gradient(145deg, rgba(255,255,255,.14), rgba(255,255,255,.03));
  border:1px solid rgba(255,255,255,.18);
  backdrop-filter:blur(6px);
  box-shadow: 0 35px 120px rgba(0,0,0,.65);
}

.label{
  position:absolute;
  left:50%;
  top:22px;
  transform:translateX(-50%);
  width:86%;
  height:60px;
  border-radius:14px;
  background:rgba(0,0,0,.30);
  border:1px solid rgba(255,255,255,.20);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 12px;
  gap:10px;
}

.grade{
  font-size:24px;
  font-weight:1000;
}

.mintBadge{
  padding:5px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:1000;
  border:1px solid rgba(255,80,80,.6);
  color:#ff7a7a;
  background: rgba(255,80,80,.12);
  display:none;
  white-space:nowrap;
}

.cardImg{
  position:absolute;
  left:50%;
  top:56%;
  transform:translate(-50%,-50%);
  width: min(340px, 78vw);
  height: min(470px, 70vh);
  background:center/contain no-repeat;
  border-radius:16px;
  box-shadow: 0 18px 40px rgba(0,0,0,.45);
}

/* ===== Scrollbar dark ===== */
.gridWrap{
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.18) rgba(255,255,255,.06);
}
.gridWrap::-webkit-scrollbar{ width: 10px; }
.gridWrap::-webkit-scrollbar-track{
  background: rgba(255,255,255,.06);
  border-radius: 999px;
}
.gridWrap::-webkit-scrollbar-thumb{
  background: rgba(255,255,255,.18);
  border-radius: 999px;
  border: 2px solid rgba(0,0,0,.25);
}
.gridWrap::-webkit-scrollbar-thumb:hover{ background: rgba(255,255,255,.28); }
.gridWrap{ scrollbar-gutter: stable both-edges; }

/* carte non possédée = grisée */
.slot.missing{
  opacity: .95;
}

.slot.missing .slotImg{
  filter: grayscale(1) saturate(.15) brightness(.85) contrast(.95);
  transform: scale(.99);
}

.slot.missing::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.35)),
    repeating-linear-gradient(45deg,
      rgba(255,255,255,.05) 0px,
      rgba(255,255,255,.05) 6px,
      rgba(255,255,255,0) 6px,
      rgba(255,255,255,0) 12px
    );
  pointer-events:none;
}

.missTag{
  position:absolute;
  bottom:10px;
  right:10px;
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:1000;
  border:1px solid rgba(255,255,255,.18);
  background: rgba(0,0,0,.35);
  backdrop-filter: blur(6px);
  letter-spacing:.3px;
  z-index: 3;
}

.slot:not(.missing) .missTag{ display:none; }

/* ✅ Progress (TCG Pocket vibe) */
.progressBox{
  min-width: 240px;
  padding:10px 12px;
  border-radius:14px;
  background: rgba(0,0,0,.22);
  border:1px solid rgba(255,255,255,.12);
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,.25);
}

.progressTop{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
  margin-bottom:8px;
}

.progressTitle{
  font-weight:1000;
  font-size:12px;
  opacity:.9;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width: 140px;
}

.progressNums{
  font-weight:1000;
  font-size:12px;
  opacity:.9;
  display:flex;
  gap:8px;
  align-items:baseline;
  white-space:nowrap;
}

.progressPct{
  opacity:.75;
  font-weight:1000;
}

.progressBar{
  height:10px;
  border-radius:999px;
  background: rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.10);
  overflow:hidden;
}

.progressFill{
  height:100%;
  border-radius:999px;
  background: linear-gradient(90deg, rgba(120,170,255,.95), rgba(255,120,220,.85));
  width:0%;
  transition: width .25s ease;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="topbar">
    <div><b>Gachax</b> — Collection</div>

    <div class="controls">
      <!-- ✅ FILTRE JEU -->
      <select id="gameSel" title="Jeu">
        <option value="pokemon">Pokémon</option>
        <option value="onepiece">One Piece</option>
        <option value="lorcana">Lorcana</option>
      </select>

      <!-- ✅ MODE -->
      <select id="viewSel" title="Affichage">
        <option value="grid">Grille</option>
        <option value="binder">Classeur 4×4</option>
      </select>

      <!-- ✅ RECHERCHE SET (visible seulement en binder) -->
      <input id="setSearch" placeholder="Rechercher un set..." style="display:none; min-width: 200px;">

      <!-- ✅ FILTRE EXTENSION / SET -->
      <select id="setSel" title="Set / Extension" style="display:none; min-width: 220px;"></select>

      <input id="search" placeholder="Rechercher...">

      <select id="sort" title="Tri">
        <option value="recent">Dernières obtenues</option>
        <option value="grade">Meilleure note</option>
        <option value="name">Nom A-Z</option>
      </select>

      <!-- ✅ bulk sell controls -->
      <button id="sellSelectedBtn" disabled>VENDRE SÉLECTION (0)</button>
      <button id="clearSelBtn" disabled>VIDER</button>

      <button onclick="location.href='/market.html'">MARKET</button>
      <button onclick="location.href='/friends.html'">FRIENDS</button>
      <button onclick="location.href='/'">← Retour</button>
    </div>
  </div>

  <!-- ✅ Progress (placée ici sous la topbar) -->
  <div class="progressBox" id="progressBox" title="Progression du set">
    <div class="progressTop">
      <div class="progressTitle" id="progTitle">Set</div>
      <div class="progressNums">
        <span id="progOwned">0</span>/<span id="progTotal">0</span>
        <span class="progressPct" id="progPct">0%</span>
      </div>
    </div>
    <div class="progressBar">
      <div class="progressFill" id="progFill" style="width:0%"></div>
    </div>
  </div>

  <div class="gridWrap">
    <!-- GRILLE -->
    <div class="grid" id="grid"></div>

    <!-- BINDER -->
    <div class="binderWrap" id="binderWrap">
      <div class="binderPager" id="binderPager" style="display:none;">
        <button id="prevPageBtn">◀</button>
        <div class="mid" id="pageInfo">Page 1 / 1</div>
        <button id="nextPageBtn">▶</button>
      </div>

      <div class="binderGrid" id="binderGrid"></div>

      <div class="smallNote" id="binderHint" style="opacity:.65;">
        Binder : Choisis un set • Les cases grisées sont les cartes manquantes.
      </div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal" aria-hidden="true">
  <div class="slab" id="zoomSlab" data-tier="" data-mint="0" role="dialog" aria-label="Zoom carte">
    <div class="shell"></div>

    <div class="label">
      <div id="zoomTitle" style="font-weight:1000;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%;">POKÉMON</div>
      <div style="display:flex;gap:8px;align-items:center;flex:0 0 auto;">
        <div class="mintBadge" id="zoomMint">MINT</div>
        <div class="grade" id="zoomGrade">?</div>
      </div>
    </div>

    <div class="cardImg" id="zoomImg"></div>
  </div>
</div>

<script>
const TOKEN_KEY = "gacha_token_v1";
const GAME_KEY  = "gacha_game_v1";
const VIEW_KEY  = "gacha_view_v1";
const SET_KEY   = "gacha_set_v1";

const TOKEN = localStorage.getItem(TOKEN_KEY);
if(!TOKEN) location.href="/login.html";

function currentGame(){
  const g = String(localStorage.getItem(GAME_KEY) || "pokemon").toLowerCase();
  if (g === "pokemon" || g === "onepiece" || g === "lorcana") return g;
  return "pokemon";
}

async function api(path, opts = {}){
  const g = encodeURIComponent(currentGame());
  const sep = path.includes("?") ? "&" : "?";
  const url = path + sep + "game=" + g;

  const r = await fetch(url, {
    ...opts,
    headers: {
      ...(opts.headers || {}),
      Authorization: "Bearer " + TOKEN,
      "Content-Type": "application/json",
    }
  });

  const data = await r.json().catch(() => ({}));
  if(!r.ok) throw new Error(data.error || ("HTTP " + r.status));
  return data;
}

const grid = document.getElementById("grid");
const searchInput = document.getElementById("search");
const sortSelect = document.getElementById("sort");
const gameSel = document.getElementById("gameSel");
const viewSel = document.getElementById("viewSel");
const setSel = document.getElementById("setSel");
const setSearch = document.getElementById("setSearch"); // ✅ NEW

const progTitle = document.getElementById("progTitle");
const progOwned = document.getElementById("progOwned");
const progTotal = document.getElementById("progTotal");
const progPct   = document.getElementById("progPct");
const progFill  = document.getElementById("progFill");

const binderWrap = document.getElementById("binderWrap");
const binderGrid = document.getElementById("binderGrid");
const binderPager = document.getElementById("binderPager");
const pageInfo = document.getElementById("pageInfo");
const prevPageBtn = document.getElementById("prevPageBtn");
const nextPageBtn = document.getElementById("nextPageBtn");

const sellSelectedBtn = document.getElementById("sellSelectedBtn");
const clearSelBtn = document.getElementById("clearSelBtn");

// selection: idKey -> qty
const selected = new Map();

const modal = document.getElementById("modal");
const zoomSlab = document.getElementById("zoomSlab");
const zoomImg = document.getElementById("zoomImg");
const zoomTitle = document.getElementById("zoomTitle");
const zoomGrade = document.getElementById("zoomGrade");
const zoomMint = document.getElementById("zoomMint");

let allItems = [];

// ===== Binder state =====
let setsList = [];
let setsAll = []; // ✅ NEW: liste complète pour la recherche
let binderCards = [];
let binderPage = 0;                // 0-based
const BINDER_PAGE_SIZE = 16;

function currentView(){
  const v = String(localStorage.getItem(VIEW_KEY) || "grid").toLowerCase();
  return (v === "binder") ? "binder" : "grid";
}
function currentSetId(){
  return String(localStorage.getItem(SET_KEY) || "").trim();
}

gameSel.value = currentGame();
viewSel.value = currentView();

gameSel.addEventListener("change", async () => {
  localStorage.setItem(GAME_KEY, gameSel.value);
  selected.clear();
  refreshSelUI();

  localStorage.setItem(SET_KEY, "");
  binderPage = 0;

  await boot();
});

viewSel.addEventListener("change", async () => {
  localStorage.setItem(VIEW_KEY, viewSel.value);
  binderPage = 0;
  selected.clear();
  refreshSelUI();
  await boot();
});

setSel.addEventListener("change", async () => {
  localStorage.setItem(SET_KEY, setSel.value);
  binderPage = 0;
  await loadBinderSetCards();
  renderBinder();
});

function tierFromGrade(g){
  if(g >= 10) return "g";
  if(g >= 7) return "v";
  if(g >= 5) return "b";
  return "w";
}

function toHighImage(url){
  const u = String(url || "");
  if (u.includes("/low.webp")) return u.replace("/low.webp", "/high.webp");
  return u;
}

// affichage prix côté UI (le serveur reste la source de vérité)
function sellPriceLabel(grade, mint){
  if (mint) return 20;
  const g = Number(grade) || 0;
  if (g >= 10) return 10;
  if (g >= 7) return 5;
  if (g >= 5) return 2;
  return 1;
}

function refreshSelUI(){
  let totalQty = 0;
  for (const q of selected.values()) totalQty += (Number(q) || 0);
  sellSelectedBtn.disabled = totalQty === 0;
  clearSelBtn.disabled = totalQty === 0;
  sellSelectedBtn.textContent = `VENDRE SÉLECTION (${totalQty})`;
}

function setGridMode(on){
  grid.style.display = on ? "" : "none";
  binderWrap.classList.toggle("on", !on);

  // bulk sell uniquement en grille
  sellSelectedBtn.style.display = on ? "" : "none";
  clearSelBtn.style.display = on ? "" : "none";

  // search/sort utiles en grille; en binder on garde search visible mais on le rend "soft"
  sortSelect.style.display = on ? "" : "none";
  searchInput.placeholder = on ? "Rechercher..." : "Rechercher (dans ta collection)...";
}

/* setSel visible en binder pour TOUS les jeux */
function setBinderControlsVisible(){
  const isBinder = currentView() === "binder";
  setSel.style.display = isBinder ? "" : "none";
  setSearch.style.display = isBinder ? "" : "none";   // ✅ NEW
  binderPager.style.display = (isBinder && binderCards.length) ? "" : "none";

  if (!isBinder){
    setSearch.value = "";
  }
}

clearSelBtn.addEventListener("click", () => {
  selected.clear();
  applyFilters();
  refreshSelUI();
});

sellSelectedBtn.addEventListener("click", async () => {
  if (!selected.size) return;
  const payload = Array.from(selected.entries()).map(([idKey, qty]) => ({ idKey, qty }));

  try{
    await api("/api/sell_bulk",{
      method:"POST",
      body: JSON.stringify({ items: payload })
    });
    selected.clear();
    await loadCollection();
    applyFilters();      // ✅ rerender direct
    refreshSelUI();
  }catch(e){
    // silent
  }
});

async function loadCollection(){
  try{
    const data = await api("/api/collection");
    allItems = data.items || [];
  }catch(e){
    localStorage.removeItem(TOKEN_KEY);
    location.href="/login.html";
  }
}

function applyFilters(){
  const q = searchInput.value.toLowerCase().trim();
  let items = [...allItems];

  if(q){
    items = items.filter(item =>
      (item.name || "").toLowerCase().includes(q) ||
      (item.set || item.setName || "").toLowerCase().includes(q) ||
      String(item.grade || "").includes(q)
    );
  }

  const sort = sortSelect.value;
  if(sort === "grade"){
    items.sort((a,b)=> (b.grade||0) - (a.grade||0));
  } else if(sort === "name"){
    items.sort((a,b)=> (a.name||"").localeCompare(b.name||""));
  } else {
    items.sort((a,b)=> (b.lastAt||0) - (a.lastAt||0));
  }

  render(items);
  refreshSelUI();
}

function openZoom(x){
  const img = x.imageHigh || toHighImage(x.image) || x.image;

  zoomImg.style.backgroundImage = `url('${img}')`;
  zoomTitle.textContent = `${x.name} • ${x.set || x.setName || ""}`;
  zoomGrade.textContent = (x.grade ?? "?");

  zoomSlab.dataset.tier = tierFromGrade(Number(x.grade)||0);
  zoomSlab.dataset.mint = x.mint ? "1" : "0";
  zoomMint.style.display = x.mint ? "inline-flex" : "none";

  modal.classList.add("open");
  modal.setAttribute("aria-hidden","false");
}

function render(items){
  grid.innerHTML="";
  items.forEach(x=>{
    const el=document.createElement("div");
    el.className="cardBox";

    const g = (x.game || currentGame());
    const gameTag =
      g === "onepiece" ? "🟥 One Piece" :
      g === "lorcana" ? "🟦 Lorcana" :
      "🟨 Pokémon";
    const unit = sellPriceLabel(x.grade || 0, !!x.mint);

    const wasSelected = selected.has(x.idKey);
    const selQty = selected.get(x.idKey) || 1;

    const imgForCard =
      (currentGame() === "pokemon" || currentGame() === "lorcana")
        ? (x.imageHigh || toHighImage(x.image))
        : x.image;

    el.innerHTML=`
      <div class="cImg" style="background-image:url('${imgForCard}')"></div>

      <div class="selRow" style="margin-top:10px;">
        <div style="opacity:.75;font-size:12px;">${gameTag}</div>

        <label class="selLabel">
          <input class="selBox" type="checkbox" ${wasSelected ? "checked" : ""}>
          Sélection
        </label>
      </div>

      <div class="cardTitle">${x.name}</div>
      <div class="cardSub">${x.set || x.setName || ""}</div>

      <div class="badgesRow" style="margin-top:6px;">
        <span class="badge grade">G${x.grade}</span>
        ${x.mint ? `<span class="badge mint">MINT</span>` : ``}
        <span class="badge count">×${x.count}</span>

        <div class="priceTag">
          ${unit}<img class="moneyIcon" src="dollax.png" alt="Dollax">
          <span>/ carte</span>
        </div>
      </div>

      <div class="qtyRow" style="margin-top:10px;">
        <input class="qtyInput" type="number" min="1" max="${x.count}"
          value="${Math.max(1, Math.min(x.count, Number(selQty)||1))}">
        <button class="sellBtn" type="button">VENDRE 1</button>
      </div>
    `;

    el.querySelector(".cImg").onclick = () => openZoom(x);

    const box = el.querySelector(".selBox");
    const qtyInput = el.querySelector(".qtyInput");

    function clampQty(){
      const q = Math.max(1, Math.min(Number(x.count) || 1, Number(qtyInput.value) || 1));
      qtyInput.value = String(q);
      return q;
    }

    box.onchange = () => {
      if (box.checked){
        const q = clampQty();
        selected.set(x.idKey, q);
      } else {
        selected.delete(x.idKey);
      }
      refreshSelUI();
    };

    qtyInput.oninput = () => {
      const q = clampQty();
      if (box.checked){
        selected.set(x.idKey, q);
        refreshSelUI();
      }
    };

    el.querySelector(".sellBtn").onclick = async () => {
      try{
        await api("/api/sell",{
          method:"POST",
          body: JSON.stringify({ idKey: x.idKey, qty: 1 })
        });
        if (selected.has(x.idKey)){
          const prev = selected.get(x.idKey) || 1;
          const next = Math.max(1, prev - 1);
          selected.set(x.idKey, next);
        }
        await loadCollection();
        applyFilters();
      }catch{}
    };

    grid.appendChild(el);
  });
}

// =========================
// BINDER: sets + cards + pages + trous vides
// =========================

function fillSetSelect(list){
  setSel.innerHTML = "";

  if (!list.length){
    const o = document.createElement("option");
    o.value = "";
    o.textContent = "Aucun set dispo";
    setSel.appendChild(o);
    setSel.value = "";
    return;
  }

  const ph = document.createElement("option");
  ph.value = "";
  ph.textContent = "Choisir un set…";
  setSel.appendChild(ph);

  for (const s of list){
    const o = document.createElement("option");
    o.value = s.id;
    o.textContent = s.name || s.id;
    setSel.appendChild(o);
  }
}

/* ✅ IMPORTANT: pour TOUS les jeux -> /api/sets */
async function loadSetsForGame(){
  setsList = [];
  try{
    const data = await api("/api/sets");
    setsList = data.sets || [];
  }catch{
    setsList = [];
  }

  setsAll = [...setsList]; // ✅ NEW: base pour recherche
  fillSetSelect(setsList);

  const saved = currentSetId();
  setSel.value = (saved && setsList.some(s => s.id === saved)) ? saved : "";
}

/* ✅ filtre de sets via input */
setSearch.addEventListener("input", () => {
  const q = setSearch.value.toLowerCase().trim();
  const filtered = !q
    ? setsAll
    : setsAll.filter(s =>
        String(s.name || s.id).toLowerCase().includes(q) ||
        String(s.id).toLowerCase().includes(q)
      );

  fillSetSelect(filtered);

  // garde le set déjà choisi si encore présent
  const cur = currentSetId();
  if (cur && filtered.some(s => s.id === cur)) setSel.value = cur;
});

/* ✅ IMPORTANT: pour TOUS les jeux -> /api/set_cards?setId= */
async function loadBinderSetCards(){
  binderCards = [];
  const setId = setSel.value;
  if (!setId) return;

  try{
    const data = await api("/api/set_cards?setId=" + encodeURIComponent(setId));
    binderCards = data.cards || [];
  }catch{
    binderCards = [];
  }

  // tri numeric-friendly
  binderCards.sort((a,b)=>{
    const ax = String(a.localId || "").match(/\d+/)?.[0] || "0";
    const bx = String(b.localId || "").match(/\d+/)?.[0] || "0";
    return Number(ax) - Number(bx);
  });
}

// Parse idKey: game__setId__localId__cardId
function parseIdKey(idKey){
  const p = String(idKey || "").split("__");
  return {
    game:   p[0] || "",
    setId:  p[1] || "",
    localId:p[2] || "",
    cardId: p[3] || ""
  };
}

/* ✅ owned map robuste: match sur setId + cardId */
function buildOwnedMapForSet(setId){
  const g = currentGame();
  const m = new Map();

  for (const it of allItems){
    if ((it.game || g) !== g) continue;

    const ids = parseIdKey(it.idKey);
    const itSetId = String(it.setId || ids.setId || "").trim();
    if (itSetId !== String(setId)) continue;

    const key = String(it.cardId || ids.cardId || "").trim();
    if (key) m.set(key, it);
  }
  return m;
}

function renderBinder(){
  const isBinder = currentView() === "binder";

  setBinderControlsVisible();
  binderGrid.innerHTML = "";

  if (!isBinder) return;

  const setId = setSel.value;
  if (!setId){
    binderPager.style.display = "none";
    binderGrid.innerHTML = `
      <div style="opacity:.8; font-weight:900;">
        Choisis un set pour afficher le classeur.
      </div>
    `;
    updateProgress([], "Set");
    return;
  }

  const total = binderCards.length;
  const pages = Math.max(1, Math.ceil(total / BINDER_PAGE_SIZE));
  binderPage = Math.max(0, Math.min(binderPage, pages - 1));

  const start = binderPage * BINDER_PAGE_SIZE;
  const slice = binderCards.slice(start, start + BINDER_PAGE_SIZE);

  const owned = buildOwnedMapForSet(setId);

  // pager
  binderPager.style.display = total ? "" : "none";
  pageInfo.textContent = `Page ${binderPage + 1} / ${pages}`;
  prevPageBtn.disabled = binderPage === 0;
  nextPageBtn.disabled = binderPage >= pages - 1;

  // progress set (sur tout le set)
  const fullSet = binderCards.map(c => ({
    ...c,
    have: owned.has(String(c.cardId || c.id || "").trim())
  }));
  const setLabel = (setsList.find(s => s.id === setId)?.name) || setId || "Set";
  updateProgress(fullSet, setLabel);

  // 16 slots fixes
  const fixed = [];
  for (let i = 0; i < BINDER_PAGE_SIZE; i++){
    fixed.push(slice[i] || null);
  }

  fixed.forEach((cardBrief) => {
    const slot = document.createElement("div");
    const isEmpty = !cardBrief;

    if (isEmpty){
      slot.className = "slot empty";
      slot.innerHTML = `
        <div class="slotImg"></div>
        <div class="slotTitle">—</div>
        <div class="slotSub">Hors set</div>
        <div class="slotMeta">
          <span class="pill">#—</span>
          <span class="pill">G—</span>
        </div>
      `;
      binderGrid.appendChild(slot);
      return;
    }

    const key = String(cardBrief.cardId || cardBrief.id || "").trim();
    const ownedItem = owned.get(key) || null;
    const have = !!ownedItem;

    const img = have
      ? (ownedItem.imageHigh || toHighImage(ownedItem.image))
      : (cardBrief.image || null);

    slot.className = "slot" + (have ? "" : " missing");

    const localId = String(cardBrief.localId || "");
    const title = cardBrief.name || "Carte";
    const sub = have ? `Obtenue ×${ownedItem.count || 1}` : `Manquante`;
    const grade = have ? (ownedItem.grade ?? "?") : "—";
    const mint = have ? !!ownedItem.mint : false;

    slot.innerHTML = `
      ${!have ? `<div class="missTag">MANQUANTE</div>` : ""}

      <div class="slotImg" style="${img ? `background-image:url('${img}')` : ""}"></div>
      <div class="slotTitle">${title}</div>
      <div class="slotSub">${sub}</div>
      <div class="slotMeta">
        <span class="pill">#${localId || "?"}</span>
        <span class="pill">G${grade}</span>
        ${mint ? `<span class="pill mint">MINT</span>` : ``}
      </div>
    `;

    const imgEl = slot.querySelector(".slotImg");
    if (have){
      imgEl.onclick = () => openZoom({
        ...ownedItem,
        set: (ownedItem.set || ownedItem.setName || ""),
      });
    }

    binderGrid.appendChild(slot);
  });
}

prevPageBtn.addEventListener("click", () => {
  binderPage = Math.max(0, binderPage - 1);
  renderBinder();
});
nextPageBtn.addEventListener("click", () => {
  binderPage = binderPage + 1;
  renderBinder();
});

function updateProgress(cards, label = "Set"){
  const total = cards.length;
  const owned = cards.filter(c => c.have).length;
  const pct = total ? Math.round((owned / total) * 100) : 0;

  progTitle.textContent = label;
  progOwned.textContent = owned;
  progTotal.textContent = total;
  progPct.textContent = pct + "%";
  progFill.style.width = pct + "%";
}

// =========================
// Boot / sync UI
// =========================
async function boot(){
  // synchro selects
  gameSel.value = currentGame();
  viewSel.value = currentView();

  const isGrid = currentView() === "grid";
  setGridMode(isGrid);

  // load collection first (needed for binder ownership)
  await loadCollection();

  if (!isGrid){
    await loadSetsForGame();
    if (setSel.value){
      await loadBinderSetCards();
    } else {
      binderCards = [];
    }
    setBinderControlsVisible();
    renderBinder();
  } else {
    applyFilters();
    setBinderControlsVisible();
  }
}

searchInput.addEventListener("input", () => {
  if (currentView() === "grid") applyFilters();
  else {
    // en binder: si tu tapes, on repasse en grille (comportement simple)
    if (searchInput.value.trim()){
      viewSel.value = "grid";
      localStorage.setItem(VIEW_KEY, "grid");
      setGridMode(true);
      applyFilters();
    }
  }
});
sortSelect.addEventListener("change", applyFilters);

modal.onclick = e => {
  if(e.target === modal){
    modal.classList.remove("open");
    modal.setAttribute("aria-hidden","true");
  }
};

document.addEventListener("keydown", (e) => {
  if(e.key === "Escape" && modal.classList.contains("open")){
    modal.classList.remove("open");
    modal.setAttribute("aria-hidden","true");
  }
});

boot();
</script>

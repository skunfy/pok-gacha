<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gachax — Open x5 Premium</title>

  <style>
    :root{
      --bg1:#05060d;
      --bg2:#090b18;
      --shadow:0 35px 120px rgba(0,0,0,.65);

      --tW:rgba(255,255,255,.92);
      --tB:rgba(120,170,255,.90);
      --tV:rgba(190,120,255,.95);
      --tG:rgba(255,210,110,.98);
      --tM:rgba(255,80,80,.95);

      --panelBg: rgba(255,255,255,.055);
      --panelBd: rgba(255,255,255,.11);
    }

    *{ box-sizing:border-box; }

    html, body{
      width:100%;
      max-width:100%;
      overflow-x:hidden;
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:#fff;
      background:
        radial-gradient(900px 520px at 20% 10%, rgba(80,130,255,.22), transparent 60%),
        radial-gradient(900px 600px at 85% 30%, rgba(255,80,220,.18), transparent 62%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
      display:block;
    }

    .topHud{
      position:sticky;
      top:0;
      z-index:1000;
      width:100%;
      backdrop-filter:blur(12px);
      background:linear-gradient(180deg, rgba(7,9,18,.88), rgba(7,9,18,.62));
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .topHudInner{
      width:min(1400px, 100%);
      margin:0 auto;
      padding:10px 14px;
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:12px;
      align-items:center;
    }

    .playerBox{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      padding:8px 10px;
      border-radius:16px;
      background:var(--panelBg);
      border:1px solid var(--panelBd);
    }

    .playerAvatar{
      width:46px;
      height:46px;
      border-radius:14px;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,.10), transparent 52%),
        rgba(0,0,0,.22);
      background-position:center;
      background-repeat:no-repeat;
      background-size:cover;
      border:1px solid rgba(255,255,255,.12);
      flex:0 0 auto;
      box-shadow:0 0 28px rgba(120,170,255,.12);
    }

    .playerMeta{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:2px;
    }

    .playerName{
      font-size:15px;
      font-weight:1000;
      letter-spacing:.2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:180px;
    }

    .playerSub{
      font-size:11px;
      opacity:.72;
      white-space:nowrap;
    }

    .hudCenter{
      min-width:0;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .hudBadge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:7px;
      min-height:40px;
      padding:8px 12px;
      border-radius:14px;
      background:var(--panelBg);
      border:1px solid var(--panelBd);
      font-weight:1000;
      line-height:1;
      white-space:nowrap;
    }

    .hudBadge.money{
      min-width:110px;
    }

    .hudBadge .moneyIcon{
      width:21px;
      height:21px;
      flex:0 0 auto;
    }

    .hitBadge{
      min-width:72px;
      padding:7px 10px;
      gap:8px;
    }

    .hitBadge .k{
      font-size:11px;
      opacity:.72;
      letter-spacing:.4px;
    }

    .hitBadge .v{
      font-size:16px;
      font-weight:1000;
    }

    .hudRight{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:10px;
    }

    .hudBtn{
      min-height:42px;
      padding:10px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.07);
      color:#fff;
      font-weight:1000;
      font-size:14px;
      cursor:pointer;
      transition:transform .12s ease, background .12s ease, border-color .12s ease;
    }

    .hudBtn:hover{
      background:rgba(255,255,255,.11);
      transform:translateY(-1px);
    }

    .hudBtn:active{
      transform:translateY(0) scale(.99);
    }

    .wrap{
      width:100%;
      max-width:1400px;
      margin:0 auto;
      padding:18px 16px 34px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:18px;
      transition:transform .38s ease, filter .38s ease;
      transform-origin:center center;
    }

    body.globalSuspense .wrap{
      transform:scale(1.01);
      filter:brightness(1.03);
    }

    .head{
      text-align:center;
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-top:4px;
    }

    #open5Logo{
      width:340px;
      max-width:80vw;
      height:auto;
      display:block;
      margin:4px auto 2px;
      filter:
        drop-shadow(0 0 20px rgba(120,170,255,.35))
        drop-shadow(0 12px 28px rgba(0,0,0,.45));
    }

    #subLine{
      margin:0;
      opacity:.84;
      font-size:14px;
    }

    .board{
      width:100%;
      max-width:1180px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:24px;
      margin-top:2px;
      position:relative;
      transition:transform .35s ease, filter .35s ease;
      transform-origin:center center;
      isolation:isolate;
    }

    body.globalSuspense .board{
      transform:scale(1.015);
      filter:drop-shadow(0 18px 40px rgba(0,0,0,.28));
    }

    .rowTop,
    .rowBottom{
      width:100%;
      display:flex;
      justify-content:center;
      gap:30px;
      flex-wrap:nowrap;
    }

    .scene{
      perspective:600px;
      perspective-origin:50% 50%;
      position:relative;
    }

    .slab{
        width:255px;
        height:370px;
        border-radius:22px;
        position:relative;
        transform-style:preserve-3d;
        will-change:transform, filter, opacity;
        user-select:none;
        cursor:grab;

        filter:
            drop-shadow(0 26px 80px rgba(0,0,0,.42))
            drop-shadow(0 0 24px rgba(255,255,255,.06));

        transition:
            transform .18s ease,
            filter .25s ease,
            opacity .25s ease,
            box-shadow .25s ease;

        opacity:1;
        z-index:1;
        overflow:visible;
    }

    .slab:active{ cursor:grabbing; }

    /* shine/glare anciens — cachés */
    .shine,.glare{ display:none; }

    /* ── Foil irisé sur la carte ── */
    .cardFoil, .cardGlare {
      position:absolute; inset:0;
      border-radius:16px;
      pointer-events:none;
      opacity:0;
      transition: opacity .15s ease;
      z-index:2;
    }
    .cardFoil {
      mix-blend-mode: color-dodge;
      background: linear-gradient(
        var(--foil-angle, 125deg),
        rgba(0,0,0,0)   0%,
        var(--f1, rgba(120,180,255,.30)) 16%,
        var(--f2, rgba(140,255,180,.34)) 30%,
        var(--f3, rgba(255,220,100,.42)) 50%,
        var(--f4, rgba(255,140,180,.32)) 68%,
        var(--f5, rgba(180,120,255,.28)) 84%,
        rgba(0,0,0,0)  100%
      );
    }
    .cardFoil::after {
      content:""; position:absolute; inset:0; border-radius:16px;
      background: radial-gradient(
        ellipse at var(--shine-x,50%) var(--shine-y,50%),
        rgba(255,255,255,.22) 0%, rgba(0,0,0,0) 55%
      );
      mix-blend-mode: overlay;
    }
    .cardGlare {
      mix-blend-mode: soft-light;
      background: radial-gradient(
        ellipse at var(--glare-x,50%) var(--glare-y,50%),
        rgba(255,255,255,.55) 0%, rgba(0,0,0,0) 62%
      );
    }
    .cardSparkle {
      position:absolute; inset:0;
      border-radius:16px;
      pointer-events:none;
      opacity:0;
      transition: opacity .15s ease;
      mix-blend-mode: screen;
      z-index:3;
    }

    /* Couleurs foil par tier */
    .slab[data-tier="w"] .cardFoil {
      --f1:rgba(180,210,255,.32);--f2:rgba(210,235,255,.34);--f3:rgba(240,248,255,.42);--f4:rgba(200,220,255,.30);--f5:rgba(175,205,255,.26);
    }
    .slab[data-tier="b"] .cardFoil {
      --f1:rgba(60,200,255,.38);--f2:rgba(40,230,255,.40);--f3:rgba(80,200,255,.48);--f4:rgba(30,160,255,.36);--f5:rgba(50,110,255,.32);
    }
    .slab[data-tier="v"] .cardFoil {
      --f1:rgba(255,180,245,.34);--f2:rgba(230,140,255,.38);--f3:rgba(200,110,255,.48);--f4:rgba(245,120,255,.36);--f5:rgba(150,70,255,.32);
    }
    .slab[data-tier="g"] .cardFoil {
      --f1:rgba(255,245,130,.36);--f2:rgba(255,218,50,.40);--f3:rgba(255,190,30,.52);--f4:rgba(255,225,70,.38);--f5:rgba(235,160,20,.32);
    }
    .slab[data-mint="1"] .cardFoil {
      --f1:rgba(255,150,170,.36);--f2:rgba(255,70,90,.42);--f3:rgba(255,40,60,.52);--f4:rgba(255,90,50,.38);--f5:rgba(255,50,130,.32);
    }

    .shell{
        position:absolute;
        inset:0;
        border-radius:22px;
        background:
            linear-gradient(145deg, rgba(255,255,255,.16), rgba(255,255,255,.025)),
            radial-gradient(circle at 20% 12%, rgba(255,255,255,.10), transparent 32%),
            radial-gradient(circle at 85% 85%, rgba(120,170,255,.08), transparent 28%);
        backdrop-filter:blur(6px);
        box-shadow:
            0 30px 90px rgba(0,0,0,.55),
            inset 0 1px 0 rgba(255,255,255,.12),
            inset 0 -1px 0 rgba(255,255,255,.04);
        border:1px solid rgba(255,255,255,.16);
        transform:translateZ(10px);
        overflow:hidden;
    }

    .slab::before{
        content:"";
        position:absolute;
        inset:0;
        border-radius:22px;
        pointer-events:none;
        z-index:2;
        background:
            linear-gradient(
            120deg,
            rgba(255,255,255,.16) 0%,
            rgba(255,255,255,.05) 18%,
            rgba(255,255,255,0) 38%
            );
        opacity:.55;
    }

    .label{
      position:absolute;
      left:50%;
      top:18px;
      transform:translateX(-50%) translateZ(20px);
      width:222px;
      height:50px;
      border-radius:14px;
      background:rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.18);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 11px;
      backdrop-filter:blur(10px);
      gap:10px;
      z-index:3;
    }

    .left{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
    }

    .left .t{
      font-weight:900;
      font-size:11px;
      letter-spacing:.4px;
    }

    .left .s{
      opacity:.75;
      font-size:10px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:138px;
    }

    .gradeWrap{
      display:flex;
      align-items:center;
      gap:8px;
      flex:0 0 auto;
    }

    .grade{
      font-weight:1000;
      font-size:18px;
      min-width:18px;
      text-align:right;
    }

    .mintBadge{
      padding:5px 8px;
      border-radius:999px;
      font-size:10px;
      font-weight:1000;
      letter-spacing:.6px;
      background:rgba(255,80,80,.12);
      border:1px solid rgba(255,80,80,.55);
      color:var(--tM);
      text-shadow:0 0 18px rgba(255,80,80,.35);
      user-select:none;
      pointer-events:none;
      line-height:1;
    }

    .cardImg{
      position:absolute;
      left:50%;
      top:60%;
      width:195px;
      height:262px;
      transform:translate(-50%,-50%) translateZ(18px);
      border-radius:16px;
      overflow:hidden;
      background-image:linear-gradient(135deg, rgba(255,255,255,.05), rgba(0,0,0,.10));
      background-position:center center;
      background-repeat:no-repeat;
      background-size:cover;
      box-shadow:0 18px 40px rgba(0,0,0,.45);
      transition:transform .22s ease, filter .22s ease, opacity .22s ease;
      cursor:pointer;
      z-index:2;
      opacity:0;
    }
    /* 102% uniquement pour Senpai (bords blancs natifs) */
    body.senpai-active .cardImg{
      background-size:102%;
    }
    /* Cartes horizontales Senpai */
    .cardImg.is-horizontal{
      width:262px;
      height:195px;
      transform:translate(-50%,-50%) translateZ(18px) rotate(90deg);
      background-size:auto 115%;
    }

    .cardPlaceholder{
      position:absolute;
      left:50%;
      top:60%;
      width:195px;
      height:262px;
      transform:translate(-50%,-50%) translateZ(19px);
      border-radius:16px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      pointer-events:none;
      opacity:.85;
      background:radial-gradient(circle at 50% 40%, rgba(255,255,255,.08), rgba(0,0,0,0) 60%);
      z-index:2;
      transition:opacity .22s ease, transform .22s ease, filter .22s ease;
    }

    .cardPlaceholder img{
      width:112px;
      max-width:70%;
      height:auto;
      display:block;
      filter:drop-shadow(0 10px 25px rgba(0,0,0,.45));
      opacity:.95;
    }

    .edge{
      position:absolute;
      inset:0;
      border-radius:22px;
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.05);
      transform:translateZ(12px);
      pointer-events:none;
    }

    .flash{
      position:absolute;
      inset:-20%;
      opacity:0;
      transform:translateZ(40px);
      pointer-events:none;
      background:radial-gradient(circle at 50% 50%, rgba(255,255,255,.95), rgba(255,255,255,0) 60%);
    }

    .winnerGlow{
      position:absolute;
      inset:-8px;
      border-radius:28px;
      pointer-events:none;
      opacity:0;
      z-index:0;
      transition:opacity .25s ease, transform .25s ease;
      transform:scale(1);
      filter:blur(10px);
    }

    .winnerShimmer{
      position:absolute;
      inset:-2px;
      border-radius:24px;
      pointer-events:none;
      overflow:hidden;
      opacity:0;
      z-index:6;
    }

    .winnerShimmer::after{
      content:"";
      position:absolute;
      top:-10%;
      left:-42%;
      width:34%;
      height:120%;
      transform:skewX(-18deg);
      background:linear-gradient(
        90deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,.08) 35%,
        rgba(255,255,255,.26) 50%,
        rgba(255,255,255,.08) 65%,
        rgba(255,255,255,0) 100%
      );
      filter:blur(2px);
    }

    .slab[data-tier="w"] .shell{
      box-shadow:
        0 30px 90px rgba(0,0,0,.55),
        0 0 0 1px rgba(255,255,255,.22),
        0 0 65px rgba(255,255,255,.10);
    }

    .slab[data-tier="b"] .shell{
      box-shadow:
        0 30px 90px rgba(0,0,0,.55),
        0 0 0 1px rgba(120,170,255,.30),
        0 0 75px rgba(120,170,255,.25);
    }

    .slab[data-tier="v"] .shell{
      box-shadow:
        0 30px 90px rgba(0,0,0,.55),
        0 0 0 1px rgba(190,120,255,.32),
        0 0 90px rgba(190,120,255,.28);
    }

    .slab[data-tier="g"] .shell{
      box-shadow:
        0 30px 90px rgba(0,0,0,.55),
        0 0 0 1px rgba(255,210,110,.34),
        0 0 120px rgba(255,210,110,.30);
    }

    .slab[data-mint="1"] .shell{
      box-shadow:
        0 30px 90px rgba(0,0,0,.55),
        0 0 0 1px rgba(255,80,80,.40),
        0 0 130px rgba(255,80,80,.28);
    }

    .slab.multiPop{
      animation:multiPop .42s cubic-bezier(.2,.9,.2,1);
    }

    @keyframes multiPop{
      0%{
        opacity:0;
        transform:translateY(18px) scale(.91);
        filter:blur(6px);
      }
      58%{
        opacity:1;
        transform:translateY(-5px) scale(1.018);
        filter:blur(0);
      }
      100%{
        opacity:1;
        transform:translateY(0) scale(1);
        filter:blur(0);
      }
    }

    .slab.revealBurst .flash{
      animation:slabFlash .45s ease;
    }

    @keyframes slabFlash{
      0%{ opacity:0; transform:translateZ(40px) scale(.88); }
      35%{ opacity:.8; }
      100%{ opacity:0; transform:translateZ(40px) scale(1.12); }
    }

    body.globalSuspense .slab{
      animation:suspenseFloat .95s ease-in-out infinite;
    }

    body.globalSuspense .scene:nth-child(1) .slab{ animation-delay:0ms; }
    body.globalSuspense .scene:nth-child(2) .slab{ animation-delay:60ms; }
    body.globalSuspense .scene:nth-child(3) .slab{ animation-delay:120ms; }
    body.globalSuspense .scene:nth-child(4) .slab{ animation-delay:180ms; }
    body.globalSuspense .scene:nth-child(5) .slab{ animation-delay:240ms; }

    @keyframes suspenseFloat{
      0%,100%{
        transform:translateY(0px) scale(1);
        filter:drop-shadow(0 20px 70px rgba(0,0,0,.35));
      }
      50%{
        transform:translateY(-6px) scale(1.008);
        filter:drop-shadow(0 26px 84px rgba(0,0,0,.42));
      }
    }

    .slab.suck{ animation:slabSuck 460ms cubic-bezier(.2,.9,.2,1) forwards; }

    @keyframes slabSuck{
      0%{ transform:rotateX(0deg) rotateY(0deg) translateZ(0) scale(1); }
      25%{ transform:rotateX(1deg) rotateY(-1deg) translateZ(0) scale(1.01); }
      100%{ transform:rotateX(0deg) rotateY(0deg) translateZ(0) scale(.985); }
    }

    .slab.suck .cardImg{
      animation:cardSuck 460ms cubic-bezier(.15,.9,.15,1) forwards;
      transform-origin:50% 45%;
    }

    @keyframes cardSuck{
      0%{ transform:translate(-50%,-50%) translateZ(18px) scale(1) rotate(0deg); filter:blur(0px) brightness(1) saturate(1); opacity:1; }
      35%{ transform:translate(-50%,-52%) translateZ(18px) scale(.92) rotate(-10deg); filter:blur(.4px) brightness(1.05) saturate(1.05); opacity:.95; }
      70%{ transform:translate(-50%,-56%) translateZ(18px) scale(.55) rotate(40deg); filter:blur(1.2px) brightness(1.08) saturate(1.1); opacity:.75; }
      100%{ transform:translate(-50%,-62%) translateZ(18px) scale(.06) rotate(140deg); filter:blur(3px) brightness(1.2) saturate(1.2); opacity:0; }
    }

    .slab.suck .flash{
      opacity:1;
      animation:suckVortex 460ms ease forwards;
    }

    @keyframes suckVortex{
      0%{ transform:translateZ(40px) scale(.65); opacity:0; }
      25%{ opacity:.55; }
      100%{ transform:translateZ(40px) scale(1.35); opacity:0; }
    }

    .slab.suck .shell::after{
      content:"";
      position:absolute;
      inset:-20%;
      border-radius:30px;
      pointer-events:none;
      background:radial-gradient(circle at 50% 45%, rgba(255,255,255,.35), rgba(255,255,255,0) 60%);
      opacity:0;
      animation:suckGlow 460ms ease forwards;
    }

    @keyframes suckGlow{
      0%{ opacity:0; transform:scale(.95); }
      30%{ opacity:.7; }
      100%{ opacity:0; transform:scale(1.15); }
    }

    .slab.suck .cardPlaceholder{ opacity:0; }

    .slab.winner{
      z-index:7;
      animation:winnerIntro .55s cubic-bezier(.2,.9,.2,1), winnerPulse 2.8s ease-in-out .65s infinite;
    }

    .scene.winnerScene .winnerGlow{
      opacity:1;
      animation:glowPulse 2.2s ease-in-out infinite;
    }

    .scene.winnerScene .winnerShimmer{
      opacity:1;
    }

    .scene.winnerScene .winnerShimmer::after{
      animation:shimmerSweep 2.8s ease-in-out infinite;
    }

    .scene.winnerScene[data-tier="b"] .winnerGlow{
      background:radial-gradient(circle at 50% 50%, rgba(120,170,255,.20), rgba(120,170,255,0) 70%);
    }

    .scene.winnerScene[data-tier="v"] .winnerGlow{
      background:radial-gradient(circle at 50% 50%, rgba(190,120,255,.20), rgba(190,120,255,0) 70%);
    }

    .scene.winnerScene[data-tier="g"] .winnerGlow{
      background:radial-gradient(circle at 50% 50%, rgba(255,210,110,.22), rgba(255,210,110,0) 70%);
    }

    .scene.winnerScene[data-tier="m"] .winnerGlow{
      background:radial-gradient(circle at 50% 50%, rgba(255,80,80,.22), rgba(255,80,80,0) 70%);
    }

    @keyframes glowPulse{
      0%,100%{
        transform:scale(1);
        opacity:.60;
      }
      50%{
        transform:scale(1.03);
        opacity:.92;
      }
    }

    @keyframes shimmerSweep{
      0%, 70%, 100%{
        left:-42%;
        opacity:0;
      }
      10%{
        opacity:1;
      }
      35%{
        left:108%;
        opacity:1;
      }
      45%{
        opacity:0;
      }
    }

    @keyframes winnerIntro{
      0%{
        transform:translateY(0) scale(1);
        filter:drop-shadow(0 22px 70px rgba(0,0,0,.35));
      }
      45%{
        transform:translateY(-7px) scale(1.05);
        filter:drop-shadow(0 28px 88px rgba(0,0,0,.45));
      }
      100%{
        transform:translateY(-2px) scale(1.025);
        filter:drop-shadow(0 26px 84px rgba(0,0,0,.42));
      }

    .fxOverlay{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:9998;
      opacity:0;
      transition:opacity .16s ease;
      overflow:hidden;
    }

    .fxOverlay.on{ opacity:1; }

    .fxVignette{
      position:absolute;
      inset:0;
      background:
        radial-gradient(900px 520px at 50% 35%, rgba(255,255,255,.07), rgba(0,0,0,.75) 70%),
        radial-gradient(1200px 700px at 30% 20%, rgba(120,170,255,.08), transparent 60%),
        radial-gradient(1200px 800px at 80% 30%, rgba(190,120,255,.08), transparent 62%);
      opacity:0;
      animation:fxDim .26s ease forwards;
    }

    @keyframes fxDim{
      from{opacity:0}
      to{opacity:1}
    }

    .fxFlash{
      position:absolute;
      inset:-20%;
      opacity:0;
      background:radial-gradient(circle at 50% 45%, rgba(255,255,255,.95), rgba(255,255,255,0) 60%);
      transform:scale(.95);
    }

    .fxOverlay.reveal .fxFlash{ animation:fxFlash .42s ease; }

    @keyframes fxFlash{
      0%{opacity:0; transform:scale(.95)}
      25%{opacity:.95; transform:scale(1.02)}
      100%{opacity:0; transform:scale(1.14)}
    }

    .fxRing{
      position:absolute;
      left:50%;
      top:42%;
      width:min(620px, 92vw);
      height:min(620px, 92vw);
      transform:translate(-50%,-50%) scale(.85);
      border-radius:999px;
      opacity:0;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.12), rgba(255,255,255,0) 55%),
        conic-gradient(from 180deg,
          rgba(0,255,255,0),
          rgba(120,170,255,.35),
          rgba(190,120,255,.35),
          rgba(255,210,110,.25),
          rgba(0,255,255,0)
        );
      filter:blur(.5px);
    }

    .fxOverlay.reveal .fxRing{ animation:fxRing .95s cubic-bezier(.2,.9,.2,1) forwards; }

    @keyframes fxRing{
      0%{opacity:0; transform:translate(-50%,-50%) scale(.70) rotate(-12deg)}
      20%{opacity:.82}
      100%{opacity:0; transform:translate(-50%,-50%) scale(1.18) rotate(30deg)}
    }

    .fxShockwave{
      position:absolute;
      left:50%;
      top:50%;
      width:80px;
      height:80px;
      transform:translate(-50%,-50%) scale(.2);
      border-radius:999px;
      border:2px solid rgba(255,255,255,.55);
      opacity:0;
    }

    .fxOverlay.reveal .fxShockwave{
      animation:shockwave .62s ease-out forwards;
    }

    @keyframes shockwave{
      0%{
        opacity:0;
        transform:translate(-50%,-50%) scale(.2);
      }
      15%{
        opacity:.9;
      }
      100%{
        opacity:0;
        transform:translate(-50%,-50%) scale(11);
      }
    }

    .fxBeams{
      position:absolute;
      inset:0;
      opacity:0;
      mix-blend-mode:screen;
      background:
        linear-gradient(90deg, transparent 0%, rgba(255,255,255,.12) 45%, transparent 100%),
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,.08) 48%, transparent 100%),
        linear-gradient(60deg, transparent 0%, rgba(255,255,255,.08) 48%, transparent 100%);
      filter:blur(16px);
    }

    .fxOverlay.reveal .fxBeams{
      animation:fxBeams .52s ease forwards;
    }

    @keyframes fxBeams{
      0%{opacity:0; transform:scale(.97)}
      35%{opacity:.80}
      100%{opacity:0; transform:scale(1.03)}
    }

    .fxParticles{ position:absolute; inset:0; }

    .fxP{
      position:absolute;
      width:6px;
      height:6px;
      border-radius:999px;
      opacity:.9;
      filter:drop-shadow(0 10px 18px rgba(0,0,0,.35));
      animation:fxP .75s ease forwards;
    }

    @keyframes fxP{
      0%{ transform:translate(var(--x0), var(--y0)) scale(.65); opacity:0 }
      20%{ opacity:1 }
      100%{ transform:translate(var(--x1), var(--y1)) scale(0); opacity:0 }
    }

    .fxConfetti{ position:absolute; inset:0; overflow:hidden; }

    .fxC{
      position:absolute;
      width:10px;
      height:6px;
      border-radius:3px;
      opacity:.95;
      transform:translate3d(0,0,0) rotate(0deg);
      animation:fxC 1s ease forwards;
    }

    @keyframes fxC{
      0%{ transform:translate3d(var(--cx), -20px, 0) rotate(0deg); opacity:0 }
      10%{ opacity:1 }
      100%{ transform:translate3d(calc(var(--cx) + var(--drift)), 110vh, 0) rotate(320deg); opacity:0 }
    }

    .fxOverlay[data-tier="b"] .fxFlash{ background:radial-gradient(circle at 50% 45%, rgba(120,170,255,.95), rgba(120,170,255,0) 60%); }
    .fxOverlay[data-tier="v"] .fxFlash{ background:radial-gradient(circle at 50% 45%, rgba(190,120,255,.95), rgba(190,120,255,0) 60%); }
    .fxOverlay[data-tier="g"] .fxFlash{ background:radial-gradient(circle at 50% 45%, rgba(255,210,110,.98), rgba(255,210,110,0) 60%); }
    .fxOverlay[data-tier="m"] .fxFlash{ background:radial-gradient(circle at 50% 45%, rgba(255,80,80,.95), rgba(255,80,80,0) 60%); }

    .cameraZoom{ animation:cameraZoom .55s cubic-bezier(.2,.9,.2,1); }

    @keyframes cameraZoom{
      0%{ transform:scale(1); }
      35%{ transform:scale(1.026); }
      100%{ transform:scale(1); }
    }

    body.screenShake{
      animation:screenShake .28s ease;
    }

    @keyframes screenShake{
      0%,100%{ transform:translateX(0); }
      15%{ transform:translateX(-2px); }
      30%{ transform:translateX(3px); }
      45%{ transform:translateX(-3px); }
      60%{ transform:translateX(2px); }
      75%{ transform:translateX(-1px); }
    }

        if (g === "lorcana") return "lorcana";

        function placeholderLogoForGame(g){

    function toHighImage(url){
      const u = String(url || "");
      if (u.includes("/low.webp")) return u.replace("/low.webp", "/high.webp");

    }

    async function api(path, opts={}){
      const g = encodeURIComponent(currentGame());
      const sep = path.includes("?") ? "&" : "?";
      const url = path + sep + "game=" + g;

      const r = await fetch(url, {
        ...opts,
        headers: {
          ...(opts.headers || {}),
          "Authorization": "Bearer " + localStorage.getItem(TOKEN_KEY),
          "Content-Type":"application/json"
        }
      });

      const data = await r.json().catch(()=> ({}));
      if(!r.ok) throw new Error(data.error || ("HTTP " + r.status));
      return data;
    }

    const sfxOpen       = document.getElementById("sfxOpen");
    const sfxCharge     = document.getElementById("sfxCharge");
    const sfxReveal     = document.getElementById("sfxReveal");

    function playSfx(a, volume = 0.8, pitchRand = 0){
      if(!SFX_ON || !a) return;
      try{
        a.pause();

        a.volume = volume;

        a.play().catch(()=>{});

    function sleep(ms){

    function clamp(n, a, b){

    function tierFromGrade(grade){

      if (grade >= 5)  return "b";

    function getPullPower(pull){
      if (!pull) return 0;
      if (pull.mint) return 1000;
      return Number(pull.grade || 0);
    }

    function getBestPull(pulls){
      if (!Array.isArray(pulls) || !pulls.length) return null;
      let best = pulls[0];
      for(const p of pulls){
        if(getPullPower(p) > getPullPower(best)) best = p;
      }
      return best;
    }

    function getGlobalTierFromPull(pull){
      if (!pull) return "w";
      if (pull.mint) return "m";
      if (Number(pull.grade || 0) >= 10) return "g";
      if (Number(pull.grade || 0) >= 7)  return "v";
      if (Number(pull.grade || 0) >= 5)  return "b";

    }

    // ── Palettes étoiles irisées par tier ──
    const STAR_PAL = {
      w:[[200,50,90],[215,40,88],[205,45,92],[195,35,86],[210,55,90]],
      b:[[200,90,74],[185,88,76],[210,92,72],[195,85,78],[205,88,70]],
      v:[[300,85,74],[280,88,72],[315,82,76],[290,90,70],[305,80,74]],
      g:[[45,95,74], [55,90,76],[35,92,70], [50,88,72], [40,94,68]],
      m:[[355,95,74],[10,90,76],[345,88,70],[5,92,72],  [350,85,68]],
    };

    function getSlabTier(sl){ return sl?.dataset?.mint==="1"?"m":(sl?.dataset?.tier||"w"); }

    function makeSparkles(n){
      return Array.from({length:n},()=>({
        x:Math.random(),y:Math.random(),
        r:0.4+Math.random()*2.0,
        phase:Math.random()*Math.PI*2,
        speed:0.28+Math.random()*0.95,
        big:Math.random()>0.70,
        ci:Math.floor(Math.random()*5),
      }));
    }

    function drawSparkles(ctx, cv, arr, mx, my, t, tier){
      t+=0.036;
      if(!ctx||!cv) return t;
      ctx.clearRect(0,0,cv.width,cv.height);
      const pal=STAR_PAL[tier]||STAR_PAL.g;
      arr.forEach(s=>{
        const pulse=0.5+0.5*Math.sin(t*s.speed+s.phase);
        const dx=s.x-mx,dy=s.y-my;
        const prox=Math.max(0,1-Math.sqrt(dx*dx+dy*dy)/0.40);
        const alpha=pulse*(0.08+prox*0.80);
        if(alpha<0.03) return;
        const px=s.x*cv.width,py=s.y*cv.height,r=s.r*(1+prox*1.6);
        const [h,sat,lit]=pal[s.ci];
        ctx.globalAlpha=alpha;
        ctx.fillStyle=`hsl(${h},${sat}%,${lit}%)`;
        if(s.big&&r>1.6){
          ctx.save();ctx.translate(px,py);ctx.rotate(t*0.18+s.phase);
          for(let i=0;i<4;i++){ctx.beginPath();ctx.ellipse(0,0,r*0.17,r*2.5,(Math.PI/4)*i,0,Math.PI*2);ctx.fill();}
          ctx.beginPath();ctx.arc(0,0,r*0.32,0,Math.PI*2);ctx.fill();
          ctx.restore();
        } else { ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fill(); }
      });
      ctx.globalAlpha=1;
      return t;
    }

    function initBoard(){
      rowTop.innerHTML = "";
      rowBottom.innerHTML = "";

      for(let i = 0; i < 5; i++){
        const node = buildSlab(i);
        if(i < 2) rowTop.appendChild(node);
        else rowBottom.appendChild(node);

        const slab     = document.getElementById(`slab${i}`);
        const card     = document.getElementById(`card${i}`);
        const foilEl   = document.getElementById(`cardFoil${i}`);
        const glareEl  = document.getElementById(`cardGlare${i}`);
        const sparkCv  = document.getElementById(`cardSparkle${i}`);

        bindTilt(slab, card, foilEl, glareEl, sparkCv);
        card?.addEventListener("click", () => openZoomFromSlab(i));
      }

      subLine.textContent = `${gameLabel(currentGame())} • clique une carte pour zoom`;
      resultBox.textContent = "";

      if(currentGame() === "senpaigodesshaven"){
        document.body.classList.add("senpai-active");
      } else {
        document.body.classList.remove("senpai-active");
      }
    }

    function bindTilt(slab, card, foilEl, glareEl, sparkCv){
      const ctx = sparkCv ? sparkCv.getContext("2d") : null;
      const sparks = makeSparkles(100);
      let dragging=false, active=false, raf=null, t=0, mx=0.5, my=0.5;

      function syncCanvas(){
        if(!sparkCv||!card) return;
        const r=card.getBoundingClientRect();
        if(r.width>0){sparkCv.width=Math.round(r.width);sparkCv.height=Math.round(r.height);}
      }

      function loopSparks(){
        if(!active){raf=null;return;}
        t=drawSparkles(ctx,sparkCv,sparks,mx,my,t,getSlabTier(slab));
        raf=requestAnimationFrame(loopSparks);
      }

      function applyFoil(px, py){
        if(!foilEl) return;
        foilEl.style.setProperty("--foil-angle",`${115+(px-0.5)*60}deg`);
        foilEl.style.setProperty("--shine-x",`${px*100}%`);
        foilEl.style.setProperty("--shine-y",`${py*100}%`);
        foilEl.style.opacity="1";
        if(glareEl){glareEl.style.setProperty("--glare-x",`${px*100}%`);glareEl.style.setProperty("--glare-y",`${py*100}%`);glareEl.style.opacity="1";}
        if(sparkCv) sparkCv.style.opacity="1";
      }

      function resetFoil(){
        if(foilEl) foilEl.style.opacity="0";
        if(glareEl) glareEl.style.opacity="0";
        if(sparkCv){sparkCv.style.opacity="0";ctx?.clearRect(0,0,sparkCv.width,sparkCv.height);}
      }

      function setTilt(clientX, clientY){
        if(openingInProgress) return;
        if(slab.classList.contains("winner")) return;
        const r=slab.getBoundingClientRect();
        const px=clamp((clientX-r.left)/r.width,0,1);
        const py=clamp((clientY-r.top)/r.height,0,1);
        slab.style.transform=`rotateX(${(0.5-py)*30}deg) rotateY(${(px-0.5)*30}deg)`;
        const tier=getSlabTier(slab);
        const gc=tier==="g"?"rgba(255,200,0,.28)":tier==="v"?"rgba(190,100,255,.28)":tier==="b"?"rgba(80,160,255,.28)":tier==="m"?"rgba(255,60,60,.28)":"rgba(180,200,255,.12)";
        const sx=(px-0.5)*-30,sy=(py-0.5)*-20;
        slab.style.filter=`drop-shadow(${sx}px ${sy+32}px 60px rgba(0,0,0,.60)) drop-shadow(0 0 28px ${gc})`;
        // coords relatives à la cardImg
        if(card){
          const cr=card.getBoundingClientRect();
          const cpx=clamp((clientX-cr.left)/cr.width,0,1);
          const cpy=clamp((clientY-cr.top)/cr.height,0,1);
          mx=cpx; my=cpy;
          applyFoil(cpx, cpy);
        }
      }

      slab.addEventListener("mousemove", (e)=>{ if(!dragging) setTilt(e.clientX,e.clientY); });
      slab.addEventListener("mouseenter", ()=>{
        if(openingInProgress||slab.classList.contains("winner")) return;
        syncCanvas();
        active=true; if(!raf) loopSparks();
      });
      slab.addEventListener("mouseleave", ()=>{
        if(openingInProgress||slab.classList.contains("winner")) return;
        active=false;
        slab.style.transform="rotateX(0deg) rotateY(0deg)";
        slab.style.filter="drop-shadow(0 26px 80px rgba(0,0,0,.42)) drop-shadow(0 0 24px rgba(255,255,255,.06))";
        resetFoil();
      });
      slab.addEventListener("mousedown", ()=>dragging=true);
      window.addEventListener("mouseup", ()=>dragging=false);
      window.addEventListener("mousemove", (e)=>{ if(dragging) setTilt(e.clientX,e.clientY); });
    }

    async function suckAwayCurrentCards(){
      const jobs = [];

      for(let i = 0; i < 5; i++){
        const card = document.getElementById(`card${i}`);
        const slab = document.getElementById(`slab${i}`);
        const bg = card?.style?.backgroundImage || "";
        const hasCard = bg && !bg.includes("linear-gradient") && bg !== "none";

        if(hasCard){
          jobs.push((async () => {
            slab.classList.add("suck");
            await sleep(460);
            slab.classList.remove("suck");
            card.style.backgroundImage = "";
            card.dataset.high = "";
            const ph = document.getElementById(`cardPh${i}`);
            if(ph) ph.style.display = "flex";
          })());
        }
      }

      if(jobs.length){
        playSfx(sfxWhoosh, 0.9, 0.05);
        await Promise.all(jobs);
      }
    }

    function resetBoardVisuals(){
      winnerIndex = -1;

      document.querySelectorAll(".scene").forEach(scene => {
        scene.classList.remove("winnerScene");

    function fxClear(){
      fxParticles.innerHTML = "";
      fxConfetti.innerHTML  = "";
      fxOverlay.classList.remove("on", "reveal");
      fxOverlay.dataset.tier = "";
    }

    function fxColorForTier(tier){
      if(tier === "g") return "rgba(255,210,110,.95)";
      if(tier === "v") return "rgba(190,120,255,.95)";
      if(tier === "b") return "rgba(120,170,255,.95)";
      if(tier === "m") return "rgba(255,80,80,.95)";
      return "rgba(255,255,255,.90)";
    }

    function fxSpawnParticles(tier, count, center){
      const c = fxColorForTier(tier);

      for(let i = 0; i < count; i++){
        const p = document.createElement("div");
        p.className = "fxP";
        p.style.background = c;

        const a  = Math.random() * Math.PI * 2;
        const r0 = 10 + Math.random() * 55;
        const r1 = 110 + Math.random() * 220;

        p.style.left = center.x + "px";
        p.style.top  = center.y + "px";
        p.style.setProperty("--x0", (Math.cos(a) * r0) + "px");
        p.style.setProperty("--y0", (Math.sin(a) * r0) + "px");
        p.style.setProperty("--x1", (Math.cos(a) * r1) + "px");
        p.style.setProperty("--y1", (Math.sin(a) * r1) + "px");

        fxParticles.appendChild(p);
      }
    }

    function fxSpawnConfetti(tier, count){
      const c = fxColorForTier(tier);

      for(let i = 0; i < count; i++){
        const e = document.createElement("div");
        e.className = "fxC";
        e.style.background = (Math.random() < 0.35) ? "rgba(255,255,255,.95)" : c;

        const x = Math.random() * window.innerWidth;
        const drift = (-90 + Math.random() * 180) + "px";

        e.style.left = "0px";
        e.style.setProperty("--cx", x + "px");
        e.style.setProperty("--drift", drift);

        fxConfetti.appendChild(e);
      }
    }

    async function preloadPullImages(pulls){
      await Promise.all(
        pulls.map(pull => new Promise((resolve) => {
          const img = new Image();
          img.onload = resolve;
          img.onerror = resolve;
          img.src = toHighImage(pull.imageHigh || pull.image) || pull.image || "";
        }))
      );
    }

    function getWinnerIndex(pulls, bestPull){
      if(!bestPull || !Array.isArray(pulls)) return -1;

      for(let i = 0; i < pulls.length; i++){
        const p = pulls[i];
        if(
          !!p?.mint === !!bestPull?.mint &&
          Number(p?.grade || 0) === Number(bestPull?.grade || 0) &&
          String(p?.name || "") === String(bestPull?.name || "") &&
          String(p?.set || "") === String(bestPull?.set || "") &&
          String(p?.image || "") === String(bestPull?.image || "")
        ){
          return i;
        }
      }

      return pulls.findIndex(p => getPullPower(p) === getPullPower(bestPull));
    }

    function fillSlab(index, pull){
      const slab     = document.getElementById(`slab${index}`);
      const card     = document.getElementById(`card${index}`);
      const title    = document.getElementById(`title${index}`);
      const subtitle = document.getElementById(`subtitle${index}`);
      const gradeEl  = document.getElementById(`grade${index}`);
      const mintTag  = document.getElementById(`mintTag${index}`);
      const ph       = document.getElementById(`cardPh${index}`);

      const tier = tierFromGrade(Number(pull.grade || 0));
      const imgLow  = pull.image;
      const imgHigh = toHighImage(pull.imageHigh || pull.image);

      if(ph) ph.style.display = "none";

      const _imgUrl = imgHigh || imgLow;
      card.style.backgroundImage = `url("${_imgUrl}")`;
      card.dataset.high = imgHigh || "";
      card.style.opacity = "1";
      // Détection carte horizontale
      const _tmp = new Image();
      _tmp.onload = () => {
        card.classList.toggle("is-horizontal", _tmp.naturalWidth > _tmp.naturalHeight);
      };
      _tmp.src = _imgUrl;

      title.textContent = `${gameLabel(currentGame())} • GRADE ${pull.grade}`;
      subtitle.textContent = `${pull.name} • ${pull.set}`;
      gradeEl.textContent = String(pull.grade);

      slab.dataset.tier = tier;
      slab.dataset.mint = pull.mint ? "1" : "0";

      if(mintTag) mintTag.style.display = pull.mint ? "inline-flex" : "none";

      slab.classList.remove("multiPop", "revealBurst");
      void slab.offsetWidth;
      slab.classList.add("multiPop", "revealBurst");

      setTimeout(() => slab.classList.remove("revealBurst"), 520);
    }

    function fillAllSlabs(pulls){
      for(let i = 0; i < 5; i++){
        if(pulls[i]) fillSlab(i, pulls[i]);
      }
    }

    function applyWinnerHighlight(index){
      winnerIndex = index;
      const scenes = document.querySelectorAll(".scene");

      for(let i = 0; i < 5; i++){
        const slab = document.getElementById(`slab${i}`);
        const scene = scenes[i];
        if(!slab || !scene) continue;

        slab.classList.remove("winner", "dimmed");
        slab.style.transform = "";
        scene.classList.remove("winnerScene");
        scene.dataset.tier = "";

        if(i === index){
          slab.classList.add("winner");
          scene.classList.add("winnerScene");
          scene.dataset.tier = slab.dataset.mint === "1" ? "m" : (slab.dataset.tier || "w");
        }else{
          slab.classList.add("dimmed");
        }
      }
    }

    async function runGlobalRevealFx(bestPull){
      const tier = getGlobalTierFromPull(bestPull);
      const isMint = !!bestPull?.mint;
      const grade = Number(bestPull?.grade || 0);
      const isEpic = isMint || grade >= 10;
      const isBig  = isEpic || grade >= 8;

      const center = {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2
      };

      fxClear();
      fxOverlay.dataset.tier = tier;
      fxOverlay.classList.add("on");
      document.body.classList.add("globalSuspense");

      subLine.textContent =
        isMint ? "SIGNATURE MINT DÉTECTÉE..." :
        grade >= 10 ? "PULL LÉGENDAIRE DÉTECTÉ..." :
        grade >= 8 ? "GROS PULL EN APPROCHE..." :
        grade >= 5 ? "PULL RARE EN APPROCHE..." :
        "Ouverture en cours...";

      playSfx(sfxCharge, isEpic ? 1 : 0.85);

      fxRing.style.left = center.x + "px";
      fxRing.style.top  = center.y + "px";

      fxSpawnParticles(
        isMint ? "m" : tier,
        isMint ? 130 : grade >= 10 ? 95 : grade >= 8 ? 52 : grade >= 5 ? 28 : 16,
        center
      );

      for(let i = 0; i < 5; i++){
        const ph = document.getElementById(`cardPh${i}`);
        if(ph){
          ph.style.opacity = "0.34";
          ph.style.filter = "blur(.8px)";
          ph.style.transform = "translate(-50%,-50%) translateZ(19px) scale(.96)";
        }
      }

      await sleep(isMint ? 640 : isEpic ? 560 : isBig ? 420 : 300);

      subLine.textContent = isEpic ? "..." : "Révélation imminente...";
      await sleep(isEpic ? 130 : 90);

      fxOverlay.classList.add("reveal");
      document.body.classList.add("cameraZoom");
      document.body.classList.add("screenShake");
      setTimeout(() => document.body.classList.remove("screenShake"), 300);

      if(isEpic){
        fxSpawnConfetti(isMint ? "m" : tier, isMint ? 110 : 70);
        playSfx(sfxRevealEpic, 1);
      }else{
        if(grade >= 7){
          fxSpawnConfetti(tier, 24);
        }
        playSfx(sfxReveal, 0.92);
      }

      await sleep(isMint ? 560 : isEpic ? 500 : 420);

      fxOverlay.classList.remove("reveal");
      document.body.classList.remove("globalSuspense");
      document.body.classList.remove("cameraZoom");
      subLine.textContent = `${gameLabel(currentGame())} • clique une carte pour zoom`;

      await sleep(120);
      fxOverlay.classList.remove("on");
      fxClear();
    }

    async function revealSequence(pulls, bestPull){
      await runGlobalRevealFx(bestPull);
      fillAllSlabs(pulls);
      await sleep(110);

      const idx = getWinnerIndex(pulls, bestPull);
      if(idx >= 0){
        applyWinnerHighlight(idx);
      }
    }

    async function openMulti(){
      if(openBtn.disabled || openingInProgress) return;

      openBtn.disabled = true;
      openingInProgress = true;
      resultBox.textContent = "";

      try{
        await suckAwayCurrentCards();
        playSfx(sfxOpen, 0.8);
        resetBoardVisuals();

        const data = await api("/api/open_multi", {
          method:"POST",
          body: JSON.stringify({ amount: 5 })
        });

        const pulls = Array.isArray(data.pulls) ? data.pulls : [];
        if(!pulls.length) throw new Error("Aucune carte reçue");

        const bestPull = getBestPull(pulls);

        await preloadPullImages(pulls);
        await revealSequence(pulls, bestPull);

        resultBox.textContent = `Ouverture terminée • -25 Dollax • +${data.xpAdd || 0} XP`;

        await loadMe();
      }catch(e){
        resultBox.textContent = e?.message || "Erreur ouverture x5";
        subLine.textContent = `${gameLabel(currentGame())} • clique une carte pour zoom`;
      }finally{
        openingInProgress = false;
        openBtn.disabled = false;
        document.body.classList.remove("globalSuspense", "cameraZoom", "screenShake");
        fxClear();
      }
    }

    function openZoomFromSlab(index){
      if(openingInProgress) return;

      const card     = document.getElementById(`card${index}`);
      const title    = document.getElementById(`title${index}`);
      const subtitle = document.getElementById(`subtitle${index}`);
      const gradeEl  = document.getElementById(`grade${index}`);
      const slab     = document.getElementById(`slab${index}`);
      const mintTag  = document.getElementById(`mintTag${index}`);

      const bg = card?.style?.backgroundImage || "";
      if (!bg || bg.includes("linear-gradient")) return;

      const high = card?.dataset?.high;
      zoomCard.style.backgroundImage = high ? `url("${high}")` : bg;
      zoomCard.classList.toggle("is-horizontal", card?.classList.contains("is-horizontal") || false);
      zoomTitle.textContent = title?.textContent || "";
      zoomSubtitle.textContent = subtitle?.textContent || "";
      zoomGrade.textContent = gradeEl?.textContent || "";
      zoomSlab.dataset.tier = slab?.dataset?.tier || "";
      zoomSlab.dataset.mint = slab?.dataset?.mint || "0";
      zoomMintTag.style.display = (mintTag?.style?.display === "none") ? "none" : "inline-flex";

      modal.classList.add("open");
    }

    // ── Zoom foil setup ──
    const zoomCardFoilEl  = document.getElementById("zoomCardFoil");
    const zoomCardGlareEl = document.getElementById("zoomCardGlare");
    const zoomSparkCv     = document.getElementById("zoomCardSparkle");
    const zoomSparkCtx    = zoomSparkCv ? zoomSparkCv.getContext("2d") : null;
    const zoomSparks      = makeSparkles(100);
    let zoomSparkActive=false, zoomSparkRAF=null, zoomSparkT=0, zoomSparkMx=0.5, zoomSparkMy=0.5;

    function loopZoomSparks(){
      if(!zoomSparkActive){zoomSparkRAF=null;return;}
      zoomSparkT=drawSparkles(zoomSparkCtx,zoomSparkCv,zoomSparks,zoomSparkMx,zoomSparkMy,zoomSparkT,getSlabTier(zoomSlab));
      zoomSparkRAF=requestAnimationFrame(loopZoomSparks);
    }

    function setZoomTilt(clientX, clientY){
      const r=zoomSlab.getBoundingClientRect();
      const px=clamp((clientX-r.left)/r.width,0,1);
      const py=clamp((clientY-r.top)/r.height,0,1);
      zoomSlab.style.transform=`rotateX(${(0.5-py)*20}deg) rotateY(${(px-0.5)*20}deg)`;
      const tier=getSlabTier(zoomSlab);
      const gc=tier==="g"?"rgba(255,200,0,.28)":tier==="v"?"rgba(190,100,255,.28)":tier==="b"?"rgba(80,160,255,.28)":tier==="m"?"rgba(255,60,60,.28)":"rgba(180,200,255,.12)";
      const sx=(px-0.5)*-30,sy=(py-0.5)*-20;
      zoomSlab.style.filter=`drop-shadow(${sx}px ${sy+32}px 60px rgba(0,0,0,.60)) drop-shadow(0 0 28px ${gc})`;
      if(zoomCard&&zoomCardFoilEl){
        const cr=zoomCard.getBoundingClientRect();
        const cpx=clamp((clientX-cr.left)/cr.width,0,1);
        const cpy=clamp((clientY-cr.top)/cr.height,0,1);
        zoomSparkMx=cpx; zoomSparkMy=cpy;
        zoomCardFoilEl.style.setProperty("--foil-angle",`${115+(cpx-0.5)*60}deg`);
        zoomCardFoilEl.style.setProperty("--shine-x",`${cpx*100}%`);
        zoomCardFoilEl.style.setProperty("--shine-y",`${cpy*100}%`);
        zoomCardFoilEl.style.opacity="1";
        if(zoomCardGlareEl){zoomCardGlareEl.style.setProperty("--glare-x",`${cpx*100}%`);zoomCardGlareEl.style.setProperty("--glare-y",`${cpy*100}%`);zoomCardGlareEl.style.opacity="1";}
        if(zoomSparkCv) zoomSparkCv.style.opacity="1";
      }
    }

    zoomSlab?.addEventListener("mousemove", (e)=>{ if(!zoomDragging) setZoomTilt(e.clientX,e.clientY); });
    zoomSlab?.addEventListener("mouseenter", ()=>{
      if(zoomSparkCv&&zoomCard){const r=zoomCard.getBoundingClientRect();if(r.width>0){zoomSparkCv.width=Math.round(r.width);zoomSparkCv.height=Math.round(r.height);}}
      zoomSparkActive=true; if(!zoomSparkRAF) loopZoomSparks();
    });
    zoomSlab?.addEventListener("mouseleave", ()=>{
      zoomSparkActive=false;
      zoomSlab.style.transform="rotateX(0deg) rotateY(0deg)";
      zoomSlab.style.filter="drop-shadow(0 26px 80px rgba(0,0,0,.42)) drop-shadow(0 0 24px rgba(255,255,255,.06))";
      if(zoomCardFoilEl) zoomCardFoilEl.style.opacity="0";
      if(zoomCardGlareEl) zoomCardGlareEl.style.opacity="0";
      if(zoomSparkCv){zoomSparkCv.style.opacity="0";zoomSparkCtx?.clearRect(0,0,zoomSparkCv.width,zoomSparkCv.height);}
    });
    zoomSlab?.addEventListener("mousedown", ()=>zoomDragging=true);
    window.addEventListener("mouseup", ()=>zoomDragging=false);
    window.addEventListener("mousemove", (e)=>{ if(zoomDragging&&modal?.classList.contains("open")) setZoomTilt(e.clientX,e.clientY); });

    modal?.addEventListener("click", (e) => {
      if(e.target === modal) modal.classList.remove("open");
    });

    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape") modal.classList.remove("open");
    });

    openBtn?.addEventListener("click", openMulti);

    backBtnTop?.addEventListener("click", () => {
      window.location.href = "/index.html";
    });

    (async () => {
      try{
        initBoard();
      }catch(e){
        console.error("Erreur initBoard:", e);
      }

      try{
        await loadMe();
      }catch(e){
        console.error("Erreur loadMe:", e);
      }
    })();
  </script>
</body>
</html>
